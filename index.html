  // ── PO editor wiring (editable rows + add + save to bucket) ──────
  const editPoBtn = document.getElementById('editPoBtn');
  const savePoBtn = document.getElementById('savePoBtn');
  // _editingPO is declared earlier (near _poPanel) so renderPOPanel can
  // read it without triggering the TDZ error at startup.

  function parsePOMarkdown(md) {
    // Tolerant parser for LLM-generated markdown PO.
    // - Accepts `#`, `##`, or `###` as section headers (LLMs drift).
    //   But we require at least one space after the hashes so the
    //   document title (`# Empire Wines & Spirits`) is only treated as
    //   a section if nothing better appears; first-level title is
    //   allowed since sections still distinguish by presence of rows.
    // - Allows leading whitespace before `|` on table rows.
    // - Detects header vs data by "is cell 2 numeric" instead of
    //   hardcoding English "Product" -- this auto-skips 产品/Cases/箱数.
    // - Detects separator rows with optional alignment colons `:---:`.
    const sections = [];
    let current = null;
    const ensureSection = () => {
      if (!current) {
        current = { title: 'Order', rows: [] };
        sections.push(current);
      }
      return current;
    };
    for (const line of (md || '').split(/\r?\n/)) {
      // Section headers -- three shapes observed in LLM output:
      //   (a) ## / ### hashes (template shape)
      //   (b) `**Vendor** · ...` bold banner (actual LLM shape)
      //   We ignore lines that are pipe-table rows even if bold-looking.
      const h1 = line.match(/^#{1,3}\s+(.+?)\s*$/);
      const h2 = !/\|/.test(line) ? line.match(/^\*\*(.+?)\*\*/) : null;
      if (h1 || h2) {
        const title = (h1 ? h1[1] : h2[1]).trim();
        if (/negative stock|⚠️|total/i.test(title)) { current = null; continue; }
        current = { title, rows: [] };
        sections.push(current);
        continue;
      }
      const m = line.match(/^\s*\|(.+)\|\s*$/);
      if (!m) continue;
      const cells = m[1].split('|').map(c => c.trim());
      if (cells.length < 2) continue;
      if (/^:?-+:?$/.test(cells[0])) continue;   // separator
      const firstCell = cells[0];
      const secondCell = cells[1] || '';
      // Skip header rows (multi-lang)
      if (/^(product|产品|item|名称|商品)$/i.test(firstCell)) continue;
      if (/^(cases?|箱数|qty|quantity|数量|amount|金额|notes?|备注)$/i.test(secondCell)) continue;
      if (!firstCell) continue;
      const n = parseInt(secondCell, 10);
      const cases = isNaN(n) ? 0 : n;
      // Auto-lazy create section if first table row appears before any
      // explicit banner (defensive for malformed LLM output).
      ensureSection();
      // 4-col shape: Product | Cases | Amount | Notes
      // 3-col shape: Product | Cases | Notes
      const hasAmount = cells.length >= 4;
      current.rows.push({
        product: firstCell,
        cases,
        amount: hasAmount ? (cells[2] || '') : '',
        notes:  hasAmount ? (cells[3] || '') : (cells[2] || ''),
      });
    }
    try { console.log('[PO parser] md len=%d, sections=%o, first 200 chars=%o',
                       (md || '').length,
                       sections.map(s => ({ title: s.title, rows: s.rows.length })),
                       (md || '').slice(0, 200));
    } catch (_) {}
    return { sections };
  }

  function serializePO(parsed) {
    const kept = parsed.sections.filter(s => s.rows.length > 0);
    let md = '', grand = 0;
    for (const s of kept) {
      // Emit bold banner + 4-col table to match live LLM format.
      md += `**${s.title}**\n\n| Product | Cases | Amount | Notes |\n|---------|-------|--------|-------|\n`;
      for (const r of s.rows) {
        md += `| ${r.product} | ${r.cases || 0} | ${r.amount || ''} | ${r.notes || ''} |\n`;
        grand += r.cases || 0;
      }
      md += '\n';
    }
    md += `**Total: ${grand} cases**\n`;
    return md;
  }

  function computeTotalCases(parsed) {
    let total = 0;
    const breakdown = [];
    for (const s of parsed.sections) {
      const sum = s.rows.reduce((t, r) => t + (r.cases || 0), 0);
      total += sum;
      breakdown.push({
        title: s.title, rows: s.rows.length, sum,
        items: s.rows.map(r => `${r.product}:${r.cases}`),
      });
    }
    try { console.log('[PO total] %d = %o', total, breakdown); } catch (_) {}
    return total;
  }

  function renderPOEditor(parsed) {
    const sectionsHTML = parsed.sections.map((s, si) => {
      // "建议退役" / retire / discontinued sections default collapsed --
      // user-facing insight, not part of the active order.
      const isRetire = /建议退役|retire|discontinu/i.test(s.title);
      const openAttr = isRetire ? '' : ' open';
      // Editor mirrors view-mode 5-col: PRODUCT | STOCK | CASE | AMOUNT | NOTES.
      // Stock source: POS cache (_products) keyed by product name; fallback
      // to parsing "库存 N" out of notes. Only CASE is editable.
      const _stockByName = new Map();
      for (const p of (_products || [])) {
        if (p && p.name && p.qty_on_hand != null) {
          _stockByName.set(p.name.toLowerCase(), Number(p.qty_on_hand));
        }
      }
      const rowsHTML = s.rows.map((r, ri) => {
        const pname = (r.product || '').toLowerCase();
        let stock = _stockByName.get(pname);
        if (stock == null) {
          const textNotes = (r.notes || '').replace(/<[^>]*>/g, '');
          const m = textNotes.match(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*(-?\d+)/i);
          stock = m ? m[1] : '';
        }
        const notesOut = (r.notes || '')
          .replace(/\s*[·・]\s*(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+/gi, '')
          .replace(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+\s*[·・]\s*/gi, '')
          .replace(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+/gi, '')
          .replace(/^\s*[·・]\s*|\s*[·・]\s*$/g, '')
          .trim();
        return `
        <tr data-si="${si}" data-ri="${ri}">
          <td class="col-product"><button class="del-btn" title="删除" aria-label="删除">${ICON_TRASH}</button><span class="prod-name">${escapeHtml(r.product)}</span></td>
          <td class="col-stock">${escapeHtml(String(stock))}</td>
          <td class="col-qty"><input type="text" inputmode="numeric" pattern="[0-9]*" class="qty-input" value="${r.cases || 0}"></td>
          <td class="col-amt">${escapeHtml(r.amount || '')}</td>
          <td class="col-notes">${notesOut}</td>
        </tr>`;
      }).join('');
      const sCases = s.rows.reduce((t, r) => t + (r.cases || 0), 0);
      const sAmt = s.rows.reduce((t, r) => t + parseAmountNumber(r.amount), 0);
      const amtTxt = sAmt.toLocaleString(undefined, {maximumFractionDigits: 0});
      return `<details class="po-section"${openAttr}>
        <summary class="po-section-title">${escapeHtml(translateSectionTitle(s.title))}
          <span class="po-section-count">${s.rows.length} &middot; ${sCases} ${t('unit.cases')} &middot; $${amtTxt}</span>
          <button class="po-section-copy" data-si="${si}" title="${t('tooltip.copy')}" aria-label="${t('tooltip.copy')}">${ICON_COPY}</button>
        </summary>
        <table>
          <thead><tr><th>${t('col.product')}</th><th>${t('col.stock')}</th><th>${t('col.cases')}</th><th>${t('col.amount')}</th><th>${t('col.notes')}</th></tr></thead>
          <tbody data-si="${si}">${rowsHTML || `<tr><td colspan="5" style="color:var(--muted);font-style:italic;padding:6px 8px;">${t('section.empty')}</td></tr>`}</tbody>
        </table>
      </details>`;
    }).join('');
    poBody.innerHTML = `<div class="po-editor">
      <div class="po-editor-toolbar">
        <button class="po-add-btn" id="poAddBtn">${t('btn.add_product')}</button>
        <span class="po-editor-spacer"></span>
        <button class="btn btn-ghost" id="poEditorCancelBtn">${t('btn.cancel')}</button>
        <button class="btn btn-primary" id="poEditorSaveBtn">${t('btn.save')}</button>
      </div>
      <div id="poSections">${sectionsHTML}</div>
    </div>`;
    // In-editor Save + Cancel. Save reuses the existing savePoBtn handler
    // (programmatic click) so there is a single source of truth for the
    // save logic. Cancel discards in-memory edits and re-renders view.
    document.getElementById('poEditorSaveBtn')?.addEventListener('click', () => {
      savePoBtn.click();
    });
    document.getElementById('poEditorCancelBtn')?.addEventListener('click', () => {
      _editingPO = null;
      renderPOPanel();
      setEmailEnabled(_poPanel.vendors.some(v => v.markdown && v.markdown.length > 50));
    });
    // iPhone / iPad: backspace is the only delete key. Force cursor to the
    // end of the number on focus AND on click so one backspace tap removes
    // the trailing digit. Using type=text + inputmode=numeric allows
    // setSelectionRange (type=number forbids it on iOS Safari).
    poBody.querySelectorAll('input.qty-input').forEach(inp => {
      const toEnd = (e) => {
        const v = e.target.value || '';
        try { e.target.setSelectionRange(v.length, v.length); } catch (_) {}
      };
      inp.addEventListener('focus', toEnd);
      inp.addEventListener('click', toEnd);
    });
  }

  function enterPOEditor() {
    let md = '', targetId = 'live';
    if (_viewingHistoryId) {
      const e = _orderHistory.find(x => x.id === _viewingHistoryId);
      if (!e) return;
      md = e.markdown;
      targetId = _viewingHistoryId;
    } else if (poBuffer) {
      md = poBuffer;
    }
    console.log('[edit] entering editor, targetId=%s md source len=%d',
                targetId, (md || '').length);
    const parsed = parsePOMarkdown(md);
    // Only seed a default section when the PO is completely empty (D-rule:
    // allow empty-start editing). If any real section was parsed, use as-is.
    if (parsed.sections.length === 0) {
      parsed.sections.push({ title: 'Standard reorder', rows: [] });
    }
    _editingPO = { parsed, targetId };
    renderPOEditor(parsed);
    // Legacy top-level edit/save buttons stay hidden; save flow lives inside
    // the editor's own toolbar now (per-vendor entry point, in-editor exit).
    setEmailEnabled(false);
  }

  function exitPOEditor(md) {
    _editingPO = null;
    renderPOPanel();
    _applyUILocks();
  }

  savePoBtn.addEventListener('click', () => {
    if (!_editingPO) return;
    const md = serializePO(_editingPO.parsed);
    const totals = parseTotals(md);
    // Phase-1: editor targets a vendor entry in _poPanel.vendors.
    // targetId is the vendor entry id. Update in place, stay in panel.
    const idx = _poPanel.vendors.findIndex(v => v.id === _editingPO.targetId);
    let persistOk = true;
    if (idx >= 0) {
      _poPanel.vendors[idx] = {
        ..._poPanel.vendors[idx],
        markdown: md,
        cases: totals.cases,
        amount: totals.amount,
        ts: Date.now(),
      };
      persistOk = savePanel();
    } else {
      // Fallback: editor was opened outside a panel entry -- upsert by
      // current store/vendor select.
      const sid = storeSel.value, vid = vendorSel.value;
      upsertPanelVendor({
        id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        storeId: sid,
        storeName: storeSel.selectedOptions[0]?.text || sid,
        vendorId: vid,
        vendorName: vendorSel.selectedOptions[0]?.text || vid,
        ts: Date.now(), markdown: md,
        cases: totals.cases, amount: totals.amount,
      });
      // Post-verify the fallback write too -- read back from localStorage
      // and confirm the just-saved markdown is there under the current
      // (store, vendor). Missing -> something ate the write silently.
      try {
        const raw = localStorage.getItem(PANEL_KEY);
        const panel = raw ? JSON.parse(raw) : {};
        const saved = (panel.vendors || []).find(v =>
          v.storeId === sid && v.vendorId === vid);
        if (!saved || saved.markdown !== md) persistOk = false;
      } catch (_e) { persistOk = false; }
    }
    // Only claim "saved" when the bytes actually made it to disk. When
    // _safeSetItem fails it already surfaces its own error; we just tell
    // the user the in-memory edit is volatile.
    if (persistOk) {
      addMsg(t('msg.saved'), 'sys');
    } else {
      addMsg(currentLang === 'en'
        ? 'Saved in memory only -- reload will lose edits'
        : '仅内存保存,刷新会丢失 (localStorage 写失败)', 'sys');
    }
    exitPOEditor(md);
  });

  // Delegated events inside the editor table
  poBody.addEventListener('input', (e) => {
    if (!_editingPO) return;
    if (!e.target.classList.contains('qty-input')) return;
    const tr = e.target.closest('tr');
    if (!tr) return;
    const si = +tr.dataset.si, ri = +tr.dataset.ri;
    const row = _editingPO.parsed.sections[si]?.rows[ri];
    if (!row) return;
    row.cases = Math.max(0, parseInt(e.target.value, 10) || 0);
  });

  poBody.addEventListener('click', async (e) => {
    // Multi-vendor panel -- vendor-level controls.
    // Retire: add every checked row's product to the blacklist.
    const vendorRetire = e.target.closest('.vendor-retire');
    if (vendorRetire) {
      e.preventDefault(); e.stopPropagation();
      if (vendorRetire.disabled) return;
      const vendor = vendorRetire.closest('.vendor-panel');
      if (!vendor) return;
      const checks = vendor.querySelectorAll('.po-main-wrap .po-select:checked');
      const names = Array.from(checks).map(c => c.dataset.product).filter(Boolean);
      if (!names.length) return;
      retireProducts(names);
      return;
    }
    // Select-all header checkbox: toggle every .po-select in the same wrap.
    const selAll = e.target.closest('.po-select-all');
    if (selAll) {
      const wrap = selAll.closest('.po-main-wrap');
      if (!wrap) return;
      const want = selAll.checked;
      wrap.querySelectorAll('.po-select').forEach(cb => {
        cb.checked = want;
        const tr = cb.closest('tr');
        if (tr) tr.classList.toggle('row-selected', want);
      });
      _syncVendorRetireEnabled(wrap);
      return;
    }
    // Individual row checkbox: toggle row-selected tint + sync retire state.
    // (No preventDefault: let the browser handle the checkbox toggle.)
    const rowSel = e.target.closest('.po-select');
    if (rowSel) {
      const tr = rowSel.closest('tr');
      if (tr) tr.classList.toggle('row-selected', rowSel.checked);
      _syncVendorRetireEnabled(rowSel);
      return;
    }
    // Restore from retire panel.
    const restoreBtn = e.target.closest('.retire-restore');
    if (restoreBtn) {
      e.preventDefault(); e.stopPropagation();
      unretireProduct(restoreBtn.dataset.name);
      return;
    }
    const vendorClose = e.target.closest('.vendor-close');
    if (vendorClose) {
      e.preventDefault(); e.stopPropagation();
      returnVendorToDrawer(vendorClose.dataset.id);
      return;
    }
    const vendorCopyBtn = e.target.closest('.vendor-copy');
    if (vendorCopyBtn) {
      e.preventDefault(); e.stopPropagation();
      const v = _poPanel.vendors.find(x => x.id === vendorCopyBtn.dataset.id);
      if (!v) return;
      try {
        await copyToClipboard(buildCopyText(v));
        vendorCopyBtn.innerHTML = ICON_CHECK;
        vendorCopyBtn.classList.add('copied');
        setTimeout(() => {
          vendorCopyBtn.innerHTML = ICON_COPY;
          vendorCopyBtn.classList.remove('copied');
        }, 1500);
      } catch (err) { addMsg('复制失败: ' + (err?.message || err), 'sys'); }
      return;
    }
    const vendorEditBtn = e.target.closest('.vendor-edit');
    if (vendorEditBtn) {
      e.preventDefault(); e.stopPropagation();
      const v = _poPanel.vendors.find(x => x.id === vendorEditBtn.dataset.id);
      if (!v) return;
      // Enter editor with this vendor's markdown as source.
      const parsed = parsePOMarkdown(v.markdown || '');
      if (parsed.sections.length === 0) parsed.sections.push({ title: 'Standard reorder', rows: [] });
      _editingPO = { parsed, targetId: v.id, vendorEntry: v };
      renderPOEditor(parsed);
      setEmailEnabled(false);
      return;
    }
    // Read-only view mode: section copy attached to markdown banners.
    const viewCopy = e.target.closest('.po-view-copy');
    if (viewCopy) {
      e.preventDefault(); e.stopPropagation();
      const sourceMd = _viewingHistoryId
        ? (_orderHistory.find(h => h.id === _viewingHistoryId)?.markdown || '')
        : (poBuffer || '');
      const parsed = parsePOMarkdown(sourceMd);
      const si = +viewCopy.dataset.si;
      const s = parsed.sections[si];
      if (!s) return;
      const lines = [`${s.title}:`];
      for (const r of s.rows) {
        const n = r.cases || 0;
        if (n > 0) lines.push(`${r.product} x ${n}`);
      }
      const text = lines.join('\n');
      try {
        await copyToClipboard(text);
        viewCopy.innerHTML = ICON_CHECK;
        viewCopy.classList.add('copied');
        setTimeout(() => {
          viewCopy.innerHTML = ICON_COPY;
          viewCopy.classList.remove('copied');
        }, 1500);
      } catch (err) {
        addMsg('复制失败: ' + (err?.message || err), 'sys');
      }
      return;
    }
    if (!_editingPO) return;
    const secCopy = e.target.closest('.po-section-copy');
    if (secCopy) {
      // prevent the click from toggling <details>
      e.preventDefault();
      e.stopPropagation();
      const si = +secCopy.dataset.si;
      const s = _editingPO.parsed.sections[si];
      if (!s) return;
      const lines = [`${s.title}:`];
      for (const r of s.rows) {
        const n = r.cases || 0;
        if (n > 0) lines.push(`${r.product} x ${n}`);
      }
      const text = lines.join('\n');
      try {
        await copyToClipboard(text);
        secCopy.innerHTML = ICON_CHECK;
        secCopy.classList.add('copied');
        setTimeout(() => {
          secCopy.innerHTML = ICON_COPY;
          secCopy.classList.remove('copied');
        }, 1500);
      } catch (err) {
        addMsg('复制失败: ' + (err?.message || err), 'sys');
      }
      return;
    }
    const del = e.target.closest('.del-btn');
    if (del) {
      const tr = del.closest('tr');
      if (!tr) return;
      const si = +tr.dataset.si, ri = +tr.dataset.ri;
      _editingPO.parsed.sections[si]?.rows.splice(ri, 1);
      renderPOEditor(_editingPO.parsed);
      return;
    }
    if (e.target.id === 'poAddBtn') {
      openAddRowInline();
      return;
    }
  });

  function openAddRowInline() {
    const existing = document.querySelector('.add-row-inline');
    if (existing) { existing.remove(); return; }
    const div = document.createElement('div');
    div.className = 'add-row-inline';
    div.innerHTML = `<input type="text" placeholder="${currentLang === 'en' ? 'Type product name (>= 2 chars)...' : '输入产品名 (>= 2 字符)...'}" id="poAddInput">
      <div class="add-row-actions">
        <button type="button" class="btn btn-primary" id="poAddCommitBtn" disabled>
          ${currentLang === 'en' ? 'Add' : '添加'} <span id="poAddCount">0</span>
        </button>
        <button type="button" class="btn btn-ghost" id="poAddCloseBtn">
          ${currentLang === 'en' ? 'Close' : '关闭'}
        </button>
      </div>
      <div id="poAddAc" class="autocomplete"></div>`;
    document.getElementById('poAddBtn').after(div);
    const inp = document.getElementById('poAddInput');
    const acBox = document.getElementById('poAddAc');
    const commitBtn = document.getElementById('poAddCommitBtn');
    const countEl = document.getElementById('poAddCount');
    const closeBtn = document.getElementById('poAddCloseBtn');
    inp.focus();

    // Selected set of product names (from _products). Preserved across
    // re-filters so user can query, check, query again, check more, commit.
    const selected = new Map();  // name -> product object
    const refreshCommit = () => {
      countEl.textContent = String(selected.size);
      commitBtn.disabled = selected.size === 0;
    };

    function renderMatches() {
      const q = inp.value.trim().toLowerCase();
      if (q.length < 2) { acBox.classList.remove('active'); return; }
      const matches = (_products || []).filter(p => p.name.toLowerCase().includes(q)).slice(0, 20);
      if (matches.length === 0) { acBox.classList.remove('active'); return; }
      acBox.innerHTML = matches.map((p, i) => {
        const checked = selected.has(p.name) ? 'checked' : '';
        const cost  = (p.cost         != null) ? `$${Number(p.cost).toFixed(2)}` : '';
        const price = (p.price        != null) ? `$${Number(p.price).toFixed(2)}` : '';
        const stk   = (p.qty_on_hand  != null) ? `${Number(p.qty_on_hand)}` : '';
        return `<label class="autocomplete-item ac-picker" data-idx="${i}">
          <input type="checkbox" class="ac-check" ${checked}>
          <span class="ac-name">${escapeHtml(p.name)}</span>
          <span class="ac-stock" title="in stock (btl)">${stk}</span>
          <span class="ac-cost"  title="cost / btl">${cost}</span>
          <span class="ac-price" title="price / btl">${price}</span>
        </label>`;
      }).join('');
      acBox.classList.add('active');
      acBox._matches = matches;
    }
    inp.addEventListener('input', renderMatches);

    acBox.addEventListener('change', (e) => {
      const cb = e.target.closest('.ac-check');
      if (!cb || !acBox._matches) return;
      const item = cb.closest('.autocomplete-item');
      const p = acBox._matches[+item.dataset.idx];
      if (cb.checked) selected.set(p.name, p);
      else selected.delete(p.name);
      refreshCommit();
    });

    commitBtn.addEventListener('click', () => {
      if (selected.size === 0) return;
      const standard = _editingPO.parsed.sections.find(s => /standard|正常|reorder/i.test(s.title))
                    || _editingPO.parsed.sections[0];
      // Batch add all selected products. Compute amount = cases * qty_per_case * cost
      // (cost is per-bottle) so the row shows a populated $ figure immediately.
      for (const p of selected.values()) {
        const cases = 1;
        let amountStr = '';
        if (p.cost != null && p.qty_per_case != null) {
          const amt = cases * Number(p.qty_per_case) * Number(p.cost);
          amountStr = '$' + amt.toFixed(2);
        }
        standard.rows.push({
          product: p.name, cases, amount: amountStr,
          notes: currentLang === 'en' ? 'manual add' : '手动添加',
        });
      }
      renderPOEditor(_editingPO.parsed);
    });
    closeBtn.addEventListener('click', () => {
      div.remove();
    });
  }

  const CLOCK_SVG = `<span class="clock-spin" aria-hidden="true"><span class="hand hand-min"></span><span class="hand hand-sec"></span></span>`;

  let cacheTextEl = null;
  function ensureCacheClock() {
    if (cacheTextEl && cacheAgeEl.contains(cacheTextEl)) return;
    cacheAgeEl.innerHTML = `<span class="cache-text"></span>${CLOCK_SVG}`;
    cacheTextEl = cacheAgeEl.querySelector('.cache-text');
  }
  function resetCacheClock() {
    cacheTextEl = null;
    ensureCacheClock();
    updateCacheAge();
  }
  function setCacheBusy(text) {
    ensureCacheClock();
    cacheTextEl.textContent = text;
    cacheAgeEl.style.color = 'var(--muted)';
  }
  function setCacheDone(text) {
    cacheAgeEl.innerHTML = `<span>${text}</span><span class="cache-check">✓</span>`;
    cacheTextEl = null;
    cacheAgeEl.style.color = 'var(--muted)';
  }

  async function updateCacheAge() {
    const sid = storeSel.value;
    if (!sid) { cacheAgeEl.textContent = ''; return; }
    try {
      const resp = await fetch(API_BASE + '/api/admin/cache/stats');
      if (!resp.ok) return;
      const data = await resp.json();
      const info = data.stores?.[sid];
      if (!info) {
        cacheAgeEl.textContent = currentLang === 'en' ? 'no data' : '数据未加载';
        return;
      }
      const age = info.age_seconds;
      const mins = Math.floor(age / 60), secs = Math.floor(age % 60);
      const ageText = age < 60 ? `${secs}s` : `${mins}m${secs}s`;
      ensureCacheClock();
      cacheTextEl.textContent = currentLang === 'en'
        ? `cached ${ageText} ago`
        : `缓存 ${ageText} 前`;
      cacheAgeEl.style.color = info.warn ? 'var(--danger)' : 'var(--muted)';
    } catch {}
  }
  // Re-render cache text on language switch so en/zh labels stay in sync.
  window.addEventListener('lang-changed', () => updateCacheAge());

  // Smart refresh threshold — 6 hours.  Within window → fusion patch (on_hand
  // + recent sales).  Beyond → full reload.  Shift/Alt click forces full.
  const SMART_REFRESH_WINDOW_SEC = 6 * 3600;

  async function doRefresh(sid, mode) {
    const url = mode === 'smart'
      ? `/api/admin/cache/smart-refresh/${encodeURIComponent(sid)}`
      : `/api/admin/cache/refresh/${encodeURIComponent(sid)}`;
    const resp = await fetch(url, { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
    return data;
  }

  refreshCacheBtn.addEventListener('click', async (event) => {
    const sid = storeSel.value;
    if (!sid) { addMsg('⚠ 请先选门店', 'sys'); return; }

    // Decide mode
    const forceFull = event.shiftKey || event.altKey;
    let mode = 'full';
    if (!forceFull) {
      try {
        const stats = await fetch(API_BASE + '/api/admin/cache/stats').then(r => r.json());
        const info = stats.stores?.[sid];
        if (info && info.age_seconds < SMART_REFRESH_WINDOW_SEC) {
          mode = 'smart';
        }
      } catch { /* fall through to full */ }
    }

    refreshCacheBtn.disabled = true;
    refreshCacheBtn.innerHTML = `<span class="btn-icon">🔄</span> ${mode === 'smart' ? '快刷中…' : '全刷中…'}`;
    setCacheBusy(mode === 'smart' ? '快刷中' : '全刷中');
    // ANY refresh (smart or full) drops the per-store product-name caches
    // in localStorage so autocomplete reflects the latest inStock values.
    _clearAllProductNameCaches();
    try {
      let data;
      try {
        data = await doRefresh(sid, mode);
      } catch (e) {
        // Smart failed? Auto-fallback to full.
        if (mode === 'smart') {
          addMsg('⚠ 快刷失败,降级全刷…', 'sys');
          setCacheBusy('全刷中');
          data = await doRefresh(sid, 'full');
        } else {
          throw e;
        }
      }
      const ms = Math.round(data.load_duration_ms);
      const label = data.mode === 'smart' ? '⚡ 快刷' : '🔄 全刷';
      addMsg(`${label} 完成 (${data.snapshot_rows} SKU, ${ms}ms)`, 'sys');
      setCacheDone(`${label} 完成`);
      setTimeout(updateCacheAge, 1500);
      // Immediately re-fetch the autocomplete catalog so the popup shows
      // the just-refreshed inStock values without waiting for a store switch.
      loadAllProductNames(sid);
    } catch (e) {
      addMsg('✗ 刷新失败: ' + e.message, 'sys');
      updateCacheAge();
    } finally {
      refreshCacheBtn.disabled = false;
      refreshCacheBtn.innerHTML = '<span class="btn-icon">🔄</span> 刷新';
    }
  });
  refreshCacheBtn.title = '刷新数据(6h 内智能快刷 / Shift+点击强制全刷)';

  // Removed 10s auto-poll — cache age now updates only on store change,
  // after manual refresh, or after a generation completes.

  // localStorage cache for product names (per-store, TTL 24h). POS SQL
  // Express is too slow to hit on every store switch and most catalogs
  // change very little day-to-day. Force-refresh via Shift+click on the
  // refresh button (clears all cached entries; see _clearAllProductNameCaches).
  const PRODUCT_CACHE_KEY_PREFIX = 'eip_product_names_v1_';
  const PRODUCT_CACHE_TTL_S = 24 * 3600;
  function _productCacheKey(storeId) { return PRODUCT_CACHE_KEY_PREFIX + storeId; }

  async function loadAllProductNames(storeId) {
    if (!storeId) return;
    const key = _productCacheKey(storeId);
    // Try localStorage first
    try {
      const raw = localStorage.getItem(key);
      if (raw) {
        const cached = JSON.parse(raw);
        const ageS = (Date.now() - (cached.ts || 0)) / 1000;
        // Schema check: newer response shape carries cost / price / qty_per_case
        // / reorder_level. Reject older cached items that predate these fields
        // so users don't get a stuck zero-cost autocomplete after a deploy.
        const first = Array.isArray(cached.items) ? cached.items[0] : null;
        const schemaOk = first && (
          'cost' in first && 'price' in first &&
          'qty_per_case' in first && 'reorder_level' in first
        );
        if (schemaOk && ageS < PRODUCT_CACHE_TTL_S) {
          _products = _filterVisibleProducts(cached.items);
          console.log('[autocomplete] localStorage cache hit: %d items, age=%ds',
            _products.length, Math.round(ageS));
          return;
        }
        if (!schemaOk) {
          console.log('[autocomplete] localStorage cache has old schema, refetching');
        }
      }
    } catch (_e) { /* corrupt or quota -- fall through to fetch */ }
    // Cache miss / stale -> block input during slow POS SQL fetch
    const prevPlaceholder = msgInput.placeholder;
    msgInput.disabled = true;
    msgInput.placeholder = currentLang === 'en'
      ? 'Loading products, please wait...'
      : '正在加载产品,请稍候...';
    try {
      const resp = await fetch(`${API_BASE}/api/stores/${encodeURIComponent(storeId)}/product-names`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const items = await resp.json();
      _products = _filterVisibleProducts(items);
      console.log('[autocomplete] fetched + cached:', _products.length);
      _safeSetItem(key, JSON.stringify({ts: Date.now(), items}), 'product-cache');
    } catch (e) {
      console.warn('[autocomplete] failed to load store catalog:', e);
    } finally {
      msgInput.disabled = false;
      msgInput.placeholder = prevPlaceholder;
    }
  }
  function _clearAllProductNameCaches() {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(PRODUCT_CACHE_KEY_PREFIX)) keys.push(k);
      }
      keys.forEach(k => localStorage.removeItem(k));
    } catch (_e) {}
  }

  storeSel.addEventListener('change', () => {
    sessionId = null;
    sendBtn.disabled = true;
    if (storeSel.value) {
      loadVendors(storeSel.value);
      loadAllProductNames(storeSel.value);   // populate autocomplete now
      updateCacheAge();
    } else {
      vendorSel.innerHTML = '<option>先选门店</option>';
      vendorSel.disabled = true;
      cacheAgeEl.textContent = '';
    }
    // Panel is store-scoped: show only current store's vendors.
    renderPOPanel();
    // Some events are store-scoped (applicable_stores); reload banner.
    loadUpcomingHolidays();
  });

  vendorSel.addEventListener('change', () => {
    sessionId = null;
    if (vendorSel.value && storeSel.value) generatePO();
  });

  sendBtn.addEventListener('click', sendEdit);
  cancelBtn.addEventListener('click', () => { cancelSSE(); });
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); sendEdit(); }
  });

  // ── API connection probe (heartbeat-style) ───────────────────────
  // Periodically fetch /health. Success -> online -> enable store/vendor
  // dropdowns. Network error / timeout -> offline -> disable them so
  // the user can't attempt actions that require the server. 401 is NOT
  // offline (server reachable, auth expired) -- auth gate handles that.
  const apiStatusDot = document.getElementById('apiStatus');
  let _apiOnline = null;            // tri-state: null/true/false
  let _apiProbeTimer = null;
  const _PROBE_ON_INTERVAL  = 120 * 1000;  // 2 min when online (light)
  const _PROBE_OFF_INTERVAL = 30 * 1000;   // 30s when offline (eager reconnect)

  function _applyApiOnlineState(online) {
    if (_apiOnline === online) return;     // no-op on unchanged
    _apiOnline = online;
    if (apiStatusDot) {
      apiStatusDot.classList.remove('online', 'offline', 'checking');
      apiStatusDot.classList.add(online ? 'online' : 'offline');
      apiStatusDot.title = online
        ? 'Server online'
        : 'Server offline -- generate / refresh / email disabled; local view + edit still work';
    }
    // Delegate all button gating to the lock coordinator so offline /
    // generating / editing compose without stepping on each other.
    _applyUILocks();
  }

  async function _probeApi() {
    try {
      const ctl = new AbortController();
      const t = setTimeout(() => ctl.abort(), 2500);
      const r = await fetch(API_BASE + '/health', {
        method: 'GET',
        credentials: _FETCH_CREDS,
        signal: ctl.signal,
      });
      clearTimeout(t);
      // Any HTTP response (even 5xx) means server is reachable.
      _applyApiOnlineState(r.ok || r.status < 500);
    } catch (_e) {
      _applyApiOnlineState(false);
    } finally {
      // Reschedule based on new state.
      if (_apiProbeTimer) clearTimeout(_apiProbeTimer);
      _apiProbeTimer = setTimeout(_probeApi,
        _apiOnline ? _PROBE_ON_INTERVAL : _PROBE_OFF_INTERVAL);
    }
  }
  // Browser hints: react instantly to OS-level network changes.
  window.addEventListener('online',  _probeApi);
  window.addEventListener('offline', () => _applyApiOnlineState(false));

  // ── Auth gate: check session, show login overlay on 401, start app on 200.
  // If server reports auth_enabled=false, skip entirely (local / SaaS-off
  // deployments stay open).
  const _loginOverlay = document.getElementById('loginOverlay');
  const _loginForm    = document.getElementById('loginForm');
  const _loginUser    = document.getElementById('loginUser');
  const _loginPass    = document.getElementById('loginPass');
  const _loginError   = document.getElementById('loginError');
  const _appEl        = document.getElementById('app');

  function _showLogin(msg) {
    _loginOverlay.style.display = 'flex';
    _appEl.style.display = 'none';
    if (msg) { _loginError.textContent = msg; _loginError.style.display = ''; }
    else { _loginError.style.display = 'none'; }
    setTimeout(() => _loginUser.focus(), 50);
  }
  function _hideLogin() {
    _loginOverlay.style.display = 'none';
    _appEl.style.display = '';
  }
  async function _startApp() {
    _hideLogin();
    loadStores();
    _probeApi();  // start heartbeat-style server liveness checks
  }
  async function _checkAuthAndStart() {
    try {
      const r = await fetch(API_BASE + '/api/auth/me', { credentials: _FETCH_CREDS });
      if (r.ok) {
        const d = await r.json();
        if (!d.auth_enabled || d.user) { _startApp(); return; }
      }
    } catch (e) { /* network hiccup -- show login */ }
    _showLogin();
  }
  const _loginRemember = document.getElementById('loginRemember');
  _loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    _loginError.style.display = 'none';
    const btn = _loginForm.querySelector('button[type="submit"]');
    btn.disabled = true;
    try {
      const r = await fetch(API_BASE + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: _FETCH_CREDS,
        body: JSON.stringify({
          username: _loginUser.value.trim(),
          password: _loginPass.value,
          remember: !!_loginRemember.checked,
        }),
      });
      if (r.ok) {
        _loginPass.value = '';
        _startApp();
        return;
      }
      const err = await r.json().catch(() => ({}));
      _loginError.textContent = err.detail || ('Login failed (' + r.status + ')');
      _loginError.style.display = '';
    } catch (err) {
      _loginError.textContent = 'Network error: ' + err.message;
      _loginError.style.display = '';
    } finally {
      btn.disabled = false;
    }
  });
  _checkAuthAndStart();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#faf9f5">
<title>Smart Reorder</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Claude AI inspired palette — warm cream + orange accent */
    /* Palette: page canvas stays the original warm off-white; all panels
       (topbar, chat, inputbar, dropdowns) use cream (no pure white); PO
       panels lifted on --paper with warm shadow. */
    --bg: #f5f0e4;
    --panel: #faf3e1;
    --panel2: #ebe2ca;
    --paper: #fdf7e8;
    --paper-shadow: 0 1px 2px rgba(120,80,50,0.06), 0 3px 10px rgba(120,80,50,0.05);
    --text: #2b2a26;
    --muted: #6f6d64;
    --accent: #cc785c;         /* Claude's warm orange */
    --accent-hover: #b56748;
    --accent2: #659466;        /* subdued success green */
    --danger: #c84a4a;
    --border: #dbd0b4;
    --border-strong: #c5bc9e;
    --radius: 10px;
    --pad: 14px;
    --font-serif: "Source Serif 4", Charter, "Iowan Old Style", Georgia, serif;
    --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Consolas, "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100%; }
  body { font: 15px/1.55 var(--font-ui); }
  #app {
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
    max-width: 960px; margin: 0 auto;
    background: var(--bg);
  }

  .topbar {
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;
    padding: var(--pad); background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 3;
  }
  .topbar select {
    width: 100%; padding: 10px 12px; border-radius: var(--radius);
    background: var(--panel); color: var(--text); border: 1px solid var(--border-strong);
    font: 15px/1.4 var(--font-ui);
    transition: border-color 0.15s;
  }
  .topbar select:hover { border-color: var(--accent); }
  .topbar select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(204,120,92,0.15); }
  .topbar select.lang-select { width: auto; min-width: 96px; font-size: 13px; padding: 10px 10px; }

  .po {
    flex: 0 0 auto;
    height: calc(78vh + 10px);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 14px 6px;
    overflow: auto;
    resize: vertical;
    min-height: 120px;
    max-height: 90vh;
    margin-bottom: 3px;
    font-family: var(--font-serif);
    font-size: 13px;
    line-height: 1.35;
    color: var(--text);
    white-space: normal;
    word-break: break-word;
  }
  #po > * { margin-top: 0; margin-bottom: 0; }
  #po > * + * { margin-top: 2px; }
  .po h3 {
    margin: 0 0 10px; font-size: 12px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted);
    font-family: var(--font-ui); font-weight: 600;
  }
  /* PO toolbar — rigid 3-column grid: [title] [meta flexible] [actions]
     Grid guarantees exactly ONE row regardless of content width.
     Only the middle (meta) cell can overflow; title and actions never reflow. */
  .po-toolbar {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    padding: 2px 0;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-ui);
    height: 26px;              /* tight — no vertical reflow ever */
    background: var(--panel);
  }
  .po-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--muted); font-weight: 600;
    line-height: 1; white-space: nowrap;
  }
  .po-meta {
    display: flex; gap: 10px; align-items: center;
    padding-left: 10px;
    font-size: 11px; color: var(--muted); line-height: 1;
    min-width: 0;               /* allow grid cell to shrink rather than push */
    overflow: hidden;           /* clip overflowing text, don't reflow siblings */
    white-space: nowrap;
  }
  .po-meta > * { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .po-meta #timer { color: #8a8a80; }
  /* Holiday proximity reminder, sits inline next to po-title. */
  .holiday-banner {
    display: inline-block;
    margin-left: 14px;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(232,133,94,0.14);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60vw;
    cursor: default;
  }
  .holiday-banner.urgent { background: rgba(214,106,91,0.18); color: var(--danger); }
  .holiday-banner.today { background: rgba(214,106,91,0.30); color: #fff; }

  /* Animated analog clock — pure CSS, no SVG.
     Size 20px to fit within 26px po-toolbar without clipping. */
  .clock-spin {
    display: inline-block; position: relative;
    width: 20px; height: 20px;
    margin-left: 6px; vertical-align: middle;
    border: 1.5px solid currentColor; border-radius: 50%;
    box-sizing: border-box;
  }
  .clock-spin::after {
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 2.5px; height: 2.5px; border-radius: 50%;
    background: currentColor; transform: translate(-50%, -50%);
    z-index: 2;
  }
  .clock-spin .hand {
    position: absolute; left: 50%; top: 50%;
    transform-origin: 50% 100%;
    background: currentColor;
  }
  .clock-spin .hand-min  { width: 1.4px; height: 6px; margin-left: -0.7px; margin-top: -6px; animation: clock-spin 3600s linear infinite; }
  .clock-spin .hand-sec  { width: 0.8px; height: 8px; margin-left: -0.4px; margin-top: -8px; background: #c0392b; animation: clock-spin 60s steps(60, end) infinite; }
  /* When paused, stop both hands (set via .paused class on the container) */
  .clock-spin.paused .hand-min,
  .clock-spin.paused .hand-sec {
    animation-play-state: paused;
  }
  @keyframes clock-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .cache-check {
    display: inline-block; margin-left: 6px; color: #2e7d32; font-weight: 700;
    animation: cache-pop 0.4s ease-out;
  }
  @keyframes cache-pop {
    0% { transform: scale(0.2); opacity: 0; }
    60% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .po-actions {
    display: flex; gap: 6px; align-items: center;
    white-space: nowrap;
  }
  /* Unified tiny buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 0 9px;
    height: 22px;
    font: 500 11px/1 var(--font-ui);
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, opacity 0.12s;
    white-space: nowrap;
  }
  .btn .btn-icon { font-size: 11px; line-height: 1; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  /* UI lock body classes -- dim / block conflicting inner buttons.
     gen-lock   : a WS generation is streaming; vendor-level edit/retire/close
                  and row checkboxes would race the server write, so neuter
                  them without removing visual context.
     edit-lock  : user has unsaved edits; handled via main-toolbar .disabled
                  flipped by _applyUILocks (no body-class rules needed here).
     offline-lock: red dot + toolbar .disabled cover the user-facing story;
                  no dim on panel interactions since local edit/retire are
                  allowed even when the server is down. */
  body.gen-lock #po .vendor-edit,
  body.gen-lock #po .vendor-retire,
  body.gen-lock #po .vendor-close {
    pointer-events: none; opacity: 0.45;
  }
  body.gen-lock #po .po-select,
  body.gen-lock #po .po-select-all {
    pointer-events: none; opacity: 0.6;
  }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover:not(:disabled) { background: var(--panel2); color: var(--text); }
  .btn-secondary {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-secondary:hover:not(:disabled) { background: rgba(204,120,92,0.08); }
  .btn-cancel {
    background: transparent; color: var(--danger, #c62828);
    border: 1px solid var(--danger, #c62828); font-weight: 600;
  }
  .btn-cancel:hover { background: rgba(198,40,40,0.08); }
  .btn-primary {
    background: var(--accent2); color: #fff;
    border: 1px solid var(--accent2);
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) { background: #4f7f51; border-color: #4f7f51; }
  .po .placeholder { color: var(--muted); font-style: italic; }
  .po tr.retiree td { background: #fff7c2 !important; }
  /* Rows where proposed cases * qty_per_case (bottles) > qty_on_hand (bottles).
     Warm amber tint signals "real restock" vs. top-up. */
  .po tr.row-restock-high td { background: rgba(235, 168, 78, 0.18) !important; }
  .po .retiree-tag {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    background: #d4a017; color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 3px; vertical-align: middle;
  }
  .po .cat-badge {
    display: inline-block; padding: 1px 6px;
    font-size: 10px; font-weight: 700; border-radius: 3px;
    vertical-align: middle; white-space: nowrap;
    float: right; margin-left: 8px;
  }
  .po .cat-urgent   { background: #c0392b; color: #fff; }
  .po .cat-volatile { background: #e67e22; color: #fff; }
  .po .cat-standard { background: #7f8c8d; color: #fff; }
  .po tr.no-purchase td { background: #ffe4cc !important; }
  .po .no-purchase-tag {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    background: #e67e22; color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 3px; vertical-align: middle;
  }
  .po .streaming::after {
    content: "▋"; color: var(--accent); animation: blink 1s step-end infinite; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .chat-wrap {
    flex: 1 1 auto; min-height: 0;
    position: relative;       /* anchor for the absolute autocomplete */
    display: flex; flex-direction: column;
  }
  .chat {
    flex: 1 1 auto; overflow-y: auto;
    /* Bottom padding = log-panel summary height (~22px) + 3px gap to
       inputbar + 5px gap from chat content to log-panel top. */
    padding: var(--pad) var(--pad) 30px;
    background: var(--bg);
    display: flex; flex-direction: column; gap: 4px;
  }
  .msg {
    max-width: 85%; padding: 4px 10px; border-radius: var(--radius);
    word-wrap: break-word; white-space: pre-wrap;
    font-family: var(--font-ui);
    line-height: 1.25;
  }
  .msg.user {
    align-self: flex-end; background: var(--accent); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-start; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-bottom-left-radius: 4px;
    font-family: var(--font-serif); font-size: 15px;
  }
  .msg.sys { align-self: center; color: var(--muted); font-size: 12px; background: transparent; padding: 2px 6px; }

  .inputbar {
    display: flex; gap: 8px; padding: var(--pad);
    background: var(--panel); border-top: 1px solid var(--border);
    padding-bottom: calc(var(--pad) + env(safe-area-inset-bottom));
  }
  .inputbar input {
    flex: 1; padding: 12px 14px; border-radius: var(--radius);
    background: var(--panel); color: var(--text); border: 1px solid var(--border-strong);
    font: 15px/1.4 var(--font-ui);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .inputbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(204,120,92,0.15); }
  .inputbar button {
    padding: 0 18px; border-radius: var(--radius); border: none;
    background: var(--accent); color: #fff; font-weight: 600; font-size: 14px;
    font-family: var(--font-ui); cursor: pointer;
    transition: background 0.15s;
  }
  .inputbar button:hover:not(:disabled) { background: var(--accent-hover); }
  .inputbar button:disabled { opacity: 0.35; cursor: not-allowed; }
  /* Markdown table -- 4-col layout: PRODUCT | CASES | AMOUNT | NOTES.
     All widths in px so summary grid + table align reliably across font
     weights. Notes col absorbs remaining width (width:100% + fixed
     layout + no explicit notes width). */
  #po table { border-collapse: collapse; margin: 0.5em 0; width: 100%;
              table-layout: fixed;
              font-size: 14px; color: var(--text); background: transparent;
              font-family: var(--font-ui); }
  #po th, #po td { border-bottom: 1px solid var(--border);
                   padding: 10px 12px; text-align: left;
                   line-height: 1.5; vertical-align: middle;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 5-col: PRODUCT | STOCK | CASE | AMOUNT | NOTES.
     Widths tuned so typical 45-char product names + "STOCK" header fit
     on one line. Notes col auto -> absorbs remaining panel width. */
  #po table th:first-child, #po table td:first-child {
    width: 260px;
    /* Long product names wrap to multiple lines instead of ellipsis. */
    white-space: normal;
    word-break: break-word;
    overflow: visible;
    text-overflow: clip;
  }
  #po table th:nth-child(2), #po table td:nth-child(2) {
    width: 85px; text-align: right; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  #po table th:nth-child(3), #po table td:nth-child(3) { width: 65px; }
  #po table th:nth-child(4), #po table td:nth-child(4) { width: 95px; }
  #po table th:nth-child(3), #po table td:nth-child(3),
  #po table th:nth-child(4), #po table td:nth-child(4) {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  /* ── New 6-col data-driven PO gen table (po-main-table) ─────────── */
  #po .po-main-wrap { width: 100%; }
  #po table.po-main-table {
    table-layout: fixed;
  }
  /* Override base #po th ellipsis so header labels show in full. */
  #po table.po-main-table th {
    white-space: nowrap;
    overflow: visible;
    text-overflow: clip;
  }
  /* Override #po table nth-child rules for 7-col layout:
     1 Product | 2 Select | 3 Stock | 4 Case | 5 Amount | 6 Notes | 7 Priority */
  #po table.po-main-table th:nth-child(1),
  #po table.po-main-table td:nth-child(1) {
    width: 260px;
    white-space: normal; word-break: break-word;
    overflow: visible; text-overflow: clip;
  }
  #po table.po-main-table th:nth-child(2),
  #po table.po-main-table td:nth-child(2) {
    width: 32px; text-align: center;
    padding: 6px 4px;
  }
  #po table.po-main-table th:nth-child(2) input,
  #po table.po-main-table td:nth-child(2) input {
    cursor: pointer; accent-color: var(--accent);
    vertical-align: middle;
  }
  #po table.po-main-table th:nth-child(3),
  #po table.po-main-table td:nth-child(3) {
    width: 70px; text-align: right;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  #po table.po-main-table th:nth-child(4),
  #po table.po-main-table td:nth-child(4) {
    width: 60px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #po table.po-main-table th:nth-child(5),
  #po table.po-main-table td:nth-child(5) {
    width: 95px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #po table.po-main-table th:nth-child(6),
  #po table.po-main-table td:nth-child(6) {
    /* notes: auto fill remaining, wrap */
    white-space: normal; word-break: break-word;
  }
  #po table.po-main-table th:nth-child(7),
  #po table.po-main-table td:nth-child(7) {
    width: 70px; text-align: center;
  }
  /* Row-selected highlight -- subtle tint so checked rows are visible
     without competing with restock/retiree row tints. */
  #po table.po-main-table tr.row-selected td {
    background: rgba(204,120,92,0.08);
  }
  /* Sortable headers: pointer + hover tint; arrow indicator via ::after. */
  #po table.po-main-table th.sortable {
    cursor: pointer; user-select: none; position: relative;
    padding-right: 20px;
  }
  #po table.po-main-table th.sortable:hover {
    background: rgba(204,120,92,0.10);
  }
  #po table.po-main-table th.sortable::after {
    content: '';
    position: absolute; right: 6px; top: 50%;
    width: 0; height: 0;
    border: 4px solid transparent;
    opacity: 0.25;
    transform: translateY(-50%);
  }
  #po table.po-main-table th.sortable.sort-asc::after {
    border-bottom-color: currentColor;
    border-top-width: 0;
    opacity: 1;
    transform: translateY(-65%);
  }
  #po table.po-main-table th.sortable.sort-desc::after {
    border-top-color: currentColor;
    border-bottom-width: 0;
    opacity: 1;
    transform: translateY(-35%);
  }
  /* Priority column badges: colored pill per category. */
  #po .prio-badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 11px; font-weight: 700;
    border-radius: 10px; letter-spacing: 0.02em;
    line-height: 1.4;
  }
  #po .prio-badge.prio-u { background: #c0392b; color: #fff; }
  #po .prio-badge.prio-h { background: #e67e22; color: #fff; }
  #po .prio-badge.prio-n { background: #7f8c8d; color: #fff; }
  /* ── API connection status dot ──────────────────────────────── */
  .api-status {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-left: 6px;
    vertical-align: middle;
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .api-status.online   { background: #2e7d32; box-shadow: 0 0 0 2px rgba(46,125,50,0.20); }
  .api-status.offline  { background: var(--danger); box-shadow: 0 0 0 2px rgba(200,74,74,0.22); }
  .api-status.checking { background: var(--muted); box-shadow: 0 0 0 2px rgba(111,109,100,0.22); }

  /* ── Login overlay ──────────────────────────────────────────── */
  .login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-card {
    width: 100%; max-width: 340px;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 28px 24px 22px;
    box-shadow: 0 8px 24px rgba(43,42,38,0.12);
    font-family: var(--font-ui);
  }
  .login-title {
    margin: 0 0 18px; font-size: 20px; font-weight: 600;
    color: var(--text); letter-spacing: 0.02em;
  }
  .login-field { margin-bottom: 14px; }
  .login-field label {
    display: block; margin-bottom: 6px;
    font-size: 12px; color: var(--muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .login-field input {
    width: 100%; box-sizing: border-box;
    padding: 9px 11px; border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: var(--panel); color: var(--text);
    font: inherit;
  }
  .login-field input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(204,120,92,0.18);
  }
  .login-remember {
    display: flex; align-items: center; gap: 8px;
    margin: 4px 0 14px;
    font-size: 13px; color: var(--muted);
    cursor: pointer; user-select: none;
  }
  .login-remember input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--accent);
    cursor: pointer; margin: 0;
  }
  .login-error {
    margin: 0 0 12px; padding: 8px 10px;
    background: rgba(200,74,74,0.10); border: 1px solid rgba(200,74,74,0.35);
    color: var(--danger); border-radius: 4px;
    font-size: 13px;
  }
  .login-submit {
    width: 100%; padding: 10px 16px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; font: inherit; font-weight: 600;
    cursor: pointer;
  }
  .login-submit:hover { background: var(--accent-hover); }
  .login-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Section accordions in markdown (read-only) view. Each vendor/order/
     retire banner becomes a collapsible <details>, mirroring the editor. */
  #po details.po-view-section { margin: 10px 0 4px; }
  #po details.po-view-section > summary {
    cursor: pointer; user-select: none;
    list-style: none;
    padding: 4px 0;
    font-weight: 600;
    color: var(--accent);
  }
  #po details.po-view-section > summary::-webkit-details-marker { display: none; }
  #po details.po-view-section > summary::before {
    content: '\25B8';
    display: inline-block;
    margin-right: 6px;
    transition: transform 0.15s;
    color: var(--muted);
  }
  #po details.po-view-section[open] > summary::before {
    transform: rotate(90deg);
  }
  /* Cross-vendor grand-total summary above the panel sub-panels. */
  #po .panel-summary {
    padding: 8px 14px; margin: 4px 0 12px;
    background: var(--paper);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    box-shadow: var(--paper-shadow);
    font-size: 13px; color: var(--text);
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  }
  #po .panel-summary .ps-label {
    font-weight: 600; color: var(--muted); margin-right: 4px;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  #po .panel-summary b { color: var(--accent); font-weight: 700; }
  #po .panel-summary .ps-sep { color: var(--muted); margin: 0 4px; }

  /* Phase-1 multi-vendor sub-panels. Each vendor is an outer <details>;
     the existing inner section accordion nests inside. */
  #po details.vendor-panel {
    margin: 0 0 14px;
    border: none;
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: var(--paper-shadow);
  }
  /* Summary layout: 3-column grid whose columns 2 + 3 align with the body
     table's Cases + Amount columns (table-layout:fixed, same widths, same
     horizontal padding as the cells). Actions sit right after vendor-name
     in the left column for shortest mouse travel from drawer to panel. */
  #po details.vendor-panel > summary {
    cursor: pointer; user-select: none; list-style: none;
    display: grid;
    /* 6 tracks match body table: product | select | stock | case | amount | notes.
       Last track 1fr absorbs remaining width same as table's auto col. */
    grid-template-columns: 260px 32px 85px 65px 95px 1fr;
    align-items: center;
    padding: 8px 12px;
    font-size: 14px; font-weight: 600;
    border-bottom: 1px solid transparent;
    /* Sticky: when scrolling the body rows, the vendor head (with copy/edit/
       retire/close actions) stays pinned at the top of the #po scroll area
       so the user never has to scroll back up to find the commands.
       Multiple <details> siblings handle their own sticky territory, so
       scrolling past one vendor cleanly hands over to the next. */
    position: sticky; top: 0; z-index: 5;
    background: var(--paper);
  }
  #po details.vendor-panel[open] > summary { border-bottom-color: var(--border); }
  #po details.vendor-panel > summary::-webkit-details-marker { display: none; }
  #po .vendor-head-left {
    display: flex; align-items: center; gap: 6px;
    min-width: 0;  /* allow name ellipsis to kick in instead of pushing actions off */
  }
  #po .vendor-head-left::before {
    content: '\25B8'; display: inline-block;
    transition: transform 0.15s; color: var(--muted);
    flex: 0 0 auto;
  }
  #po details.vendor-panel[open] > summary .vendor-head-left::before {
    transform: rotate(90deg);
  }
  #po .vendor-name {
    min-width: 0; color: var(--text);
    overflow: hidden; text-overflow: wrap; white-space: nowrap;
  }
  #po .vendor-total-cases,
  #po .vendor-total-amount {
    /* Explicit grid-column placement: totals sit above col 3 (CASES) and
       col 4 (AMOUNT) in the 5-col layout (product|instock|cases|amount|notes).
       Right-align and 12px padding match table cell padding for exact alignment. */
    text-align: right;
    padding-right: 12px;
    font-variant-numeric: tabular-nums;
    font-size: 13px; font-weight: 500;
  }
  #po .vendor-total-cases { grid-column: 4; color: var(--muted); }
  #po .vendor-total-amount { grid-column: 5; color: var(--accent); font-weight: 600; }
  #po .vendor-actions { display: inline-flex; gap: 2px; margin-left: 4px; flex: 0 0 auto; }
  /* Touch-friendly: min 36px tap target so iPhone thumbs hit reliably. */
  #po .vendor-copy, #po .vendor-edit, #po .vendor-retire, #po .vendor-close {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 8px 10px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.12s, background 0.12s;
    font-size: 18px; line-height: 1;
    min-width: 36px; min-height: 36px;
  }
  #po .vendor-copy svg, #po .vendor-close svg, #po .vendor-edit svg, #po .vendor-retire svg {
    width: 18px; height: 18px;
    pointer-events: none;  /* click always lands on the button */
  }
  #po .vendor-copy:hover { color: var(--accent); background: rgba(204,120,92,0.10); }
  #po .vendor-edit:hover { color: var(--accent); background: rgba(204,120,92,0.10); }
  #po .vendor-retire:hover { color: var(--accent); background: rgba(204,120,92,0.10); }
  #po .vendor-retire:disabled { opacity: 0.35; cursor: not-allowed; }
  #po .vendor-retire:disabled:hover { color: var(--muted); background: transparent; }
  #po .vendor-close:hover { color: var(--danger); background: rgba(200,74,74,0.10); }
  #po .vendor-copy.copied { color: var(--tone-final, #5a9a3a); }
  #po .vendor-panel-body { padding: 4px 12px 10px; }  /* match summary padding-left/right so grid cols align with table cols */

  /* Retire blacklist panel: collapsible, sits below vendor panels.
     Local-only for now -- see SQL comment in JS for planned DB schema. */
  #po details.retire-panel {
    margin: 16px 0 8px;
    padding: 0;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--text);
  }
  #po details.retire-panel > summary {
    cursor: pointer; user-select: none; list-style: none;
    padding: 8px 12px;
    font-weight: 600; color: var(--muted);
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 8px;
  }
  #po details.retire-panel > summary::-webkit-details-marker { display: none; }
  #po details.retire-panel > summary::before {
    content: '\25B8'; display: inline-block;
    transition: transform 0.15s; color: var(--muted);
  }
  #po details.retire-panel[open] > summary::before { transform: rotate(90deg); }
  #po .retire-hint {
    padding: 0 14px 4px; color: var(--muted); font-size: 12px;
  }
  #po .retire-list {
    list-style: none; margin: 4px 0 10px; padding: 0 10px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 4px;
  }
  #po .retire-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px; gap: 8px;
    background: rgba(204,120,92,0.05);
    border-radius: 4px;
    font-size: 13px;
  }
  #po .retire-item .retire-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1 1 auto;
  }
  #po .retire-restore {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 4px 6px; border-radius: 4px;
    display: inline-flex; align-items: center;
    transition: color 0.12s, background 0.12s;
    flex: 0 0 auto;
  }
  #po .retire-restore svg { width: 14px; height: 14px; pointer-events: none; }
  #po .retire-restore:hover { color: var(--accent); background: rgba(204,120,92,0.10); }
  /* Mobile: allow horizontal scroll instead of squashing columns */
  @media (max-width: 600px) {
    .po { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #po table { font-size: 12px; min-width: 520px; }
    #po th, #po td { padding: 6px 8px; }
    /* Autocomplete on mobile: full-viewport width, pinned to top, name
       on its own row, badges wrap to a second row. Visible scrollbar
       (overflow-y: scroll forces it, -webkit-scrollbar styles it).
       CSS kept conservative for iOS Safari <15.4 compatibility:
       vh not dvh, width:100% not 100vw, z-index pushed very high to
       escape any sticky-topbar stacking context, !important to override
       the desktop rule's short-hand positioning. */
    /* Mobile: JS anchors top/left/width via anchorPopupToChat().
       Keep visual + scrollbar rules only here -- no positioning. */
    .autocomplete {
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      border: none;
      border-radius: 0;
      z-index: 9999;
    }
    .autocomplete::-webkit-scrollbar { width: 8px; }
    .autocomplete::-webkit-scrollbar-track { background: transparent; }
    .autocomplete::-webkit-scrollbar-thumb {
      background: var(--border-strong); border-radius: 4px;
    }
    .autocomplete-item {
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 16px;
      gap: 6px 10px;
    }
    .autocomplete-item .ac-name {
      flex: 1 1 100%;
      white-space: normal; overflow: visible; text-overflow: clip;
      word-break: break-word;
      min-width: 0;
    }
    .autocomplete-item .ac-qty,
    .autocomplete-item .ac-cov { flex: 0 0 auto; }
  }
  #po th { background: var(--panel2); font-weight: 600; color: var(--text);
           font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
           border-bottom: 2px solid var(--border-strong); }
  #po tr:hover td { background: rgba(204,120,92,0.06); }
  #po h1 { font-size: 1.2em; margin: 0 0 0.2em 0; color: var(--text);
           font-family: var(--font-serif); font-weight: 600; letter-spacing: -0.01em; }
  #po h2 { font-size: 1em; margin: 0.3em 0 0.15em 0; color: var(--accent);
           font-family: var(--font-ui); font-weight: 600; }
  #po hr { border: none; border-top: 1px solid var(--border); margin: 0.6em 0; }
  #po p, #po em { color: var(--muted); font-family: var(--font-serif); margin: 0.2em 0; }
  #po blockquote { margin: 0.2em 0; padding: 0 0 0 10px; border-left: 2px solid var(--border);
                   color: var(--muted); font-size: 12px; }
  #po strong { color: var(--text); font-weight: 600; }
  /* ✻ spinner — Claude propagating glyph, warm orange */
  .spinner-dot {
    display: inline-block;
    color: var(--accent);
    font-size: 1.1em;
    margin-right: 6px;
    animation: eip-pulse 1.2s ease-in-out infinite, eip-spin 2.4s linear infinite;
    transform-origin: center;
  }
  .spinner-dot::before { content: '✻'; }
  @keyframes eip-pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
  @keyframes eip-spin  { to { transform: rotate(360deg); } }
  /* Custom autocomplete dropdown — light theme */
  .inputbar { position: relative; }
  .autocomplete {
    position: absolute;
    /* Popup bottom edge = chat-wrap top edge (= chat top). Popup grows
       UPWARD into the PO-panel region above; chat content is never
       covered. */
    bottom: 100%;
    top: auto;
    left: 0; right: 0;
    box-sizing: border-box;       /* border counted IN width 100% */
    max-width: 100%;
    overflow-x: hidden;           /* no horizontal scroll */
    max-height: 480px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    display: none;
    z-index: 100;
    box-shadow: 0 -4px 16px rgba(43,42,38,0.10), 0 -2px 8px rgba(43,42,38,0.04);
  }
  .autocomplete-item { box-sizing: border-box; max-width: 100%; min-width: 0; }
  .autocomplete.active { display: block; }
  .autocomplete-item {
    padding: 10px 14px;
    cursor: pointer;
    color: var(--text);
    font: 14px/1.4 var(--font-ui);
    border-bottom: 1px solid var(--border);
    /* Badges now render before the name; pack items from the left so
       stock / days-of-cover are always visible without horizontal scroll. */
    display: flex; align-items: center; gap: 8px;
  }
  .autocomplete-item .ac-name {
    flex: 1 1 0; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .autocomplete-item .ac-qty {
    flex: 0 0 auto; font-size: 11px; padding: 2px 8px;
    border-radius: 10px; background: var(--panel2); color: var(--muted);
    font-weight: 600; white-space: nowrap;
  }
  .autocomplete-item .ac-qty.zero { background: #fff3cd; color: #856404; }
  .autocomplete-item .ac-qty.neg  { background: #f8d7da; color: #721c24; }
  .autocomplete-item .ac-cov {
    flex: 0 0 auto; font-size: 11px; padding: 2px 8px;
    border-radius: 10px; background: var(--panel2); color: var(--muted);
    font-weight: 600; white-space: nowrap;
  }
  .autocomplete-item .ac-cov.warn   { background: #fff3cd; color: #856404; }
  .autocomplete-item .ac-cov.urgent { background: #f8d7da; color: #721c24; }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover,
  .autocomplete-item.selected { background: rgba(204,120,92,0.18); color: var(--text); }
  /* Keep badges + mark text readable on the translucent hover background */
  .autocomplete-item mark { background: transparent; color: var(--accent); font-weight: 600; }
  .autocomplete-item.selected mark { color: var(--accent); text-decoration: underline; }
  /* Mode indicator below the input — tells user what Enter will do */
  .mode-hint {
    position: absolute;
    bottom: 100%;
    right: calc(var(--pad) + 90px);
    padding: 3px 10px;
    font: 500 11px/1.4 var(--font-ui);
    color: var(--muted);
    background: var(--panel2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    pointer-events: none;
    user-select: none;
  }
  .mode-hint.go { color: var(--accent2); background: rgba(101,148,102,0.1); }
  .mode-hint.edit { color: var(--accent); background: rgba(204,120,92,0.1); }
  .mode-hint.warn { color: var(--danger); background: rgba(200,74,74,0.1); }
  /* Collapsible backend-log panel. Floats above the inputbar so toggling
     never reflows chat / PO panes. Closed = single 22px summary line.
     Lifted 10px from inputbar so it does not visually fuse with the
     send row; chat gets extra bottom padding so messages aren't hidden
     behind the floating summary. */
  .log-panel {
    position: absolute;
    /* 3px gap from inputbar (matches PO margin-bottom + chat padding) */
    bottom: calc(100% + 3px);
    /* full chat-box width (match .inputbar / .chat edges), not inset
       inside inputbar padding */
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: 0 -4px 12px rgba(43,42,38,0.06);
    font-size: 11px;
  }
  .log-panel summary {
    cursor: pointer;
    padding: 4px 10px;
    color: var(--muted);
    user-select: none;
    list-style: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .log-panel summary::-webkit-details-marker { display: none; }
  .log-panel summary::before {
    content: '\25B8';
    display: inline-block;
    margin-right: 6px;
    transition: transform 0.15s;
  }
  .log-panel[open] summary::before { transform: rotate(90deg); }
  .log-body {
    max-height: 220px;
    overflow-y: auto;
    padding: 6px 10px 8px;
    border-top: 1px solid var(--border);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text);
  }
  .log-body .log-line {
    padding: 2px 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: var(--muted);
  }
  .log-body .log-line + .log-line {
    border-top: 1px dotted var(--border); margin-top: 2px; padding-top: 4px;
  }

  /* Time-appropriate greeting on landing */
  .greeting {
    padding: 14px var(--pad) 6px 58px;  /* left pad clears the 📋 drawer toggle (36px + 10 left + 12 gap) */
    font-family: var(--font-serif);
    font-size: 18px;
    color: var(--text);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.2px;
  }
  .greeting .emoji { margin-right: 6px; }
  .greeting .sub { color: var(--muted); font-size: 13px; margin-left: 8px; font-family: var(--font-ui); }

  /* Left drawer — order history accumulator.
     drawer + toggle use position:fixed (viewport-relative).  Do NOT make
     #app position:relative — that would trap them inside #app's stacking
     context and bury them under siblings with background colors. */
  .drawer-toggle {
    position: fixed; top: 10px; left: 10px; z-index: 100;
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--panel); border: 1px solid var(--border-strong);
    color: var(--text); cursor: pointer; font-size: 16px;
    box-shadow: 0 2px 6px rgba(43,42,38,0.12);
    /* iOS Safari centers emoji glyphs differently than Chrome -- force
       flex centering so the icon always sits in the middle regardless of
       the emoji's embedded baseline. */
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0; line-height: 1;
  }
  .drawer-toggle:hover { background: var(--panel2); }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    z-index: 90;                 /* above greeting/topbar, below toggle(100) */
    transform: translateX(-100%);
    transition: transform 0.2s ease-out;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); box-shadow: 4px 0 16px rgba(43,42,38,0.1); }
  .drawer-head {
    /* left pad clears the fixed 📋 toggle button (10+36+12 = 58px) */
    padding: 16px 16px 10px 58px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    min-height: 62px;   /* ≥ toggle's top:10 + 36 + breathing room */
  }
  .drawer-title {
    font-weight: 600; font-size: 14px; color: var(--text);
    letter-spacing: 0.3px;
  }
  .drawer-clear {
    background: transparent; border: none; color: var(--muted);
    font-size: 11px; cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .drawer-clear:hover { color: var(--danger); background: rgba(200,74,74,0.08); }
  .drawer-list {
    flex: 1; overflow-y: auto; padding: 8px;
    /* Firefox */
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }
  /* WebKit / Blink scrollbar -- artist cream + warm thumb */
  .drawer-list::-webkit-scrollbar { width: 8px; }
  .drawer-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .drawer-list::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
    border: 2px solid var(--panel);  /* pad thumb visually so it reads thinner */
    background-clip: padding-box;
  }
  .drawer-list::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
    background-clip: padding-box;
  }
  .drawer-foot {
    padding: 8px 10px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-start;
  }
  .drawer-empty {
    color: var(--muted); font-size: 12px; font-style: italic;
    text-align: center; padding: 20px 8px;
  }
  .drawer-item {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    transition: background 0.12s, border-color 0.12s;
    position: relative;
  }
  .drawer-item:hover { background: var(--panel2); border-color: var(--border-strong); }
  .drawer-item.active { background: rgba(204,120,92,0.08); border-color: var(--accent); }
  .drawer-item-vendor {
    font-weight: 600; font-size: 13px; color: var(--text);
    margin-bottom: 4px; padding-right: 32px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .drawer-item-stats {
    font-size: 11px; color: var(--muted);
    display: flex; gap: 8px;
  }
  .drawer-item-stats .amt { color: var(--accent); font-weight: 500; }
  .drawer-item-time {
    font-size: 10px; color: var(--muted); margin-top: 3px;
  }
  /* Stacked vertical icons at the right edge of the drawer item.
     Order (top->bottom): move (>), copy, delete (hover-only). */
  .drawer-item-del {
    position: absolute; top: 54px; right: 6px;
    background: rgba(59,109,176,0.10); border: 1px solid rgba(59,109,176,0.35);
    color: #3b6db0;
    font-size: 16px; line-height: 1; cursor: pointer;
    padding: 3px 6px; border-radius: 4px;
  }
  .drawer-item-del:hover { background: rgba(59,109,176,0.22); border-color: #3b6db0; }
  .drawer-item-del svg { width: 14px; height: 14px; display: block; stroke-width: 2; }
  /* Copy button: sits to the left of the delete button. Always visible
     on mobile (no hover), subtle on desktop until hover. */
  .drawer-item-copy {
    position: absolute; top: 30px; right: 6px;
    background: transparent; border: none; color: var(--muted);
    font-size: 15px; line-height: 1; cursor: pointer;
    padding: 2px 5px; border-radius: 3px;
    opacity: 0.5; transition: opacity 0.12s, color 0.12s;
  }
  .drawer-item:hover .drawer-item-copy { opacity: 1; }
  .drawer-item-copy:hover { color: var(--accent); background: rgba(204,120,92,0.1); }
  .drawer-item-copy.copied { color: var(--tone-final, #5a9a3a); opacity: 1; }
  .drawer-item-copy svg { width: 14px; height: 14px; display: block; }
  /* Move-to-panel arrow (right chevron) -- sits leftmost of the three. */
  .drawer-item-move {
    position: absolute; top: 6px; right: 6px;
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; padding: 2px 5px; border-radius: 3px;
    opacity: 0.7; transition: opacity 0.12s, color 0.12s, background 0.12s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .drawer-item:hover .drawer-item-move { opacity: 1; }
  .drawer-item-move:hover { color: var(--accent); background: rgba(204,120,92,0.10); }
  .drawer-item-move svg { width: 15px; height: 15px; display: block; }

  /* Inline PO editor -- replaces the markdown render while active. */
  .po-editor { font-family: var(--font-ui); font-size: 14px; }
  .po-editor .po-editor-toolbar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;                 /* add-row-inline wraps to its own full-width row */
    padding: 6px 0 10px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .po-editor .po-add-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 6px 14px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .po-editor .po-add-btn:hover { background: var(--accent-hover); }
  /* Spacer pushes Save + Cancel to the right edge of the editor toolbar. */
  .po-editor .po-editor-spacer { flex: 1 1 auto; }
  .po-editor .po-total-hint { margin-left: auto; color: var(--muted); font-size: 12px; }
  .po-editor .po-total-hint b { color: var(--text); font-weight: 600; }
  .po-editor h3 {
    font-size: 13px; margin: 14px 0 6px;
    color: var(--accent); font-family: var(--font-ui); font-weight: 600;
    letter-spacing: 0.02em;
  }
  .po-editor details.po-section { margin: 10px 0 4px; }
  .po-editor details.po-section > summary {
    cursor: pointer; user-select: none;

    padding: 6px 0;
    list-style: none;

  .po-editor details.po-section > summary::-webkit-details-marker { display: none; }
  .po-editor details.po-section > summary::before {
    content: '\25B8';

    margin-right: 6px;
    transition: transform 0.15s;
  }
  .po-editor details.po-section[open] > summary::before { transform: rotate(90deg); }
  .po-editor .po-section-count { color: var(--muted); font-weight: 400; font-size: 11px; }
  .po-editor .po-section-copy {
    margin-left: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 1px 10px;
    border-radius: 10px;
    cursor: pointer;
    vertical-align: middle;
  }
  .po-editor .po-section-copy:hover { color: var(--accent); border-color: var(--accent); }
  .po-editor .po-section-copy.copied { color: var(--tone-final, #5a9a3a); border-color: currentColor; }
  .po-editor .po-section-copy svg {
    width: 13px; height: 13px; vertical-align: middle; margin-top: -1px;
  }
  /* Copy button attached to section banners in read-only markdown view. */
  .po-view-copy {
    margin-left: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 10px;
    cursor: pointer;
    vertical-align: middle;
  }
  .po-view-copy:hover { color: var(--accent); border-color: var(--accent); }
  .po-view-copy.copied { color: var(--tone-final, #5a9a3a); border-color: currentColor; }
  .po-view-copy svg { width: 13px; height: 13px; vertical-align: middle; }
  .po-editor table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .po-editor th {
    text-align: left; padding: 4px 8px; color: var(--muted);
    font-weight: 500; font-size: 11px; letter-spacing: 0.05em;
    text-transform: uppercase; border-bottom: 1px solid var(--border);
  }
  .po-editor td {
    padding: 2px 8px; border-bottom: 1px solid var(--border);
    vertical-align: middle; line-height: 1.3;
  }
  .po-editor tbody tr { transition: background 0.1s ease; }
  .po-editor tbody tr:hover { background: rgba(204,120,92,0.05); }
  /* Editor: 5-col layout PRODUCT | STOCK | CASE | AMOUNT | NOTES.
     Widths match view mode; only col-qty (CASE) is editable. */
  .po-editor table { table-layout: fixed; }
  .po-editor td.col-product, .po-editor table th:nth-child(1) {
    width: 260px;
    white-space: normal;
    word-break: break-word;
  }
  .po-editor td.col-stock, .po-editor table th:nth-child(2) {
    width: 85px; text-align: right; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .po-editor table td.col-qty,
  .po-editor table th:nth-child(3) {
    width: 90px; text-align: center; padding: 2px 6px;
    font-variant-numeric: tabular-nums;
  }
  .po-editor table td.col-amt,
  .po-editor table th:nth-child(4) {
    width: 95px; text-align: right; padding-right: 14px;
    font-variant-numeric: tabular-nums;
  }
  .po-editor td.col-notes,
  .po-editor table th:nth-child(5) {
    font-size: 12px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Del button lives INSIDE the product cell (no dedicated column) so
     it costs zero table layout width. Trash icon, muted by default,
     subtle red tint on hover. */
  /* Line-delete button inside editor row -- always visible (iPhone has no
     hover). Blue tint + bordered box so it reads as a real tap target. */
  .po-editor td.col-product .del-btn {
    background: rgba(59,109,176,0.10); border: 1px solid rgba(59,109,176,0.35);
    color: #3b6db0; cursor: pointer;
    padding: 3px 6px;
    margin: 0 8px 0 -2px;
    border-radius: 4px;
    vertical-align: middle;
    font-size: 16px; line-height: 1;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .po-editor td.col-product .del-btn:hover {
    background: rgba(59,109,176,0.22); border-color: #3b6db0;
  }
  .po-editor td.col-product .del-btn:active { transform: scale(0.92); }
  .po-editor td.col-product .del-btn svg { width: 14px; height: 14px; display: block; stroke-width: 2; }
  .po-editor td.col-product .prod-name {
    vertical-align: middle;
    font-weight: 450; color: var(--text);
  }
  .po-editor input.qty-input {
    /* 72px wide + 12px right inner padding keeps 3-digit numbers (e.g. 999)
       visible with breathing room from the right border. Centered text so
       the number reads nicely even for 1-2 digit values. */
    width: 60px; padding: 2px 12px; border: 1px solid var(--border-strong);
    border-radius: 4px; background: var(--panel); color: var(--text);
    text-align: center; font: inherit;
    font-variant-numeric: tabular-nums;
    display: inline-block; vertical-align: middle;
    transition: border-color 0.12s ease, box-shadow 0.12s ease;
  }
  .po-editor input.qty-input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(204,120,92,0.18);
  }
  .po-editor .del-btn {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
  }
  .po-editor .del-btn:hover { color: var(--danger); }
  .po-editor .add-row-inline {
    position: relative; padding: 10px 8px; background: rgba(204,120,92,0.04);
    border: 1px dashed var(--accent); border-radius: var(--radius);
    margin: 8px 0;
    flex: 1 1 100%;                  /* break to its own line, fill width */
  }
  .po-editor .add-row-inline input {
    width: 100%; padding: 6px 10px; border: 1px solid var(--border-strong);
    border-radius: 4px; background: var(--panel); color: var(--text);
    font: inherit;
  }
  .po-editor .add-row-inline .autocomplete {
    bottom: auto; top: 100%;
  }
  .po-editor .add-row-actions {
    display: flex; gap: 8px; margin-top: 8px;
  }
  /* 5-col grid keeps stock / cost / price vertically aligned across rows. */
  .po-editor .autocomplete-item.ac-picker {
    display: grid;
    grid-template-columns: 16px minmax(0, 1fr) 60px 68px 68px;
    align-items: center;
    gap: 10px; cursor: pointer;
    padding: 6px 10px;
  }
  .po-editor .autocomplete-item .ac-check {
    width: 16px; height: 16px; cursor: pointer; margin: 0;
    accent-color: var(--accent);
  }
  .po-editor .autocomplete-item .ac-name {
    /* Hold up to ~60 chars with wrap. On iPhone the name column is narrow,
       wrapping to 2-4 lines keeps stock/cost/price visible in their own
       grid cells on the right (they stay vertically centered). */
    white-space: normal;
    word-break: break-word;
    line-height: 1.35;
  }
  .po-editor .autocomplete-item .ac-stock,
  .po-editor .autocomplete-item .ac-cost,
  .po-editor .autocomplete-item .ac-price {
    text-align: right; font-variant-numeric: tabular-nums;
  }
  .po-editor .autocomplete-item .ac-stock { color: var(--muted); font-size: 12px; }
  .po-editor .autocomplete-item .ac-cost  { color: var(--muted); font-weight: 500; }
  .po-editor .autocomplete-item .ac-price { color: var(--accent); font-weight: 600; }

  /* Back-to-live banner when viewing a historical PO */
  .history-banner {
    background: rgba(204,120,92,0.1);
    border-left: 3px solid var(--accent);
    padding: 8px 12px; margin: -10px -6px 10px -6px;
    font-size: 12px; color: var(--text);
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-banner button {
    background: var(--accent); color: #fff; border: none;
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    font-weight: 600; cursor: pointer;
  }
</style>

<body>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  // ── API base URL: same-origin when the page is itself served by the
  // FastAPI backend (dev via localhost, cloudflared via lo.*); points
  // to api-lo.empireintegration.com when the page is on GH Pages at
  // ui-lo.empireintegration.com. Names use dash separators so the
  // hostnames stay 1-level under Cloudflare Universal SSL coverage.
  const API_BASE = (() => {
    const h = location.hostname;
    if (h === 'ui-lo.empireintegration.com') return 'https://api-lo.empireintegration.com';
    return '';   // same-origin (localhost / lo.* / staging)
  })();
  const WS_BASE = (() => {
    if (!API_BASE) return '';
    return API_BASE.replace(/^http/, 'ws');  // https -> wss, http -> ws
  })();
  // Whether the page and API share the same origin. Controls fetch
  // credentials: same-origin keeps existing semantics; cross-origin must
  // switch to 'include' so the cookie flows.
  const _CROSS_ORIGIN_API = API_BASE !== '';
  const _FETCH_CREDS = _CROSS_ORIGIN_API ? 'include' : 'same-origin';

  // Cross-origin deploy (GH Pages UI -> tunneled API) needs every fetch to
  // carry the session cookie. Rather than touch every fetch site, wrap the
  // global fetch once: any call that doesn't explicitly set `credentials`
  // gets the right value injected. Explicit overrides still win.
  const _origFetch = window.fetch.bind(window);
  window.fetch = (input, init) => {
    const opts = init || {};
    if (opts.credentials === undefined) opts.credentials = _FETCH_CREDS;
    return _origFetch(input, opts);
  };

  // ── i18n scaffold ────────────────────────────────────────────────
  const I18N = {
    zh: {
      'store.label': '门店', 'vendor.label': '供应商',
      'store.placeholder': '加载门店…', 'vendor.placeholder': '先选门店',
      'store.select': '选择门店…', 'vendor.select': '选择供应商…',
      'label.current_po': '当前采购建议',
      'btn.refresh': '刷新', 'btn.email': '发送邮件',
      'btn.edit': '编辑', 'btn.save': '保存',
      'btn.cancel': '✕ 取消', 'btn.add_product': '+ 添加产品',
      'btn.clear': '✕ 清空', 'btn.send': '发送',
      'drawer.title': '已生成订单', 'drawer.empty': '暂无已生成订单',
      'log.show': 'show log',
      'unit.cases': '箱', 'col.product': '产品', 'col.cases': '箱',
      'col.stock': '库存', 'col.amount': '金额', 'col.notes': '备注',
      'section.empty': '(空)',
      'placeholder.po_init': '选择门店和供应商,将自动生成建议…',
      'placeholder.msg': '例:把 Tito 砍一半 / 加 2 箱 Jameson / 选产品 回车生成',
      'tooltip.copy': '复制订单给业务员',
      'tooltip.edit': '编辑', 'tooltip.delete': '删除',
      'tooltip.back_to_drawer': '移到订单 bucket',
      'tooltip.to_panel': '移到订单面板',
      'tooltip.retire_selected': '退役选中项 (仅本机)',
      'tooltip.select_all': '全选 / 取消全选',
      'tooltip.restore': '恢复',
      'retire.title': '已退役 (本机)',
      'retire.hint': '仅本机记录;未同步到服务器。清浏览器数据会丢失。',
      'msg.saved': '已保存',
      'section.urgent': '急需',
      'section.volatile': '波动',
      'section.standard': '常规补货',
      'section.discontinuing': '建议退役',
      'section.negative': '负库存',
      'holiday.today': '今天',
      'holiday.days_away': '{N} 天后',
      'holiday.demand': '需求 {X}x',
    },
    en: {
      'store.label': 'Store', 'vendor.label': 'Vendor',
      'store.placeholder': 'Loading stores...', 'vendor.placeholder': 'Select a store first',
      'store.select': 'Select store...', 'vendor.select': 'Select vendor...',
      'label.current_po': 'Current Order',
      'btn.refresh': 'Refresh', 'btn.email': 'Send Email',
      'btn.edit': 'Edit', 'btn.save': 'Save',
      'btn.cancel': 'x Cancel', 'btn.add_product': '+ Add Product',
      'btn.clear': 'x Clear', 'btn.send': 'Send',
      'drawer.title': 'Generated Orders', 'drawer.empty': 'No generated orders yet',
      'log.show': 'show log',
      'unit.cases': 'cs', 'col.product': 'Product', 'col.cases': 'Case',
      'col.stock': 'Stock', 'col.amount': 'Amount', 'col.notes': 'Notes',
      'section.empty': '(empty)',
      'placeholder.po_init': 'Select store and vendor; a suggestion will be generated...',
      'placeholder.msg': 'e.g. cut Tito in half / add 2 cases of Jameson / pick product and press Enter',
      'tooltip.copy': 'Copy order for salesman',
      'tooltip.edit': 'Edit', 'tooltip.delete': 'Delete',
      'tooltip.back_to_drawer': 'Move to order bucket',
      'tooltip.to_panel': 'Move to order panel',
      'tooltip.retire_selected': 'Retire selected (local only)',
      'tooltip.select_all': 'Select / deselect all',
      'tooltip.restore': 'Restore',
      'retire.title': 'Retired (local)',
      'retire.hint': 'Local-only; not synced to server. Clearing browser data loses this.',
      'msg.saved': 'Saved',
      'section.urgent': 'Urgent',
      'section.volatile': 'Volatile',
      'section.standard': 'Standard reorder',
      'section.discontinuing': 'Discontinuing',
      'section.negative': 'Negative stock',
      'holiday.today': 'today',
      'holiday.days_away': 'in {N} days',
      'holiday.demand': '{X}x demand',
    },
  };
  let currentLang = localStorage.getItem('eip_lang') || 'zh';
  function t(key) {
    return (I18N[currentLang] && I18N[currentLang][key])
        || I18N.zh[key] || key;
  }
  // LLM-emitted section banners are literal text (not dict keys). Map
  // either language literal to a dict key for display-time translation.
  const SECTION_ALIASES = {
    '建议退役': 'section.discontinuing', 'discontinuing': 'section.discontinuing',
    '急需': 'section.urgent', 'urgent': 'section.urgent',
    '波动': 'section.volatile', 'volatile': 'section.volatile',
    '常规补货': 'section.standard', 'standard reorder': 'section.standard',
    'standard': 'section.standard',
    '负库存': 'section.negative', 'negative stock': 'section.negative',
    'negative': 'section.negative',
  };
  function translateSectionTitle(raw) {
    if (!raw) return raw;
    const key = SECTION_ALIASES[raw.trim().toLowerCase()]
             || SECTION_ALIASES[raw.trim()];
    return key ? t(key) : raw;
  }
  // Rewrite any top-level bold banner (<p><strong> or <summary><strong>)
  // whose text maps to a known section alias. Catches sections that the
  // parser skipped (e.g. "negative stock") but which marked.js still
  // rendered as a banner in the DOM.
  function translateAllBanners(root) {
    if (!root) return;
    root.querySelectorAll('p > strong:first-child, summary > strong:first-child').forEach(s => {
      const translated = translateSectionTitle(s.textContent);
      if (translated !== s.textContent) s.textContent = translated;
    });
  }
  function applyI18n(root) {
    root = root || document;
    root.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    root.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPlaceholder);
    });
    root.querySelectorAll('[data-i18n-title]').forEach(el => {
      el.title = t(el.dataset.i18nTitle);
    });
    root.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
      el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
    });
  }
  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('eip_lang', lang);
    document.documentElement.lang = lang;
    applyI18n();
    // Re-run dynamic renderers so innerHTML-built labels pick up new lang.
    // Log any render errors -- silent catch hides bugs (e.g. user thinks
    // data is lost when it's actually a render throw in en path).
    try { if (typeof renderHistory === 'function') renderHistory(); }
    catch (e) { console.error('setLang renderHistory failed:', e); }
    try { if (typeof renderPOPanel === 'function') renderPOPanel(); }
    catch (e) { console.error('setLang renderPOPanel failed:', e); }
    try {
      if (typeof _editingPO !== 'undefined' && _editingPO
          && typeof renderPOEditor === 'function') renderPOEditor(_editingPO.parsed);
    } catch (e) { console.error('setLang renderPOEditor failed:', e); }
    try { if (typeof renderHolidayBanner === 'function') renderHolidayBanner(); }
    catch (e) { console.error('setLang renderHolidayBanner failed:', e); }
    // Broadcast so ad-hoc renderers (greeting, cache status) can re-run.
    window.dispatchEvent(new CustomEvent('lang-changed'));
  }
  // Wire dropdown (langSel exists in topbar HTML).
  const langSel = $('langSel');
  if (langSel) {
    langSel.value = currentLang;
    langSel.addEventListener('change', e => setLang(e.target.value));
  }
  document.documentElement.lang = currentLang;
  // Defer first applyI18n until the rest of startup has run and all
  // data-i18n annotated elements exist -- called after loadHistory / etc.

  const storeSel = $('storeSel');
  const vendorSel = $('vendorSel');
  const poBody = $('poBody');
  const chat = $('chat');
  const msgInput = $('msgInput');
  const sendBtn = $('sendBtn');
  const cancelBtn = $('cancelBtn');

  let sessionId = null;
  let poBuffer = '';
  let generating = false;

  const logBody = document.getElementById('logBody');
  const addMsg = (text, cls) => {
    // Sys messages (progress / errors / cancellation notices / chain
    // events) route to the collapsible log panel so the chat surface
    // stays clean. Other classes (user/ai/etc) still land in chat.
    if (cls === 'sys') {
      const d = document.createElement('div');
      d.className = 'log-line';
      d.textContent = text;
      logBody.appendChild(d);
      logBody.scrollTop = logBody.scrollHeight;
      return d;
    }
    const d = document.createElement('div');
    d.className = 'msg ' + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  };

  // ─────────────────── Custom autocomplete ──────────────────────────
  const acEl = document.getElementById('autocomplete');
  const modeHintEl = document.getElementById('modeHint');
  let _products = [];           // array of {name, vendor_id}
  let _acSelected = -1;         // highlighted item index
  let _goPending = null;        // {name, vendor_id} — set when user selects from AC
                                // Next Enter triggers "generate" path, not "edit"

  const updateProductSuggestions = (md) => {
    if (!md) return;
    const names = new Set();
    md.split('\n').forEach(line => {
      const m = line.match(/^\|\s*([^|]+?)\s*\|/);
      if (m) names.add(m[1].trim());
    });
    _products = [...names].filter(n => {
      if (!n || n.length < 3) return false;
      if (/^-+$/.test(n)) return false;
      const lower = n.toLowerCase();
      return !['product', 'name', 'cases', 'qty'].includes(lower);
    }).sort((a, b) => a.localeCompare(b));
    console.log('[autocomplete] products loaded:', _products.length,
                _products.slice(0, 3));
  };

  // Cross-browser copy. Two paths:
  //   1. navigator.clipboard.writeText -- modern, requires HTTPS / secure
  //      context. Chrome desktop on localhost works; iOS Safari over plain
  //      HTTP rejects silently.
  //   2. execCommand fallback -- iOS Safari requires the textarea to be
  //      INSIDE the viewport (off-screen left:-9999px is rejected),
  //      contentEditable=true, and selection set via Range (not .select).
  async function copyToClipboard(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (_e) { /* fall through to fallback */ }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.readOnly = false;
    ta.contentEditable = 'true';
    // 1x1 inside viewport (iOS rejects off-screen). Opacity 0 hides it.
    // font-size:16px keeps iOS from auto-zooming.
    ta.style.cssText =
      'position:fixed;top:0;left:0;width:1px;height:1px;' +
      'opacity:0;border:0;padding:0;margin:0;font-size:16px;';
    document.body.appendChild(ta);
    const prevSel = document.getSelection();
    const prevRange = prevSel && prevSel.rangeCount > 0 ? prevSel.getRangeAt(0) : null;
    // iOS-safe selection: Range over content + textarea selectionRange.
    const range = document.createRange();
    range.selectNodeContents(ta);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try { ta.setSelectionRange(0, text.length); } catch (_e) {}
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_e) {}
    document.body.removeChild(ta);
    if (prevRange && prevSel) { prevSel.removeAllRanges(); prevSel.addRange(prevRange); }
    return ok;
  }

  // Copy / Check icon SVGs (Feather-ish, claude.ai-style clipboard).
  // SVG icons (Feather-style), commercial-grade. currentColor so they
  // inherit the button's text color and respond to hover / disabled.
  // Edit these SVG paths here to restyle everywhere.
  const ICON_COPY = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  const ICON_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  const ICON_TRASH = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>';
  const ICON_ARROW_LEFT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>';
  const ICON_ARROW_RIGHT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
  // Archive-style box for retire: not destructive (restorable), unlike trash.
  const ICON_ARCHIVE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="5" rx="1"></rect><path d="M21 8v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8"></path><line x1="10" y1="12" x2="14" y2="12"></line></svg>';
  const escapeHtml = (s) => s.replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const highlightMatch = (name, query) => {
    if (!query) return escapeHtml(name);
    const idx = name.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return escapeHtml(name);
    return escapeHtml(name.slice(0, idx))
      + '<mark>' + escapeHtml(name.slice(idx, idx + query.length)) + '</mark>'
      + escapeHtml(name.slice(idx + query.length));
  };

  const findWordToComplete = (text, caret) => {
    // Return the "current word" being typed at the caret — the last run of
    // non-space chars.  Edit commands like "减 1 箱 tito" should match "tito".
    const before = text.slice(0, caret);
    const m = before.match(/[^\s,;。,;]*$/);
    return { word: (m ? m[0] : ''), start: caret - (m ? m[0].length : 0) };
  };

  // Multi-strategy product matcher:
  //   1. Current word at caret (legacy)
  //   2. If input has multiple meaningful tokens, match products whose name
  //      contains ALL of them (e.g. "mark west 1.5" → "Mark West Pinot Noir 1.5L")
  const refreshAutocomplete = () => {
    const raw = msgInput.value;
    // iOS Safari sometimes returns selectionStart=0 right after input
    // event fires (caret position not yet committed). When that happens
    // and raw is non-empty, pretend caret is at end of input so we can
    // still pick up the typed word. This avoids autocomplete showing
    // nothing on iPhone.
    let caret = msgInput.selectionStart;
    if (!caret && raw) caret = raw.length;
    if (!caret) caret = 0;
    const { word } = findWordToComplete(raw, caret);
    let matches = [];
    let highlightKey = '';
    console.log('[ac] raw=%o word=%o caret=%d _products.len=%d sample=%o',
      raw, word, caret, _products.length, _products[0]);

    if (_products.length > 0) {
      // Strategy 1: current word (short typing)
      let q1 = word;
      if (q1.length < 2) {
        // Caret sits after a space/comma -- current "word" is empty.
        // Fall back to the last non-empty token before the caret so
        // "josh " / "josh " still match "josh".
        const prior = raw.slice(0, caret).split(/[\s,;。,;]+/).filter(Boolean);
        if (prior.length > 0) q1 = prior[prior.length - 1];
      }
      if (q1.length >= 2) {
        const q = q1.toLowerCase();
        matches = _products.filter(p => p.name.toLowerCase().includes(q));
        highlightKey = q1;
      }

      // Strategy 2: full-input token AND match (fallback when strategy 1 empty)
      if (matches.length === 0) {
        const tokens = raw.toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fff\s.]/g, ' ')   // keep letters/digits/CJK/dots
          .split(/\s+/)
          .filter(t => t.length >= 2);
        // Drop common non-product Chinese words
        const STOP = new Set(['查','查询','数量','多少','库存','价格','多少钱','有吗','还有']);
        const productTokens = tokens.filter(t => !STOP.has(t));
        if (productTokens.length >= 2) {
          matches = _products.filter(p => {
            const name = p.name.toLowerCase();
            return productTokens.every(t => name.includes(t));
          });
          // Use the longest matching token for highlighting
          highlightKey = productTokens.sort((a,b) => b.length - a.length)[0];
        }
      }
    }

    matches = matches.slice(0, 12);
    if (matches.length === 0) {
      acEl.classList.remove('active');
      updateModeHint();
      return;
    }
    _acSelected = 0;
    acEl.innerHTML = matches
      .map((p, i) => {
        const q = (p.qty_on_hand ?? null);
        const dc = (p.days_of_cover ?? null);
        const qtyTxt = q === null ? '' :
          `<span class="ac-qty${q < 0 ? ' neg' : (q === 0 ? ' zero' : '')}">库存 ${q}</span>`;
        const dcTxt = dc === null ? '' :
          `<span class="ac-cov${dc <= 7 ? ' urgent' : (dc <= 21 ? ' warn' : '')}">撑 ${dc} 天</span>`;
        // Layout: [product name] [qty badge] [cov badge]
        return `<div class="autocomplete-item${i===0?' selected':''}" data-idx="${i}">` +
               `<span class="ac-name">${highlightMatch(p.name, highlightKey)}</span>${qtyTxt}${dcTxt}` +
               `</div>`;
      })
      .join('');
    acEl.classList.add('active');
    acEl._matches = matches;
  };

  const applySelection = (product) => {
    // product = {name, vendor_id}
    const caret = msgInput.selectionStart || 0;
    const { word, start } = findWordToComplete(msgInput.value, caret);
    const before = msgInput.value.slice(0, start);
    const after = msgInput.value.slice(caret);
    msgInput.value = before + product.name + after;
    const newCaret = (before + product.name).length;
    msgInput.setSelectionRange(newCaret, newCaret);
    acEl.classList.remove('active');
    // Mark: next Enter triggers GO (generate), not edit.
    _goPending = product;
    updateModeHint();
    msgInput.focus();
  };

  const updateModeHint = () => {
    const hasStore = !!storeSel.value;
    const v = msgInput.value.trim();
    const canGo = _goPending && v === _goPending.name && hasStore;
    const canEdit = !!sessionId && !!v;
    const canQuery = hasStore && !!v && !sessionId;  // ad-hoc product lookup
    sendBtn.disabled = generating || !(canGo || canEdit || canQuery);

    if (!hasStore) {
      modeHintEl.textContent = '⚠ 请先选门店';
      modeHintEl.className = 'mode-hint warn';
      modeHintEl.title = '必须先在顶部下拉框选一个门店才能发送消息';
    } else if (canGo) {
      modeHintEl.textContent = '▶ Enter 生成 PO';
      modeHintEl.className = 'mode-hint go';
      modeHintEl.title = 'Analysis (完整分析):\n'
        + '从 autocomplete 选中产品名后按 Enter,AI 会针对该产品对应的供应商,'
        + '结合库存 / 销量 / 历史 PO / 节日等生成完整采购建议 (分类: 急需 / 波动 / 常规 / 退役).';
    } else if (canEdit) {
      modeHintEl.textContent = '💬 Enter 编辑 PO';
      modeHintEl.className = 'mode-hint edit';
      modeHintEl.title = 'Chat (对话调整):\n'
        + '对已生成的采购建议做修改. 例: "把 Tito 减半" / "加 5 箱 Jameson" / '
        + '"移除 Fireball" / "整体上调 10%". AI 保留上下文, 只发增量指令即可.';
    } else if (canQuery) {
      modeHintEl.textContent = '🔍 Enter 查询库存';
      modeHintEl.className = 'mode-hint go';
      modeHintEl.title = 'QuickChat (快速查询):\n'
        + '无需生成 PO, 直接输入产品名 + Enter. 立即返回当前库存 / 30 天销量 / '
        + '上次 PO 箱数 / 撑天数. 适合电话接单时核查.';
    } else {
      modeHintEl.textContent = '';
      modeHintEl.className = 'mode-hint';
      modeHintEl.title = '';
    }
  };

  // ── Go path: reverse-lookup vendor, set dropdowns, trigger generate ───
  async function triggerGoFromProduct(product) {
    if (!storeSel.value) {
      addMsg('⚠ 请先选门店', 'sys');
      return;
    }
    if (!product.vendor_id) {
      addMsg(`⚠ 产品「${product.name}」未绑定供应商`, 'sys');
      return;
    }
    // Ensure the vendor dropdown has the option (it should, since catalog
    // was filtered to active vendors).  If not, we bail.
    const vendorOpt = Array.from(vendorSel.options)
      .find(o => o.value === product.vendor_id);
    if (!vendorOpt) {
      addMsg(`⚠ 供应商 ${product.vendor_id} 不在可选列表`, 'sys');
      return;
    }
    vendorSel.value = product.vendor_id;
    msgInput.value = '';
    _goPending = null;
    updateModeHint();
    addMsg(`▶ 按产品「${product.name}」→ 供应商「${vendorOpt.text}」生成 PO`, 'sys');
    await generatePO();
  }

  // SQL / destructive patterns — reject on the client too for fast feedback.
  const SQL_BAD_RE = /\b(drop|truncate|delete|insert|update|alter|create|grant|revoke|exec|execute|xp_cmdshell|union\s+(?:all\s+)?select)\b|--|\/\*|\*\/|(['"]\s*(?:or|and)\s+['"\d])|;\s*(?:drop|truncate|delete|insert|update|alter|exec)/i;

  msgInput.addEventListener('input', () => {
    if (msgInput.value.length > 300) {
      msgInput.value = msgInput.value.slice(0, 300);
      addMsg('⚠ 最多 300 字', 'sys');
    }
    if (SQL_BAD_RE.test(msgInput.value)) {
      addMsg('⚠ 检测到危险 SQL 关键字,已清空', 'sys');
      msgInput.value = '';
    }
    if (_goPending && msgInput.value.trim() !== _goPending.name) {
      _goPending = null;
    }
    refreshAutocomplete();
    updateModeHint();
  });
  msgInput.addEventListener('focus', refreshAutocomplete);
  msgInput.addEventListener('blur', () => {
    // Delay so click on item fires first
    setTimeout(() => acEl.classList.remove('active'), 200);
  });
  // IMPORTANT: this listener must fire BEFORE the sendEdit Enter handler
  // registered later.  addEventListener order is insertion order, so we
  // use capture:true to guarantee we see the event first and can stop it
  // when the dropdown is active.
  msgInput.addEventListener('keydown', (e) => {
    if (!acEl.classList.contains('active')) return;
    const items = acEl.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault(); e.stopImmediatePropagation();
      _acSelected = Math.min(_acSelected + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('selected', i === _acSelected));
      items[_acSelected]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); e.stopImmediatePropagation();
      _acSelected = Math.max(_acSelected - 1, 0);
      items.forEach((el, i) => el.classList.toggle('selected', i === _acSelected));
      items[_acSelected]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' || e.key === 'Tab') {
      if (_acSelected >= 0 && acEl._matches) {
        e.preventDefault(); e.stopImmediatePropagation();
        applySelection(acEl._matches[_acSelected]);
      }
    } else if (e.key === 'Escape') {
      e.stopImmediatePropagation();
      acEl.classList.remove('active');
    }
  }, { capture: true });
  acEl.addEventListener('mousedown', (e) => {
    // mousedown fires before blur, so we can select without losing focus
    const item = e.target.closest('.autocomplete-item');
    if (!item || !acEl._matches) {
      // Tap on popup background (non-item area) closes the popup.
      // preventDefault so input keeps focus and caret position.
      e.preventDefault();
      acEl.classList.remove('active');
      return;
    }
    e.preventDefault();
    const idx = parseInt(item.dataset.idx, 10);
    applySelection(acEl._matches[idx]);
  });
  // Tap outside popup (and outside the input) closes it immediately.
  // pointerdown covers both mouse and touch without the 200ms blur delay.
  document.addEventListener('pointerdown', (e) => {
    if (!acEl.classList.contains('active')) return;
    if (e.target === msgInput || acEl.contains(e.target)) return;
    acEl.classList.remove('active');
  });

  const setPO = (text, streaming) => {
    // While the user is editing the PO, don't clobber the editor DOM
    // (streaming generation / refresh cache must not steal focus).
    if (typeof _editingPO !== 'undefined' && _editingPO) return;
    poBody.className = streaming ? 'streaming' : '';
    if (!text) {
      poBody.textContent = '(无内容)';
    } else if (window.marked && /[#|]/.test(text)) {
      poBody.innerHTML = window.marked.parse(text);
      flagRetireeRows(poBody);
      if (!streaming) {
        wrapSectionsIntoAccordion(text);
        attachSectionCopyButtons(text);
      }
    } else {
      poBody.textContent = text;
    }
    poBody.scrollTop = poBody.scrollHeight;
  };

  function wrapSectionsIntoAccordion(md, root, skipTitle, keyPrefix) {
    // Post-process the marked-rendered DOM in `root` (default poBody) so
    // each section (banner <p> + content until next banner) becomes a
    // collapsible <details>. Scoped so it can run inside a single vendor
    // sub-panel without touching other sub-panels.
    // keyPrefix lets each inner <details> tag itself with a stable
    // data-state-key so the outer render can snapshot/restore open
    // state across full-panel re-renders.
    root = root || poBody;
    const parsed = parsePOMarkdown(md || '');
    if (parsed.sections.length === 0) return;
    const titles = new Set(parsed.sections.map(s => s.title));
    const boundaries = [];
    for (const el of Array.from(root.children)) {
      const strong = el.querySelector ? el.querySelector('strong') : null;
      if (!strong) continue;
      const txt = strong.textContent.trim();
      if (titles.has(txt)) boundaries.push({ el, title: txt });
    }
    // Walk reversed so DOM indices stay stable while we mutate.
    for (let i = boundaries.length - 1; i >= 0; i--) {
      const { el: bannerP, title } = boundaries[i];
      if (bannerP.dataset.accordionWrapped) continue;
      if (skipTitle && title === skipTitle) {
        // Banner duplicates the outer vendor-panel title -- remove.
        bannerP.remove();
        continue;
      }
      const isRetire = /建议退役|retire|discontinu/i.test(title);
      const nextBanner = boundaries[i + 1]?.el || null;
      const between = [];
      let cursor = bannerP.nextSibling;
      while (cursor && cursor !== nextBanner) {
        const next = cursor.nextSibling;
        between.push(cursor);
        cursor = next;
      }
      const details = document.createElement('details');
      details.className = 'po-view-section';
      if (keyPrefix) details.dataset.stateKey = keyPrefix + ':' + title;
      if (!isRetire) details.setAttribute('open', '');
      // Translate the banner's <strong> text in place before we move it
      // into the summary. Non-mapped titles (vendor / product names)
      // stay as-is.
      const strongEl = bannerP.querySelector('strong');
      if (strongEl) {
        const translated = translateSectionTitle(strongEl.textContent);
        if (translated !== strongEl.textContent) strongEl.textContent = translated;
      }
      const summary = document.createElement('summary');
      summary.className = 'po-view-section-title';
      while (bannerP.firstChild) summary.appendChild(bannerP.firstChild);
      details.appendChild(summary);
      for (const node of between) details.appendChild(node);
      bannerP.parentNode.replaceChild(details, bannerP);
      // Mark so attachSectionCopyButtons won't re-wrap if called later.
      summary.dataset.accordionWrapped = '1';
    }
  }

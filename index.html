<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#faf9f5">
<title>Smart Reorder</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<!-- Login overlay. Hidden by default; flipped visible at startup if
     /api/auth/me returns 401. Main app stays behind and gets shown only
     after successful login. -->
<div id="loginOverlay" class="login-overlay" style="display:none">
  <form id="loginForm" class="login-card" autocomplete="on">
    <h2 class="login-title">Sign in</h2>
    <div class="login-field">
      <label for="loginUser">Username</label>
      <input id="loginUser" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" required>
    </div>
    <div class="login-field">
      <label for="loginPass">Password</label>
      <input id="loginPass" type="password" autocomplete="current-password" required>
    </div>
    <label class="login-remember">
      <input id="loginRemember" type="checkbox" checked>
      <span>Remember me on this device</span>
    </label>
    <div id="loginError" class="login-error" style="display:none"></div>
    <button type="submit" class="login-submit">Sign in</button>
  </form>
</div>
<div id="app">
  <button id="drawerToggle" class="drawer-toggle" title="展开历史订单">📋</button>
  <aside id="drawer" class="drawer">
    <div class="drawer-head">
      <span class="drawer-title" data-i18n="drawer.title">已生成订单</span>
    </div>
    <div id="drawerList" class="drawer-list"></div>
    <div class="drawer-foot">
      <button id="drawerClear" class="drawer-clear" data-i18n="btn.clear">✕ 清空</button>
    </div>
  </aside>
  <div id="greeting" class="greeting"></div>
  <div class="topbar">
    <select id="storeSel" aria-label="Store" data-i18n-aria-label="store.label">
      <option value="" data-i18n="store.placeholder">加载门店…</option>
    </select>
    <select id="vendorSel" aria-label="Vendor" data-i18n-aria-label="vendor.label" disabled>
      <option value="" data-i18n="vendor.placeholder">先选门店</option>
    </select>
    <select id="langSel" class="lang-select" aria-label="Language">
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
    <span id="apiStatus" class="api-status checking"
          title="Checking server..."></span>
  </div>

  <div class="po" id="po">
    <div class="po-toolbar">
      <span class="po-title" data-i18n="label.current_po">当前采购建议</span>
      <span id="holidayBanner" class="holiday-banner" style="display:none"></span>
      <span class="po-meta">
        <span id="cacheAge"></span>
        <span id="timer"></span>
      </span>
      <span class="po-actions">
        <button id="refreshCacheBtn" class="btn btn-ghost">
          <span class="btn-icon">🔄</span> <span data-i18n="btn.refresh">刷新</span>
        </button>
        <button id="cancelBtn" class="btn btn-cancel" style="display:none" data-i18n="btn.cancel">✕ 取消</button>
        <button id="editPoBtn" class="btn btn-secondary" style="display:none">
          <span class="btn-icon">✎</span> <span data-i18n="btn.edit">编辑</span>
        </button>
        <button id="savePoBtn" class="btn btn-secondary" style="display:none">
          <span class="btn-icon">💾</span> <span data-i18n="btn.save">保存</span>
        </button>
        <button id="emailBtn" class="btn btn-secondary" disabled>
          <span class="btn-icon">✉</span> <span data-i18n="btn.email">发送邮件</span>
        </button>
        <button id="batchEliotBtn" class="btn btn-secondary"
                title="Eliot: 生成全部供应商并按 ORDER / TRANSFER 分组发邮件">
          批量 Eliot
          <span class="batch-status-dot" id="batchStatus_1" title="今日批量未发送"></span>
        </button>
        <button id="batchBriarBtn" class="btn btn-secondary"
                title="Briarwood: 生成全部供应商并按 ORDER / TRANSFER 分组发邮件">
          批量 Briarwood
          <span class="batch-status-dot" id="batchStatus_2" title="今日批量未发送"></span>
        </button>
      </span>
    </div>
    <!-- Live streaming output. Sibling to poBody so renderPOPanel does
         not blow it away, and so existing vendor cards in poBody stay
         visible/interactive while a new vendor is mid-stream. -->
    <div id="streamingArea" class="streaming-area" hidden></div>
    <div class="placeholder" id="poBody" data-i18n="placeholder.po_init">选择门店和供应商,将自动生成建议…</div>
  </div>

  <div class="chat-wrap">
    <div id="autocomplete" class="autocomplete"></div>
    <div class="chat" id="chat"></div>
  </div>

  <div class="inputbar">
    <details id="logPanel" class="log-panel">
      <summary data-i18n="log.show">show log</summary>
      <div id="logBody" class="log-body"></div>
    </details>
    <div id="modeHint" class="mode-hint"></div>
    <input id="msgInput" type="text" autocomplete="off"
           data-i18n-placeholder="placeholder.msg"
           placeholder="例:把 Tito 砍一半 / 加 2 箱 Jameson / 选产品 回车生成"
           enterkeyhint="send">
    <button id="sendBtn" disabled data-i18n="btn.send">发送</button>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  // ── API base URL: same-origin when the page is itself served by the
  // FastAPI backend (dev via localhost, cloudflared via lo.*); points
  // to api-lo.empireintegration.com when the page is on GH Pages at
  // ui-lo.empireintegration.com. Names use dash separators so the
  // hostnames stay 1-level under Cloudflare Universal SSL coverage.
  const API_BASE = (() => {
    const h = location.hostname;
    if (h === 'ui-lo.empireintegration.com') return 'https://api-lo.empireintegration.com';
    return '';   // same-origin (localhost / lo.* / staging)
  })();
  const WS_BASE = (() => {
    if (!API_BASE) return '';
    return API_BASE.replace(/^http/, 'ws');  // https -> wss, http -> ws
  })();
  // Whether the page and API share the same origin. Controls fetch
  // credentials: same-origin keeps existing semantics; cross-origin must
  // switch to 'include' so the cookie flows.
  const _CROSS_ORIGIN_API = API_BASE !== '';
  const _FETCH_CREDS = _CROSS_ORIGIN_API ? 'include' : 'same-origin';

  // Auth token stored alongside (or instead of) the session cookie.
  // iOS Safari (ITP) + any browser with "Block All Cookies" drops our
  // cross-origin cookie between ui-lo and api-lo, producing a login loop.
  // We keep the same token in localStorage and send it as
  // Authorization: Bearer on every API request -- the server's auth gate
  // accepts whichever arrives. Cookie stays primary when the browser
  // honors it; the header is the iPhone fallback that stops the loop.
  const EIP_TOKEN_KEY = 'eip_auth_token';
  const EIP_TOKEN_EXP_KEY = 'eip_auth_token_exp';
  function _getStoredToken() {
    try {
      const t = localStorage.getItem(EIP_TOKEN_KEY);
      if (!t) return '';
      const exp = parseInt(localStorage.getItem(EIP_TOKEN_EXP_KEY) || '0', 10);
      if (exp && exp < Date.now()) {
        localStorage.removeItem(EIP_TOKEN_KEY);
        localStorage.removeItem(EIP_TOKEN_EXP_KEY);
        return '';
      }
      return t;
    } catch (_e) { return ''; }
  }
  function _setStoredToken(token, maxAgeSeconds) {
    try {
      if (!token) {
        localStorage.removeItem(EIP_TOKEN_KEY);
        localStorage.removeItem(EIP_TOKEN_EXP_KEY);
        return;
      }
      localStorage.setItem(EIP_TOKEN_KEY, token);
      if (maxAgeSeconds && maxAgeSeconds > 0) {
        localStorage.setItem(EIP_TOKEN_EXP_KEY, String(Date.now() + maxAgeSeconds * 1000));
      } else {
        localStorage.removeItem(EIP_TOKEN_EXP_KEY);
      }
    } catch (_e) { /* quota / private mode -- fall through */ }
  }

  // Cross-origin deploy (GH Pages UI -> tunneled API) needs every fetch to
  // carry the session cookie AND (iOS fallback) an Authorization header.
  // Wrap the global fetch once: any call that doesn't explicitly set
  // credentials / Authorization gets the right value injected.
  const _origFetch = window.fetch.bind(window);
  window.fetch = (input, init) => {
    const opts = init || {};
    if (opts.credentials === undefined) opts.credentials = _FETCH_CREDS;
    // Only add Authorization for same-origin or known-API cross-origin
    // requests. Don't leak the token to third-party hosts a future
    // feature might fetch from.
    const url = (typeof input === 'string') ? input : (input && input.url) || '';
    const isApi = url.startsWith('/') || url.startsWith(API_BASE) ||
                  (!API_BASE && url.startsWith(location.origin));
    if (isApi) {
      const tok = _getStoredToken();
      if (tok) {
        const h = new Headers(opts.headers || {});
        if (!h.has('Authorization')) h.set('Authorization', 'Bearer ' + tok);
        opts.headers = h;
      }
    }
    return _origFetch(input, opts);
  };

  // ── i18n scaffold ────────────────────────────────────────────────
  const I18N = {
    zh: {
      'store.label': '门店', 'vendor.label': '供应商',
      'store.placeholder': '加载门店…', 'vendor.placeholder': '先选门店',
      'store.select': '选择门店…', 'vendor.select': '选择供应商…',
      'label.current_po': '当前采购建议',
      'btn.refresh': '刷新', 'btn.email': '发送邮件',
      'btn.edit': '编辑', 'btn.save': '保存',
      'btn.cancel': '✕ 取消', 'btn.add_product': '+ 添加产品',
      'btn.clear': '✕ 清空', 'btn.send': '发送',
      'drawer.title': '已生成订单', 'drawer.empty': '暂无已生成订单',
      'log.show': 'show log',
      'unit.cases': '箱', 'col.product': '产品', 'col.cases': '箱',
      'col.stock': '库存', 'col.amount': '金额', 'col.notes': '备注',
      'section.empty': '(空)',
      'placeholder.po_init': '选择门店和供应商,将自动生成建议…',
      'placeholder.msg': '例:把 Tito 砍一半 / 加 2 箱 Jameson / 选产品 回车生成',
      'tooltip.copy': '复制订单给业务员',
      'tooltip.copy_stock': '复制低库存调拨清单 (有销售 + 在手低于阈值: 750ml+ <6, 200/375ml <10, 50ml <30)',
      'tooltip.send_email': '邮件发送 (订单 + 调拨清单各一封, 含一键重生成链接)',
      'tooltip.edit': '编辑', 'tooltip.delete': '删除',
      'tooltip.back_to_drawer': '移到订单 bucket',
      'tooltip.to_panel': '移到订单面板',
      'tooltip.retire_selected': '退役选中项 (仅本机)',
      'tooltip.select_all': '全选 / 取消全选',
      'tooltip.restore': '恢复',
      'retire.title': '已退役 (本机)',
      'retire.hint': '仅本机记录;未同步到服务器。清浏览器数据会丢失。',
      'msg.saved': '已保存',
      'section.urgent': '急需',
      'section.volatile': '波动',
      'section.standard': '常规补货',
      'section.discontinuing': '建议退役',
      'section.negative': '负库存',
      'holiday.today': '今天',
      'holiday.days_away': '{N} 天后',
      'holiday.demand': '需求 {X}x',
    },
    en: {
      'store.label': 'Store', 'vendor.label': 'Vendor',
      'store.placeholder': 'Loading stores...', 'vendor.placeholder': 'Select a store first',
      'store.select': 'Select store...', 'vendor.select': 'Select vendor...',
      'label.current_po': 'Current Order',
      'btn.refresh': 'Refresh', 'btn.email': 'Send Email',
      'btn.edit': 'Edit', 'btn.save': 'Save',
      'btn.cancel': 'x Cancel', 'btn.add_product': '+ Add Product',
      'btn.clear': 'x Clear', 'btn.send': 'Send',
      'drawer.title': 'Generated Orders', 'drawer.empty': 'No generated orders yet',
      'log.show': 'show log',
      'unit.cases': 'cs', 'col.product': 'Product', 'col.cases': 'Case',
      'col.stock': 'Stock', 'col.amount': 'Amount', 'col.notes': 'Notes',
      'section.empty': '(empty)',
      'placeholder.po_init': 'Select store and vendor; a suggestion will be generated...',
      'placeholder.msg': 'e.g. cut Tito in half / add 2 cases of Jameson / pick product and press Enter',
      'tooltip.copy': 'Copy order for salesman',
      'tooltip.copy_stock': 'Copy low-stock transfer list (sales + on-hand below threshold: 750ml+ <6, 200/375ml <10, 50ml <30)',
      'tooltip.send_email': 'Send email (order + transfer list, with regen tap-link)',
      'tooltip.edit': 'Edit', 'tooltip.delete': 'Delete',
      'tooltip.back_to_drawer': 'Move to order bucket',
      'tooltip.to_panel': 'Move to order panel',
      'tooltip.retire_selected': 'Retire selected (local only)',
      'tooltip.select_all': 'Select / deselect all',
      'tooltip.restore': 'Restore',
      'retire.title': 'Retired (local)',
      'retire.hint': 'Local-only; not synced to server. Clearing browser data loses this.',
      'msg.saved': 'Saved',
      'section.urgent': 'Urgent',
      'section.volatile': 'Volatile',
      'section.standard': 'Standard reorder',
      'section.discontinuing': 'Discontinuing',
      'section.negative': 'Negative stock',
      'holiday.today': 'today',
      'holiday.days_away': 'in {N} days',
      'holiday.demand': '{X}x demand',
    },
  };
  let currentLang = localStorage.getItem('eip_lang') || 'zh';
  function t(key) {
    return (I18N[currentLang] && I18N[currentLang][key])
        || I18N.zh[key] || key;
  }
  // LLM-emitted section banners are literal text (not dict keys). Map
  // either language literal to a dict key for display-time translation.
  const SECTION_ALIASES = {
    '建议退役': 'section.discontinuing', 'discontinuing': 'section.discontinuing',
    '急需': 'section.urgent', 'urgent': 'section.urgent',
    '波动': 'section.volatile', 'volatile': 'section.volatile',
    '常规补货': 'section.standard', 'standard reorder': 'section.standard',
    'standard': 'section.standard',
    '负库存': 'section.negative', 'negative stock': 'section.negative',
    'negative': 'section.negative',
  };
  function translateSectionTitle(raw) {
    if (!raw) return raw;
    const key = SECTION_ALIASES[raw.trim().toLowerCase()]
             || SECTION_ALIASES[raw.trim()];
    return key ? t(key) : raw;
  }
  // Rewrite any top-level bold banner (<p><strong> or <summary><strong>)
  // whose text maps to a known section alias. Catches sections that the
  // parser skipped (e.g. "negative stock") but which marked.js still
  // rendered as a banner in the DOM.
  function translateAllBanners(root) {
    if (!root) return;
    root.querySelectorAll('p > strong:first-child, summary > strong:first-child').forEach(s => {
      const translated = translateSectionTitle(s.textContent);
      if (translated !== s.textContent) s.textContent = translated;
    });
  }
  function applyI18n(root) {
    root = root || document;
    root.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    root.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPlaceholder);
    });
    root.querySelectorAll('[data-i18n-title]').forEach(el => {
      el.title = t(el.dataset.i18nTitle);
    });
    root.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
      el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
    });
  }
  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('eip_lang', lang);
    document.documentElement.lang = lang;
    applyI18n();
    // Re-run dynamic renderers so innerHTML-built labels pick up new lang.
    // Log any render errors -- silent catch hides bugs (e.g. user thinks
    // data is lost when it's actually a render throw in en path).
    try { if (typeof renderHistory === 'function') renderHistory(); }
    catch (e) { console.error('setLang renderHistory failed:', e); }
    try { if (typeof renderPOPanel === 'function') renderPOPanel(); }
    catch (e) { console.error('setLang renderPOPanel failed:', e); }
    try {
      if (typeof _editingPO !== 'undefined' && _editingPO
          && typeof renderPOEditor === 'function') renderPOEditor(_editingPO.parsed);
    } catch (e) { console.error('setLang renderPOEditor failed:', e); }
    try { if (typeof renderHolidayBanner === 'function') renderHolidayBanner(); }
    catch (e) { console.error('setLang renderHolidayBanner failed:', e); }
    // Broadcast so ad-hoc renderers (greeting, cache status) can re-run.
    window.dispatchEvent(new CustomEvent('lang-changed'));
  }
  // Wire dropdown (langSel exists in topbar HTML).
  const langSel = $('langSel');
  if (langSel) {
    langSel.value = currentLang;
    langSel.addEventListener('change', e => setLang(e.target.value));
  }
  document.documentElement.lang = currentLang;
  // Defer first applyI18n until the rest of startup has run and all
  // data-i18n annotated elements exist -- called after loadHistory / etc.

  const storeSel = $('storeSel');
  const vendorSel = $('vendorSel');
  const poBody = $('poBody');
  const chat = $('chat');
  const msgInput = $('msgInput');
  const sendBtn = $('sendBtn');
  const cancelBtn = $('cancelBtn');

  let sessionId = null;
  let poBuffer = '';
  let generating = false;

  const logBody = document.getElementById('logBody');
  const addMsg = (text, cls) => {
    // Sys messages (progress / errors / cancellation notices / chain
    // events) route to the collapsible log panel so the chat surface
    // stays clean. Other classes (user/ai/etc) still land in chat.
    if (cls === 'sys') {
      const d = document.createElement('div');
      d.className = 'log-line';
      d.textContent = text;
      logBody.appendChild(d);
      logBody.scrollTop = logBody.scrollHeight;
      return d;
    }
    const d = document.createElement('div');
    d.className = 'msg ' + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
  };

  // ─────────────────── Custom autocomplete ──────────────────────────
  const acEl = document.getElementById('autocomplete');
  const modeHintEl = document.getElementById('modeHint');
  let _products = [];           // array of {name, vendor_id}
  let _acSelected = -1;         // highlighted item index
  let _goPending = null;        // {name, vendor_id} — set when user selects from AC
                                // Next Enter triggers "generate" path, not "edit"

  const updateProductSuggestions = (md) => {
    if (!md) return;
    const names = new Set();
    md.split('\n').forEach(line => {
      const m = line.match(/^\|\s*([^|]+?)\s*\|/);
      if (m) names.add(m[1].trim());
    });
    _products = [...names].filter(n => {
      if (!n || n.length < 3) return false;
      if (/^-+$/.test(n)) return false;
      const lower = n.toLowerCase();
      return !['product', 'name', 'cases', 'qty'].includes(lower);
    }).sort((a, b) => a.localeCompare(b));
    console.log('[autocomplete] products loaded:', _products.length,
                _products.slice(0, 3));
  };

  // Cross-browser copy. Two paths:
  //   1. navigator.clipboard.writeText -- modern, requires HTTPS / secure
  //      context. Chrome desktop on localhost works; iOS Safari over plain
  //      HTTP rejects silently.
  //   2. execCommand fallback -- iOS Safari requires the textarea to be
  //      INSIDE the viewport (off-screen left:-9999px is rejected),
  //      contentEditable=true, and selection set via Range (not .select).
  async function copyToClipboard(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (_e) { /* fall through to fallback */ }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.readOnly = false;
    ta.contentEditable = 'true';
    // 1x1 inside viewport (iOS rejects off-screen). Opacity 0 hides it.
    // font-size:16px keeps iOS from auto-zooming.
    ta.style.cssText =
      'position:fixed;top:0;left:0;width:1px;height:1px;' +
      'opacity:0;border:0;padding:0;margin:0;font-size:16px;';
    document.body.appendChild(ta);
    const prevSel = document.getSelection();
    const prevRange = prevSel && prevSel.rangeCount > 0 ? prevSel.getRangeAt(0) : null;
    // iOS-safe selection: Range over content + textarea selectionRange.
    const range = document.createRange();
    range.selectNodeContents(ta);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try { ta.setSelectionRange(0, text.length); } catch (_e) {}
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_e) {}
    document.body.removeChild(ta);
    if (prevRange && prevSel) { prevSel.removeAllRanges(); prevSel.addRange(prevRange); }
    return ok;
  }

  // Copy / Check icon SVGs (Feather-ish, claude.ai-style clipboard).
  // SVG icons (Feather-style), commercial-grade. currentColor so they
  // inherit the button's text color and respond to hover / disabled.
  // Edit these SVG paths here to restyle everywhere.
  const ICON_COPY = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  const ICON_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>';
  const ICON_TRASH = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>';
  const ICON_ARROW_LEFT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>';
  const ICON_ARROW_RIGHT = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
  // Archive-style box for retire: not destructive (restorable), unlike trash.
  const ICON_ARCHIVE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="5" rx="1"></rect><path d="M21 8v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8"></path><line x1="10" y1="12" x2="14" y2="12"></line></svg>';
  // Two horizontal arrows pointing opposite directions -- universal
  // "transfer / exchange between two locations" symbol. Maps directly
  // to the use case: move stock from a sister store to this one.
  // Distinct from the copy-rectangles icon at a glance.
  const ICON_LOW_STOCK = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 3 20 7 16 11"></polyline><line x1="4" y1="7" x2="20" y2="7"></line><polyline points="8 13 4 17 8 21"></polyline><line x1="20" y1="17" x2="4" y2="17"></line></svg>';
  // Paper plane (send): used for the manual email send button. Distinct
  // from the copy / transfer / archive icons. Same family (single-color
  // line art) so the button row stays visually coherent.
  const ICON_SEND = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
  const escapeHtml = (s) => s.replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const highlightMatch = (name, query) => {
    if (!query) return escapeHtml(name);
    const idx = name.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return escapeHtml(name);
    return escapeHtml(name.slice(0, idx))
      + '<mark>' + escapeHtml(name.slice(idx, idx + query.length)) + '</mark>'
      + escapeHtml(name.slice(idx + query.length));
  };

  const findWordToComplete = (text, caret) => {
    // Return the "current word" being typed at the caret — the last run of
    // non-space chars.  Edit commands like "减 1 箱 tito" should match "tito".
    const before = text.slice(0, caret);
    const m = before.match(/[^\s,;。,;]*$/);
    return { word: (m ? m[0] : ''), start: caret - (m ? m[0].length : 0) };
  };

  // Multi-strategy product matcher:
  //   1. Current word at caret (legacy)
  //   2. If input has multiple meaningful tokens, match products whose name
  //      contains ALL of them (e.g. "mark west 1.5" → "Mark West Pinot Noir 1.5L")
  const refreshAutocomplete = () => {
    const raw = msgInput.value;
    // iOS Safari sometimes returns selectionStart=0 right after input
    // event fires (caret position not yet committed). When that happens
    // and raw is non-empty, pretend caret is at end of input so we can
    // still pick up the typed word. This avoids autocomplete showing
    // nothing on iPhone.
    let caret = msgInput.selectionStart;
    if (!caret && raw) caret = raw.length;
    if (!caret) caret = 0;
    const { word } = findWordToComplete(raw, caret);
    let matches = [];
    let highlightKey = '';
    console.log('[ac] raw=%o word=%o caret=%d _products.len=%d sample=%o',
      raw, word, caret, _products.length, _products[0]);

    if (_products.length > 0) {
      // Strategy 1: current word (short typing)
      let q1 = word;
      if (q1.length < 2) {
        // Caret sits after a space/comma -- current "word" is empty.
        // Fall back to the last non-empty token before the caret so
        // "josh " / "josh " still match "josh".
        const prior = raw.slice(0, caret).split(/[\s,;。,;]+/).filter(Boolean);
        if (prior.length > 0) q1 = prior[prior.length - 1];
      }
      if (q1.length >= 2) {
        const q = q1.toLowerCase();
        matches = _products.filter(p => p.name.toLowerCase().includes(q));
        highlightKey = q1;
      }

      // Strategy 2: full-input token AND match (fallback when strategy 1 empty)
      if (matches.length === 0) {
        const tokens = raw.toLowerCase()
          .replace(/[^a-z0-9\u4e00-\u9fff\s.]/g, ' ')   // keep letters/digits/CJK/dots
          .split(/\s+/)
          .filter(t => t.length >= 2);
        // Drop common non-product Chinese words
        const STOP = new Set(['查','查询','数量','多少','库存','价格','多少钱','有吗','还有']);
        const productTokens = tokens.filter(t => !STOP.has(t));
        if (productTokens.length >= 2) {
          matches = _products.filter(p => {
            const name = p.name.toLowerCase();
            return productTokens.every(t => name.includes(t));
          });
          // Use the longest matching token for highlighting
          highlightKey = productTokens.sort((a,b) => b.length - a.length)[0];
        }
      }
    }

    matches = matches.slice(0, 12);
    if (matches.length === 0) {
      acEl.classList.remove('active');
      updateModeHint();
      return;
    }
    _acSelected = 0;
    acEl.innerHTML = matches
      .map((p, i) => {
        const q = (p.qty_on_hand ?? null);
        const dc = (p.days_of_cover ?? null);
        const qtyTxt = q === null ? '' :
          `<span class="ac-qty${q < 0 ? ' neg' : (q === 0 ? ' zero' : '')}">库存 ${q}</span>`;
        const dcTxt = dc === null ? '' :
          `<span class="ac-cov${dc <= 7 ? ' urgent' : (dc <= 21 ? ' warn' : '')}">撑 ${dc} 天</span>`;
        // Layout: [product name] [qty badge] [cov badge]
        return `<div class="autocomplete-item${i===0?' selected':''}" data-idx="${i}">` +
               `<span class="ac-name">${highlightMatch(p.name, highlightKey)}</span>${qtyTxt}${dcTxt}` +
               `</div>`;
      })
      .join('');
    acEl.classList.add('active');
    acEl._matches = matches;
  };

  const applySelection = (product) => {
    // product = {name, vendor_id}
    const caret = msgInput.selectionStart || 0;
    const { word, start } = findWordToComplete(msgInput.value, caret);
    const before = msgInput.value.slice(0, start);
    const after = msgInput.value.slice(caret);
    msgInput.value = before + product.name + after;
    const newCaret = (before + product.name).length;
    msgInput.setSelectionRange(newCaret, newCaret);
    acEl.classList.remove('active');
    // Mark: next Enter triggers GO (generate), not edit.
    _goPending = product;
    updateModeHint();
    msgInput.focus();
  };

  const updateModeHint = () => {
    const hasStore = !!storeSel.value;
    const v = msgInput.value.trim();
    const canGo = _goPending && v === _goPending.name && hasStore;
    const canEdit = !!sessionId && !!v;
    const canQuery = hasStore && !!v && !sessionId;  // ad-hoc product lookup
    sendBtn.disabled = generating || !(canGo || canEdit || canQuery);

    if (!hasStore) {
      modeHintEl.textContent = '⚠ 请先选门店';
      modeHintEl.className = 'mode-hint warn';
      modeHintEl.title = '必须先在顶部下拉框选一个门店才能发送消息';
    } else if (canGo) {
      modeHintEl.textContent = '▶ Enter 生成 PO';
      modeHintEl.className = 'mode-hint go';
      modeHintEl.title = 'Analysis (完整分析):\n'
        + '从 autocomplete 选中产品名后按 Enter,AI 会针对该产品对应的供应商,'
        + '结合库存 / 销量 / 历史 PO / 节日等生成完整采购建议 (分类: 急需 / 波动 / 常规 / 退役).';
    } else if (canEdit) {
      modeHintEl.textContent = '💬 Enter 编辑 PO';
      modeHintEl.className = 'mode-hint edit';
      modeHintEl.title = 'Chat (对话调整):\n'
        + '对已生成的采购建议做修改. 例: "把 Tito 减半" / "加 5 箱 Jameson" / '
        + '"移除 Fireball" / "整体上调 10%". AI 保留上下文, 只发增量指令即可.';
    } else if (canQuery) {
      modeHintEl.textContent = '🔍 Enter 查询库存';
      modeHintEl.className = 'mode-hint go';
      modeHintEl.title = 'QuickChat (快速查询):\n'
        + '无需生成 PO, 直接输入产品名 + Enter. 立即返回当前库存 / 30 天销量 / '
        + '上次 PO 箱数 / 撑天数. 适合电话接单时核查.';
    } else {
      modeHintEl.textContent = '';
      modeHintEl.className = 'mode-hint';
      modeHintEl.title = '';
    }
  };

  // ── Go path: reverse-lookup vendor, set dropdowns, trigger generate ───
  async function triggerGoFromProduct(product) {
    if (!storeSel.value) {
      addMsg('⚠ 请先选门店', 'sys');
      return;
    }
    if (!product.vendor_id) {
      addMsg(`⚠ 产品「${product.name}」未绑定供应商`, 'sys');
      return;
    }
    // Ensure the vendor dropdown has the option (it should, since catalog
    // was filtered to active vendors).  If not, we bail.
    const vendorOpt = Array.from(vendorSel.options)
      .find(o => o.value === product.vendor_id);
    if (!vendorOpt) {
      addMsg(`⚠ 供应商 ${product.vendor_id} 不在可选列表`, 'sys');
      return;
    }
    vendorSel.value = product.vendor_id;
    msgInput.value = '';
    _goPending = null;
    updateModeHint();
    addMsg(`▶ 按产品「${product.name}」→ 供应商「${vendorOpt.text}」生成 PO`, 'sys');
    await generatePO();
  }

  // SQL / destructive patterns — reject on the client too for fast feedback.
  const SQL_BAD_RE = /\b(drop|truncate|delete|insert|update|alter|create|grant|revoke|exec|execute|xp_cmdshell|union\s+(?:all\s+)?select)\b|--|\/\*|\*\/|(['"]\s*(?:or|and)\s+['"\d])|;\s*(?:drop|truncate|delete|insert|update|alter|exec)/i;

  msgInput.addEventListener('input', () => {
    if (msgInput.value.length > 300) {
      msgInput.value = msgInput.value.slice(0, 300);
      addMsg('⚠ 最多 300 字', 'sys');
    }
    if (SQL_BAD_RE.test(msgInput.value)) {
      addMsg('⚠ 检测到危险 SQL 关键字,已清空', 'sys');
      msgInput.value = '';
    }
    if (_goPending && msgInput.value.trim() !== _goPending.name) {
      _goPending = null;
    }
    refreshAutocomplete();
    updateModeHint();
  });
  msgInput.addEventListener('focus', refreshAutocomplete);
  msgInput.addEventListener('blur', () => {
    // Delay so click on item fires first
    setTimeout(() => acEl.classList.remove('active'), 200);
  });
  // IMPORTANT: this listener must fire BEFORE the sendEdit Enter handler
  // registered later.  addEventListener order is insertion order, so we
  // use capture:true to guarantee we see the event first and can stop it
  // when the dropdown is active.
  msgInput.addEventListener('keydown', (e) => {
    if (!acEl.classList.contains('active')) return;
    const items = acEl.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault(); e.stopImmediatePropagation();
      _acSelected = Math.min(_acSelected + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('selected', i === _acSelected));
      items[_acSelected]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); e.stopImmediatePropagation();
      _acSelected = Math.max(_acSelected - 1, 0);
      items.forEach((el, i) => el.classList.toggle('selected', i === _acSelected));
      items[_acSelected]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' || e.key === 'Tab') {
      if (_acSelected >= 0 && acEl._matches) {
        e.preventDefault(); e.stopImmediatePropagation();
        applySelection(acEl._matches[_acSelected]);
      }
    } else if (e.key === 'Escape') {
      e.stopImmediatePropagation();
      acEl.classList.remove('active');
    }
  }, { capture: true });
  acEl.addEventListener('mousedown', (e) => {
    // mousedown fires before blur, so we can select without losing focus
    const item = e.target.closest('.autocomplete-item');
    if (!item || !acEl._matches) {
      // Tap on popup background (non-item area) closes the popup.
      // preventDefault so input keeps focus and caret position.
      e.preventDefault();
      acEl.classList.remove('active');
      return;
    }
    e.preventDefault();
    const idx = parseInt(item.dataset.idx, 10);
    applySelection(acEl._matches[idx]);
  });
  // Tap outside popup (and outside the input) closes it immediately.
  // pointerdown covers both mouse and touch without the 200ms blur delay.
  document.addEventListener('pointerdown', (e) => {
    if (!acEl.classList.contains('active')) return;
    if (e.target === msgInput || acEl.contains(e.target)) return;
    acEl.classList.remove('active');
  });

  const setPO = (text, streaming) => {
    // While the user is editing the PO, don't clobber the editor DOM
    // (streaming generation / refresh cache must not steal focus).
    if (typeof _editingPO !== 'undefined' && _editingPO) return;
    poBody.className = streaming ? 'streaming' : '';
    if (!text) {
      poBody.textContent = '(无内容)';
    } else if (window.marked && /[#|]/.test(text)) {
      poBody.innerHTML = window.marked.parse(text);
      flagRetireeRows(poBody);
      if (!streaming) {
        wrapSectionsIntoAccordion(text);
        attachSectionCopyButtons(text);
      }
    } else {
      poBody.textContent = text;
    }
    poBody.scrollTop = poBody.scrollHeight;
  };

  // Live-stream sink for in-progress gen. Writes to #streamingArea
  // which is a SIBLING of poBody, so existing vendor cards (with
  // collapsible <details> + copy/edit/retire buttons) stay rendered
  // and interactive while a new vendor is mid-stream. Pass on=false
  // to clear / hide the area when gen finishes (or errors).
  const _streamAreaEl = document.getElementById('streamingArea');
  function setStreamArea(text, on, label) {
    if (!_streamAreaEl) return;
    if (typeof _editingPO !== 'undefined' && _editingPO) return;
    if (!on) {
      _streamAreaEl.hidden = true;
      _streamAreaEl.innerHTML = '';
      return;
    }
    _streamAreaEl.hidden = false;
    const labelHtml = label
      ? '<div class="streaming-label"><span><span class="pulse"></span>' + escapeHtml(label) + '</span></div>'
      : '';
    let body;
    if (!text) {
      body = '<pre>(empty)</pre>';
    } else if (window.marked && /[#|]/.test(text)) {
      body = window.marked.parse(text);
    } else {
      body = '<pre>' + escapeHtml(text) + '</pre>';
    }
    _streamAreaEl.innerHTML = labelHtml + body;
    _streamAreaEl.scrollTop = _streamAreaEl.scrollHeight;
  }

  function wrapSectionsIntoAccordion(md, root, skipTitle, keyPrefix) {
    // Post-process the marked-rendered DOM in `root` (default poBody) so
    // each section (banner <p> + content until next banner) becomes a
    // collapsible <details>. Scoped so it can run inside a single vendor
    // sub-panel without touching other sub-panels.
    // keyPrefix lets each inner <details> tag itself with a stable
    // data-state-key so the outer render can snapshot/restore open
    // state across full-panel re-renders.
    root = root || poBody;
    const parsed = parsePOMarkdown(md || '');
    if (parsed.sections.length === 0) return;
    const titles = new Set(parsed.sections.map(s => s.title));
    const boundaries = [];
    for (const el of Array.from(root.children)) {
      const strong = el.querySelector ? el.querySelector('strong') : null;
      if (!strong) continue;
      const txt = strong.textContent.trim();
      if (titles.has(txt)) boundaries.push({ el, title: txt });
    }
    // Walk reversed so DOM indices stay stable while we mutate.
    for (let i = boundaries.length - 1; i >= 0; i--) {
      const { el: bannerP, title } = boundaries[i];
      if (bannerP.dataset.accordionWrapped) continue;
      if (skipTitle && title === skipTitle) {
        // Banner duplicates the outer vendor-panel title -- remove.
        bannerP.remove();
        continue;
      }
      const isRetire = /建议退役|retire|discontinu/i.test(title);
      const nextBanner = boundaries[i + 1]?.el || null;
      const between = [];
      let cursor = bannerP.nextSibling;
      while (cursor && cursor !== nextBanner) {
        const next = cursor.nextSibling;
        between.push(cursor);
        cursor = next;
      }
      const details = document.createElement('details');
      details.className = 'po-view-section';
      if (keyPrefix) details.dataset.stateKey = keyPrefix + ':' + title;
      if (!isRetire) details.setAttribute('open', '');
      // Translate the banner's <strong> text in place before we move it
      // into the summary. Non-mapped titles (vendor / product names)
      // stay as-is.
      const strongEl = bannerP.querySelector('strong');
      if (strongEl) {
        const translated = translateSectionTitle(strongEl.textContent);
        if (translated !== strongEl.textContent) strongEl.textContent = translated;
      }
      const summary = document.createElement('summary');
      summary.className = 'po-view-section-title';
      while (bannerP.firstChild) summary.appendChild(bannerP.firstChild);
      details.appendChild(summary);
      for (const node of between) details.appendChild(node);
      bannerP.parentNode.replaceChild(details, bannerP);
      // Mark so attachSectionCopyButtons won't re-wrap if called later.
      summary.dataset.accordionWrapped = '1';
    }
  }

  function attachSectionCopyButtons(md, root) {
    root = root || poBody;
    const parsed = parsePOMarkdown(md || '');
    if (parsed.sections.length === 0) return;
    const strongs = root.querySelectorAll('strong');
    parsed.sections.forEach((s, si) => {
      for (const strong of strongs) {
        if (strong.dataset.copyAttached) continue;
        if (strong.textContent.trim() === s.title) {
          strong.dataset.copyAttached = '1';
          const btn = document.createElement('button');
          btn.className = 'po-view-copy';
          btn.dataset.si = String(si);
          btn.title = '复制本组订单给业务员';
          btn.setAttribute('aria-label', '复制');
          btn.innerHTML = ICON_COPY;
          strong.parentElement.insertBefore(btn, strong.nextSibling);
          break;
        }
      }
    });
  }

  // Highlight likely-retiree rows: 库存 0 + 历史 0 箱 (no recent sales OR purchases).
  function flagRetireeRows(root) {
    root.querySelectorAll('tr').forEach(tr => {
      const txt = tr.textContent || '';
      if (/6\s*月未采购/.test(txt) && !tr.classList.contains('no-purchase')) {
        tr.classList.add('no-purchase');
        const last = tr.lastElementChild;
        if (last) last.insertAdjacentHTML('beforeend', ' <span class="no-purchase-tag">6月未采购</span>');
        return;
      }
      if (/库存\s*0\b/.test(txt) && /历史\s*0\s*箱/.test(txt) && !tr.classList.contains('retiree')) {
        tr.classList.add('retiree');
        const last = tr.lastElementChild;
        if (last) last.insertAdjacentHTML('beforeend', ' <span class="retiree-tag">停止销售?</span>');
      }
    });
  }

  // ── PO gen table: data-driven MVVM layer ──────────────────────────
  // Parse the merged main PO gen table (first <table> inside vendor body
  // that holds the Product/Cases/Amount/Notes columns with cat-badge in
  // Notes) into a clean PORow[] data model, decoupled from DOM. Render
  // and sort happen from this array; clicking a column header re-renders
  // with a new sort. Retire / neg_stock sections stay untouched.
  //
  // PORow shape:
  //   { product, brandKey, stock, cases, amount, amountText, notes,
  //     priority ('U'|'H'|'N'), notesHtml (for rich cell) }
  //
  // parseMainPOTable supports both new (merged 1 table, cat-badge in notes)
  // and legacy (3 separate tables per priority section) markdown layouts.
  const _BRAND_SIZE_RE = /\s*\b(\d+(?:\.\d+)?)\s*(ml|l|oz|pk|pack)\b\.?/gi;
  function _brandKeyJs(name) {
    if (!name) return '';
    let s = String(name).toLowerCase().replace(_BRAND_SIZE_RE, '');
    s = s.replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
    return s;
  }
  // Extract numeric size in millilitres so sibling sizes sort in
  // natural volume order: 187ml < 375ml < 750ml < 1.5L. Returns 0
  // when no size is found (row still sorts but at the head of its
  // brand group).
  function _sizeMl(name) {
    const m = String(name || '').match(/\b(\d+(?:\.\d+)?)\s*(ml|l|oz|pk|pack)\b/i);
    if (!m) return 0;
    const n = parseFloat(m[1]);
    const u = m[2].toLowerCase();
    if (u === 'ml') return n;
    if (u === 'l')  return n * 1000;
    if (u === 'oz') return n * 29.5735;
    return n;  // pk / pack treated as small numeric
  }
  function _priorityFromCell(notesCell) {
    if (!notesCell) return 'N';
    if (notesCell.querySelector('.cat-badge.cat-urgent')) return 'U';
    if (notesCell.querySelector('.cat-badge.cat-volatile')) return 'H';
    if (notesCell.querySelector('.cat-badge.cat-standard')) return 'N';
    return 'N';
  }
  function _stripBadgeFromHtml(html) {
    return String(html || '')
      .replace(/<span class="cat-badge[^"]*">[^<]*<\/span>/g, '')
      .trim();
  }
  function _parseAmountNumber(s) {
    if (!s) return 0;
    const n = parseFloat(String(s).replace(/[^\d.-]/g, ''));
    return isFinite(n) ? n : 0;
  }
  // Name -> qty_on_hand map from _products cache; fallback when LLM notes
  // don't carry a "库存 N" value. DB is authoritative.
  function _productStockMap() {
    const m = new Map();
    for (const p of (_products || [])) {
      if (p && p.name && p.qty_on_hand != null) {
        m.set(p.name.toLowerCase(), Number(p.qty_on_hand));
      }
    }
    return m;
  }
  // After parsing, promote each row's priority to the highest (min rank)
  // found across any size of the same brand. This matches user rule:
  // "jim beam 750ml urgent + jim beam 1.75l normal -> whole brand urgent".
  // Rationale: brand is procured as a whole; once any size triggers
  // action, the buyer wants all siblings grouped at that urgency so
  // assortment + freight planning stays coherent.
  function promoteBrandPriority(rows) {
    const brandBest = new Map();
    for (const r of rows) {
      const rank = _CAT_RANK[r.priority] ?? 99;
      const prev = brandBest.get(r.brandKey);
      if (prev == null || rank < prev) brandBest.set(r.brandKey, rank);
    }
    const rankToCat = ['U', 'H', 'N'];
    for (const r of rows) {
      const best = brandBest.get(r.brandKey);
      if (best != null && best < 3) r.priority = rankToCat[best];
    }
    return rows;
  }

  function parseMainPOTable(body) {
    if (!body) return [];
    const stockMap = _productStockMap();
    // Scope: first <table> that sits BEFORE any "负库存" / "建议退役" marker.
    // Simpler rule: take only the first <table> as the main PO table. The
    // other tables in the body are the separate retire / neg_stock tables
    // emitted later in the markdown -- we don't touch those.
    const table = body.querySelector('table');
    if (!table) return [];
    const rows = [];
    const trList = table.querySelectorAll('tbody tr');
    for (const tr of trList) {
      const cells = tr.children;
      if (cells.length < 4) continue;           // not the expected shape
      const productCell = cells[0];
      const casesCell   = cells[1];
      const amountCell  = cells[2];
      const notesCell   = cells[3];
      const product = (productCell.textContent || '').trim();
      if (!product) continue;
      const priority = _priorityFromCell(notesCell);
      const notesHtml = _stripBadgeFromHtml(notesCell.innerHTML);
      const notesText = notesCell.textContent || '';
      const cases = parseInt((casesCell.textContent || '').trim(), 10) || 0;
      const amountText = (amountCell.textContent || '').trim();
      const amount = _parseAmountNumber(amountText);
      // Stock: POS cache first; fallback to "库存 N" regex from notes.
      let stock = stockMap.get(product.toLowerCase());
      if (stock == null) {
        const m = notesText.match(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*(-?\d+)/i);
        stock = m ? parseInt(m[1], 10) : null;
      }
      rows.push({
        product, brandKey: _brandKeyJs(product),
        sizeMl: _sizeMl(product),
        stock,
        cases, amount, amountText,
        notes: notesText.trim(),
        notesHtml,
        priority,
      });
    }
    return promoteBrandPriority(rows);
  }

  // ── Sort: brand-adjacent default OR per-column asc/desc ───────────
  const _CAT_RANK = { U: 0, H: 1, N: 2 };
  function _cmp(a, b) { return a < b ? -1 : a > b ? 1 : 0; }
  function brandAwareSort(rows) {
    // Mirrors services.po_regroup.regroup_within_bucket: bucket by priority,
    // within each bucket keep brand groups contiguous, sort brand groups by
    // min qty asc + brand alphabetical, inside brand group by (cat rank asc,
    // qty asc, name asc). Returns a NEW array.
    const buckets = { U: [], H: [], N: [] };
    for (const r of rows) (buckets[r.priority] || buckets.N).push(r);
    const out = [];
    for (const cat of ['U', 'H', 'N']) {
      const bucketRows = buckets[cat];
      if (!bucketRows.length) continue;
      const groups = new Map();
      const order = [];
      for (const r of bucketRows) {
        const bk = r.brandKey || r.product.toLowerCase();
        if (!groups.has(bk)) { groups.set(bk, []); order.push(bk); }
        groups.get(bk).push(r);
      }
      for (const bk of groups.keys()) {
        // Within a brand group: size ascending (187ml -> 1.5L), then
        // name as stable tiebreak. All members share the same promoted
        // priority already, so cat-rank is moot.
        groups.get(bk).sort((a, b) =>
          _cmp(a.sizeMl || 0, b.sizeMl || 0) ||
          _cmp(a.product.toLowerCase(), b.product.toLowerCase())
        );
      }
      order.sort((a, b) => {
        const qa = Math.min(...groups.get(a).map(r => r.stock ?? 0));
        const qb = Math.min(...groups.get(b).map(r => r.stock ?? 0));
        return _cmp(qa, qb) || _cmp(a, b);
      });
      for (const bk of order) out.push(...groups.get(bk));
    }
    return out;
  }
  function sortRows(rows, sortCfg) {
    if (!sortCfg || !sortCfg.col || sortCfg.dir == null) {
      return brandAwareSort(rows);
    }
    const { col, dir } = sortCfg;
    const factor = dir === 'desc' ? -1 : 1;
    const keyFn = {
      product : r => r.product.toLowerCase(),
      stock   : r => r.stock ?? -Infinity,
      cases   : r => r.cases ?? 0,
      amount  : r => r.amount ?? 0,
      notes   : r => (r.notes || '').toLowerCase(),
      priority: r => _CAT_RANK[r.priority] ?? 99,
    }[col] || (r => r.product.toLowerCase());
    const copy = rows.slice();
    copy.sort((a, b) => factor * _cmp(keyFn(a), keyFn(b)));
    return copy;
  }

  // ── Retire blacklist (local-only, staged for DB migration) ────────
  // Products added here are hidden from all PO main tables across every
  // vendor until restored via the retire panel. Storage is localStorage:
  // not synced across devices, lost on cache clear. Acceptable for v1.
  //
  // When moving to server-side persistence, an endpoint like
  // POST /api/admin/retire + DELETE /api/admin/retire/{name} writes into
  // a table roughly shaped like the SQL below. Table name is a placeholder
  // -- pick at migration time.
  //
  //   -- Suggested schema (SQL Server, adjust for your SQL dialect):
  //   CREATE TABLE {{retire_blacklist_table}} (
  //     store_id     NVARCHAR(8)   NOT NULL,
  //     product_name NVARCHAR(200) NOT NULL,
  //     created_at   DATETIME2     NOT NULL DEFAULT SYSUTCDATETIME(),
  //     created_by   NVARCHAR(50)  NULL,
  //     PRIMARY KEY (store_id, product_name)
  //   );
  //   -- Read:   SELECT product_name FROM {{retire_blacklist_table}}
  //   --          WHERE store_id = :store_id;
  //   -- Add:    INSERT INTO {{retire_blacklist_table}}
  //   --          (store_id, product_name, created_by)
  //   --          VALUES (:store_id, :product_name, :created_by);
  //   -- Remove: DELETE FROM {{retire_blacklist_table}}
  //   --          WHERE store_id = :store_id AND product_name = :product_name;
  const RETIRE_KEY = 'eip_retire_blacklist';
  function getRetireBlacklist() {
    try {
      const raw = localStorage.getItem(RETIRE_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      console.warn('[retire] blacklist parse failed:', e);
      return [];
    }
  }
  function setRetireBlacklist(arr) {
    const dedup = Array.from(new Set(arr.map(s => String(s).toLowerCase()).filter(Boolean)));
    _safeSetItem(RETIRE_KEY, JSON.stringify(dedup), 'retire');
  }
  function retireProducts(names) {
    if (!Array.isArray(names) || !names.length) return;
    const cur = new Set(getRetireBlacklist());
    for (const n of names) if (n) cur.add(String(n).toLowerCase());
    setRetireBlacklist(Array.from(cur));
    // Fat-finger recovery: auto-expand the retire panel after a retire
    // action so the just-retired items are immediately visible with the
    // restore button, no hunt-and-click.
    refreshRetireUI(true);
  }
  function unretireProduct(name) {
    const lower = String(name || '').toLowerCase();
    if (!lower) return;
    const next = getRetireBlacklist().filter(n => n !== lower);
    setRetireBlacklist(next);
    refreshRetireUI();
  }
  // Product-list filter used by loadAllProductNames cache + fetch paths.
  // Blacklisted products are dropped here so they never surface via
  // autocomplete, stock map, or any other _products-driven UI -- and the
  // on-disk localStorage cache stays raw (full catalog), so unretire can
  // bring them back without a re-fetch.
  function _filterVisibleProducts(items) {
    const blacklist = new Set(getRetireBlacklist().map(s => s.toLowerCase()));
    return (items || []).filter(p =>
      p && p.name && p.name.length >= 3 &&
      !blacklist.has(p.name.toLowerCase())
    );
  }
  // After a blacklist mutation, re-derive _products for the active store
  // straight from its raw localStorage cache -- no network hit. If the
  // cache is missing (first visit, cleared), leave _products as-is; next
  // loadAllProductNames call will apply the current filter.
  function _refreshActiveProductsFromCache() {
    try {
      const sid = storeSel && storeSel.value;
      if (!sid) return;
      const raw = localStorage.getItem(_productCacheKey(sid));
      if (!raw) return;
      const cached = JSON.parse(raw);
      if (Array.isArray(cached.items)) {
        _products = _filterVisibleProducts(cached.items);
      }
    } catch (e) {
      console.warn('[retire] refresh _products from cache failed:', e);
    }
  }
  // Mirror "any row checked?" -> vendor-retire button disabled. Called
  // after every table re-render (blacklist change, sort) + on checkbox
  // click. Cheap: one querySelector per vendor panel.
  function _syncVendorRetireEnabled(anyElt) {
    const vendor = anyElt && anyElt.closest ? anyElt.closest('.vendor-panel') : null;
    if (!vendor) return;
    const btn = vendor.querySelector('.vendor-retire');
    if (!btn) return;
    btn.disabled = !vendor.querySelector('.po-main-wrap .po-select:checked');
  }
  // Re-render every po-main-wrap using its cached viewState, then rebuild
  // the retire panel. Called after any blacklist mutation so views stay
  // coherent without a full server round-trip.
  function refreshRetireUI(expand) {
    document.querySelectorAll('.po-main-wrap').forEach(w => {
      if (w._poViewState) {
        w.innerHTML = renderPOTable(w._poViewState.rows, w._poViewState.sort);
        _syncVendorRetireEnabled(w);
      }
    });
    _refreshActiveProductsFromCache();
    renderRetirePanel(expand);
  }
  // Render (or remove) a single retire-panel inside poBody. Idempotent.
  // expand=true -> force the panel open (used right after a retire action
  // so fat-finger recovery via the per-item restore button is one click).
  function renderRetirePanel(expand) {
    if (!poBody) return;
    let panel = document.getElementById('retire-panel');
    const list = getRetireBlacklist().slice().sort();
    if (!list.length) {
      if (panel) panel.remove();
      return;
    }
    if (!panel) {
      panel = document.createElement('details');
      panel.id = 'retire-panel';
      panel.className = 'retire-panel';
      poBody.appendChild(panel);
    }
    if (expand) panel.open = true;
    const items = list.map(n =>
      `<li class="retire-item">
        <span class="retire-name" title="${escapeHtml(n)}">${escapeHtml(n)}</span>
        <button class="retire-restore" data-name="${escapeHtml(n)}" title="${t('tooltip.restore')}" aria-label="${t('tooltip.restore')}">${ICON_ARROW_RIGHT}</button>
       </li>`
    ).join('');
    panel.innerHTML =
      `<summary>${t('retire.title')} (${list.length})</summary>
       <div class="retire-hint">${t('retire.hint')}</div>
       <ul class="retire-list">${items}</ul>`;
  }

  // ── renderPOTable: pure function, state -> HTML string ────────────
  // Columns: Product | Select | Stock | Case | Amount | Notes | Priority.
  // Headers are sortable (click -> toggle dir; handled in next commit).
  // Restock highlight class applied at render time from _products cache
  // (reorder_level > qty_on_hand -> row class "row-restock-high").
  function renderPOTable(rows, sortCfg) {
    const sorted = sortRows(rows, sortCfg);
    // Retire blacklist filter: rows matching a retired product name are hidden
    // here (not deleted from state.rows) so unretiring restores them cheaply.
    const retired = new Set(getRetireBlacklist().map(s => s.toLowerCase()));
    const visible = retired.size
      ? sorted.filter(r => !retired.has((r.product || '').toLowerCase()))
      : sorted;
    const prodMeta = new Map();
    for (const p of (_products || [])) {
      if (p && p.name) prodMeta.set(p.name.toLowerCase(), p);
    }
    const cur = sortCfg || { col: 'priority', dir: null };
    const sortClass = (col) => {
      if (cur.col !== col || cur.dir == null) return '';
      return cur.dir === 'asc' ? ' sort-asc' : ' sort-desc';
    };
    // Sortable columns, in display order. The select column is injected
    // between product (col 1) and stock (col 3) below, OUTSIDE this list so
    // its <th> gets neither .sortable nor data-col (click won't trigger sort).
    const sortableHead = [
      ['product',  'PRODUCT'],  ['stock',    'STOCK'],
      ['cases',    'CASE'],     ['amount',   'AMOUNT'],
      ['notes',    'NOTES'],    ['priority', 'PRIORITY'],
    ].map(([k, label]) =>
      `<th class="sortable col-${k}${sortClass(k)}" data-col="${k}">${label}</th>`
    );
    const selectTh = `<th class="col-select"><input type="checkbox" class="po-select-all" title="${t('tooltip.select_all')}" aria-label="${t('tooltip.select_all')}"></th>`;
    sortableHead.splice(1, 0, selectTh);   // after product, before stock
    const head = sortableHead.join('');
    const body = visible.map((r) => {
      const meta = prodMeta.get(r.product.toLowerCase());
      const restock = meta && (meta.reorder_level || 0) > 0
                            && (meta.qty_on_hand || 0) < meta.reorder_level;
      const cls = restock ? ' class="row-restock-high"' : '';
      const titleAttr = restock
        ? ` title="reorder ${meta.reorder_level} btl > instock ${meta.qty_on_hand} btl"`
        : '';
      const stock = r.stock == null ? '-' : r.stock;
      const amt   = r.amountText || '';
      const prio  = (r.priority || 'N').toLowerCase();
      const prioLabel = r.priority === 'U' ? '急需'
                     : r.priority === 'H' ? '热卖'
                     : '正常';
      return `<tr${cls}${titleAttr}>
        <td class="col-product">${escapeHtml(r.product)}</td>
        <td class="col-select"><input type="checkbox" class="po-select" data-product="${escapeHtml(r.product)}"></td>
        <td class="col-stock">${escapeHtml(String(stock))}</td>
        <td class="col-cases">${r.cases}</td>
        <td class="col-amount">${escapeHtml(amt)}</td>
        <td class="col-notes">${r.notesHtml}</td>
        <td class="col-priority"><span class="prio-badge prio-${prio}">${prioLabel}</span></td>
      </tr>`;
    }).join('');
    return `<table class="po-main-table" data-new-table="1">
      <thead><tr>${head}</tr></thead>
      <tbody>${body || '<tr><td colspan="7" class="placeholder">_(无订单行)_</td></tr>'}</tbody>
    </table>`;
  }

  // Toggle sort config on header click.
  // priority col: always reset to default (brand-aware).
  // other cols: cycle asc -> desc -> default.
  function _toggleSort(cur, col) {
    if (col === 'priority') return { col: 'priority', dir: null };
    if (cur.col !== col) return { col, dir: 'asc' };
    if (cur.dir === 'asc') return { col, dir: 'desc' };
    // desc or anything else -> back to default
    return { col: 'priority', dir: null };
  }

  // Delegated click: find the nearest .po-main-wrap + its viewState,
  // toggle sort, re-render just this wrapper.
  document.addEventListener('click', (e) => {
    const th = e.target.closest('th.sortable[data-col]');
    if (!th) return;
    const wrapper = th.closest('.po-main-wrap');
    if (!wrapper || !wrapper._poViewState) return;
    e.stopPropagation();
    const state = wrapper._poViewState;
    state.sort = _toggleSort(state.sort, th.dataset.col);
    wrapper.innerHTML = renderPOTable(state.rows, state.sort);
    // Re-render resets row checkboxes -> keep retire button in sync.
    _syncVendorRetireEnabled(wrapper);
  });

  // Parse first <table> and REPLACE it with the new data-driven table.
  // Stashes viewState on the wrapper element for the click handler.
  function installPOMainTable(body) {
    if (!body) return false;
    const rows = parseMainPOTable(body);
    if (!rows.length) return false;
    const state = { rows, sort: { col: 'priority', dir: null } };
    const mainTable = body.querySelector('table');
    if (!mainTable) return false;
    const wrapper = document.createElement('div');
    wrapper.className = 'po-main-wrap';
    wrapper.innerHTML = renderPOTable(state.rows, state.sort);
    wrapper._poViewState = state;
    mainTable.replaceWith(wrapper);
    return true;
  }

  // Pull "库存 N" out of the rightmost (notes) cell into a new second
  // column so numeric inventory gets dedicated space and the notes column
  // is less crowded. Run AFTER flagRetireeRows so the retiree-tag HTML is
  // present in the notes cell before we touch it.
  function extractInstockColumn(root) {
    // Cache-first: build a product-name -> qty_on_hand map from _products
    // (the POS-backed product-names response). This is the authoritative
    // stock value -- never depend on whether the LLM chose to include
    // "库存 N" in notes (it sometimes omits it, leaving stock col empty).
    const byName = new Map();
    for (const p of (_products || [])) {
      if (p && p.name && p.qty_on_hand != null) {
        byName.set(p.name.toLowerCase(), Number(p.qty_on_hand));
      }
    }
    // Fallback: also look for the pattern in notes when name lookup misses.
    const INSTOCK_RE = /(?:库存|在库|现库|stock|instock)\s*[:：]?\s*(-?\d+)/i;
    root.querySelectorAll('table').forEach(table => {
      if (table.dataset.instockAdded === '1') return;  // idempotent
      const rows = Array.from(table.querySelectorAll('tr'));
      // Only tables with >=4 original cells (product | cases | amount | notes)
      // get the transform.
      if (!rows.length) return;
      const firstRowCellCount = rows[0].children.length;
      if (firstRowCellCount < 4) return;
      rows.forEach(row => {
        const cells = Array.from(row.children);
        const notesCell = cells[cells.length - 1];  // rightmost existing cell
        const isHeader = notesCell.tagName === 'TH';
        const newCell = document.createElement(isHeader ? 'th' : 'td');
        if (isHeader) {
          newCell.textContent = currentLang === 'en' ? 'Stock' : '库存';
        } else {
          // Prefer POS cache value keyed by product name.
          const prodCell = cells[0];
          const pname = (prodCell?.textContent || '').trim().toLowerCase();
          const cached = byName.get(pname);
          if (cached != null) {
            newCell.textContent = String(cached);
          } else {
            // Cache miss -> try notes pattern as fallback.
            const notesText = notesCell.textContent || '';
            const m = notesText.match(INSTOCK_RE);
            newCell.textContent = m ? m[1] : '-';
          }
          // Always strip 库存 N from notes so we never double-display.
          const STOCK_STRIP = /(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+/gi;
          let html = notesCell.innerHTML;
          html = html
            .replace(new RegExp('\\s*[·・]\\s*' + STOCK_STRIP.source, 'gi'), '')
            .replace(new RegExp(STOCK_STRIP.source + '\\s*[·・]\\s*', 'gi'), '')
            .replace(STOCK_STRIP, '')
            .replace(/^\s*[·・]\s*|\s*[·・]\s*$/g, '')
            .trim();
          notesCell.innerHTML = html;
        }
        row.insertBefore(newCell, cells[1]);  // slot between product and cases
      });
      // Rename header cells post-insert so view matches editor & i18n dict.
      // Column indices after insert: 0=Product 1=Stock 2=Cases 3=Amount 4=Notes
      const headerRow = rows.find(r => r.querySelector('th'));
      if (headerRow) {
        const ths = headerRow.querySelectorAll('th');
        if (ths[0]) ths[0].textContent = t('col.product');
        if (ths[2]) ths[2].textContent = t('col.cases');
        if (ths[3]) ths[3].textContent = t('col.amount');
        if (ths[4]) ths[4].textContent = t('col.notes');
      }
      table.dataset.instockAdded = '1';
    });
  }

  // For any row cell whose content is clipped by overflow:hidden +
  // text-overflow:ellipsis, add a title attribute so the full text appears
  // as a tooltip on hover. Scans after render so tables built by marked.js
  // get tooltips without editing the markdown.
  function addCellTitlesForTruncation(root) {
    root.querySelectorAll('td').forEach(td => {
      if (td.hasAttribute('title')) return;
      const full = td.textContent.trim();
      if (full) td.setAttribute('title', full);
    });
  }

  // Flag rows where the product's reorder threshold (product.reOrder, in
  // BOTTLES) exceeds what is currently on hand (product.inStock, also
  // bottles). Semantically: this product is the reason the LLM put the
  // line in the PO (restock > instock triggers reorder). Discontinued
  // products carry negative reorder_level and are skipped automatically.
  function flagRestockOverStockRows(root) {
    if (!Array.isArray(_products) || !_products.length) return;
    const byName = new Map();
    for (const p of _products) {
      if (!p || !p.name) continue;
      byName.set(p.name.toLowerCase(), p);
    }
    root.querySelectorAll('table').forEach(table => {
      table.querySelectorAll('tbody tr, tr').forEach(tr => {
        if (tr.querySelector('th')) return;
        if (tr.classList.contains('row-restock-high')) return;
        const prodCell = tr.children[0];
        const name = (prodCell?.textContent || '').trim().toLowerCase();
        if (!name) return;
        const p = byName.get(name);
        if (!p || p.reorder_level == null || p.qty_on_hand == null) return;
        const reorder = Number(p.reorder_level);
        const stock   = Number(p.qty_on_hand);
        if (!(reorder > 0 && reorder > stock)) return;  // skip 0 / negative / already-stocked
        tr.classList.add('row-restock-high');
        tr.setAttribute('title',
          `reorder threshold ${reorder} btl > instock ${stock} btl -- triggers restock`);
      });
    });
  }

  // Hoist _apiOnline + probe timer up here so _applyUILocks (below) can
  // read them safely during init-time renderPOPanel -> setEmailEnabled ->
  // _applyUILocks call chain. Before the hoist these were declared near
  // _probeApi far below, which put them in TDZ during the first init
  // render and threw "Cannot access '_apiOnline' before initialization".
  let _apiOnline = null;            // tri-state: null/true/false
  let _apiProbeTimer = null;

  // Coordinated UI gate. Three mutable conditions can race each other:
  //   offline    -- server unreachable; any network action fails
  //   generating -- a WS stream is writing _poPanel (onDone.upsertPanelVendor)
  //   editing    -- user holds unsaved edits in _editingPO
  // Mixing them causes "I saved and the edit disappeared" bugs. This gate
  // disables the controls whose interaction would mutate conflicting state
  // so the three conditions stay pairwise exclusive at the UI boundary.
  // Body classes drive CSS dimming for dynamically re-rendered inner buttons
  // (vendor-actions) without hand-flipping .disabled per render.
  function _applyUILocks() {
    const offline = _apiOnline === false;
    const genning = !!generating;
    const editing = !!_editingPO;
    document.body.classList.toggle('gen-lock', genning);
    document.body.classList.toggle('edit-lock', editing);
    document.body.classList.toggle('offline-lock', offline);
    // Lazy DOM lookups: declarations for these buttons live further down
    // in the script, but the gate only runs after user events / probes
    // so bindings are resolved by call time.
    const storeEl   = document.getElementById('storeSel');
    const vendorEl  = document.getElementById('vendorSel');
    const sendEl    = document.getElementById('sendBtn');
    const emailEl   = document.getElementById('emailBtn');
    const refreshEl = document.getElementById('refreshCacheBtn');
    if (storeEl)   storeEl.disabled   = offline || editing;
    if (vendorEl)  vendorEl.disabled  = offline || editing || !(storeEl && storeEl.value);
    if (refreshEl) refreshEl.disabled = offline || genning || editing;
    if (sendEl)    sendEl.disabled    = offline || editing || genning || !sessionId;
    if (emailEl) {
      const contentOk = emailEl.dataset.emailReady === '1';
      emailEl.disabled = offline || editing || genning || !contentOk;
    }
  }

  const setBusy = (busy) => {
    generating = busy;
    // Input stays ENABLED during generation so user can draft a follow-up;
    // send is blocked until generation completes to keep the session sane.
    msgInput.disabled = false;
    _applyUILocks();
  };

  async function loadStores() {
    try {
      const r = await fetch(API_BASE + '/api/stores');
      const stores = await r.json();
      storeSel.innerHTML = `<option value="" data-i18n="store.select">${t('store.select')}</option>` +
        stores.map(s => `<option value="${s.store_id}">${s.name}</option>`).join('');
    } catch (e) {
      storeSel.innerHTML = '<option>加载失败</option>';
      addMsg('加载门店失败: ' + e.message, 'sys');
    }
  }

  async function loadVendors(storeId) {
    vendorSel.disabled = true;
    vendorSel.innerHTML = '<option value="">加载中…</option>';
    try {
      const r = await fetch(`${API_BASE}/api/stores/${storeId}/vendors`);
      const vendors = await r.json();
      if (!vendors.length) {
        vendorSel.innerHTML = '<option>此门店无供应商</option>';
        return;
      }
      vendorSel.innerHTML = `<option value="" data-i18n="vendor.select">${t('vendor.select')}</option>` +
        vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
      vendorSel.disabled = false;
    } catch (e) {
      vendorSel.innerHTML = '<option>加载失败</option>';
      addMsg('加载供应商失败: ' + e.message, 'sys');
    }
  }

  // ==================================================================
  // WebSocket client for /ws/reorder
  //
  // Replaces the earlier SSE reader. One WebSocket carries the full saga:
  // generate -> N edits -> stop. Handshake URL: /ws/reorder?store_id&vendor_id.
  //
  // See docs/superpowers/specs/2026-04-16-sse-to-websocket-design.md.
  // ==================================================================

  let _ws = null;                 // current WebSocket
  let _wsStoreId = null;          // saga store bound to the current _ws
  let _wsVendorId = null;         // saga vendor
  let _wsResumeSid = null;        // if disconnect happened mid-stream, try resume once
  let _wsCallbacks = null;        // {onToken, onDone, onError, onPoReplace, onProgress, onSession}
  let _wsHeartbeatHandle = null;  // client-driven ping interval
  let _wsLastSentAt = 0;
  const _WS_HEARTBEAT_MS = 40 * 1000;

  function _wsDispatchFrame(evt) {
    if (evt.type === 'session') {
      sessionId = evt.content;
      _wsResumeSid = evt.content;
      if (_wsCallbacks && _wsCallbacks.onSession) _wsCallbacks.onSession(evt.content);
      return;
    }
    if (evt.type === 'po_replace') {
      // Server-pushed full PO replacement (edit flow). Route to the
      // streaming area, NOT poBody, so other vendor cards stay visible
      // and interactive.
      poBuffer = evt.content;
      if (!_viewingHistoryId) {
        const lbl = (vendorSel.selectedOptions[0] && vendorSel.selectedOptions[0].text)
          || _wsVendorId || '';
        setStreamArea(poBuffer, true, lbl);
      }
      return;
    }
    if (evt.type === 'progress') {
      // Spinner progress (starts with Braille glyph) = transient, replace prev.
      // Non-spinner = milestone: promote existing transient in place.
      //
      // Per-batch counter: each spinner update for the same batch N/M
      // bumps a visible counter ("批次 7/19 · 1 · 生成中…" -> "· 2 ·" ...)
      // so the user can confirm the stream is alive. Counter resets when
      // the batch number changes.
      // sys messages land in logBody as .log-line (see addMsg), NOT .msg.sys.
      // The correct selector to find the prior transient progress row is
      // therefore .log-line.transient.
      const existing = logBody.querySelector('.log-line.transient');
      const isSpinner = /^[\u280B\u2819\u2839\u2838\u283C\u2834\u2826\u2827\u2807\u280F]/.test(evt.content);
      const BATCH_RE = /^(批次\s*(\d+)\s*\/\s*(\d+))\s*[·\s]+(.*)$/;
      if (isSpinner) {
        const clean = evt.content.replace(/^[\u280B\u2819\u2839\u2838\u283C\u2834\u2826\u2827\u2807\u280F]\s*/, '');
        const bm = clean.match(BATCH_RE);
        let display = clean;
        let batchN = '', count = 1;
        if (bm) {
          batchN = bm[2];
          const prevN = existing?.dataset.batchN;
          const prevC = parseInt(existing?.dataset.count || '0', 10);
          count = (prevN === batchN) ? (prevC + 1) : 1;
          display = `${bm[1]} · ${count} · ${bm[4]}`;
        }
        const html = '<span class="spinner-dot"></span>' + display;
        if (existing) {
          existing.innerHTML = html;
          if (bm) {
            existing.dataset.batchN = batchN;
            existing.dataset.count = String(count);
          }
        } else {
          const d = addMsg('', 'sys');
          d.classList.add('transient');
          if (bm) {
            d.dataset.batchN = batchN;
            d.dataset.count = String(count);
          }
          d.innerHTML = html;
        }
      } else {
        // Milestone: reshape text so "生成中…" becomes "完成" semantically.
        // Reuse the counter from the just-completed batch if it matches.
        const needsPrefix = !/^[\u2713\u2717\u26A0\u2714\u274C]/.test(evt.content);
        let text = (needsPrefix ? '... ' : '') + evt.content;
        const bm = evt.content.match(/(批次\s*(\d+)\s*\/\s*\d+)/);
        if (bm && existing && existing.dataset.batchN === bm[2]) {
          const n = parseInt(existing.dataset.count || '0', 10);
          // Inject " · K · 完成" right after "批次 N/M" in the milestone text.
          text = text.replace(bm[1], `${bm[1]} · ${n} · 完成`);
        }
        if (existing) {
          existing.innerHTML = '';
          existing.textContent = text;
          existing.classList.remove('transient');
          delete existing.dataset.batchN;
          delete existing.dataset.count;
        } else {
          addMsg(text, 'sys');
        }
      }
      return;
    }
    if (evt.type === 'token') {
      if (_wsCallbacks && _wsCallbacks.onToken) _wsCallbacks.onToken(evt.content);
      return;
    }
    if (evt.type === 'done') {
      if (_wsCallbacks && _wsCallbacks.onDone) _wsCallbacks.onDone();
      return;
    }
    if (evt.type === 'error') {
      if (_wsCallbacks && _wsCallbacks.onError) _wsCallbacks.onError(evt.content);
      return;
    }
    if (evt.type === 'pong') {
      // nothing to do
      return;
    }
  }

  function _wsStartHeartbeat() {
    _wsStopHeartbeat();
    _wsHeartbeatHandle = setInterval(() => {
      if (!_ws || _ws.readyState !== WebSocket.OPEN) return;
      if (Date.now() - _wsLastSentAt < _WS_HEARTBEAT_MS) return;
      _wsSendRaw({ action: 'ping' });
    }, Math.floor(_WS_HEARTBEAT_MS / 2));
  }

  function _wsStopHeartbeat() {
    if (_wsHeartbeatHandle) { clearInterval(_wsHeartbeatHandle); _wsHeartbeatHandle = null; }
  }

  function _wsSendRaw(obj) {
    if (!_ws || _ws.readyState !== WebSocket.OPEN) return false;
    try {
      _ws.send(JSON.stringify(obj));
      _wsLastSentAt = Date.now();
      return true;
    } catch (e) {
      console.warn('ws.send failed:', e);
      return false;
    }
  }

  function _wsBuildURL(storeId, vendorId, resumeSid) {
    // When WS_BASE is set (cross-origin API mode), use it directly.
    // Otherwise build same-origin WS URL from location.
    const origin = WS_BASE || (((location.protocol === 'https:') ? 'wss:' : 'ws:')
                              + '//' + location.host);
    let url = origin + '/ws/reorder'
      + '?store_id=' + encodeURIComponent(storeId)
      + '&vendor_id=' + encodeURIComponent(vendorId);
    if (resumeSid) url += '&resume=' + encodeURIComponent(resumeSid);
    return url;
  }

  function _wsOpen(storeId, vendorId, onOpen, onError) {
    // Close any existing socket first. Tag the OLD ws as intentional
    // replacement BEFORE close() so its onclose handler skips the
    // "连接中断" user-facing message -- otherwise starting a new gen
    // looks like the new gen's WS just dropped, which it didn't.
    if (_ws && _ws.readyState !== WebSocket.CLOSED) {
      _ws._intentionalReplace = true;
      try { _ws.close(1000, 'new saga'); } catch (_) {}
    }
    const resume = (_wsStoreId === storeId && _wsVendorId === vendorId) ? _wsResumeSid : null;
    const url = _wsBuildURL(storeId, vendorId, resume);
    _wsStoreId = storeId;
    _wsVendorId = vendorId;

    const ws = new WebSocket(url);
    _ws = ws;

    ws.onopen = () => {
      _wsStartHeartbeat();
      if (onOpen) onOpen();
    };
    ws.onmessage = (e) => {
      try {
        const evt = JSON.parse(e.data);
        _wsDispatchFrame(evt);
      } catch (err) {
        console.warn('ws: bad JSON frame', err, e.data);
      }
    };
    ws.onerror = (e) => {
      console.warn('ws: error event', e);
    };
    ws.onclose = (e) => {
      _wsStopHeartbeat();
      // Race guard: if WE closed this socket on purpose to start a new
      // saga, _wsCallbacks already points at the NEW gen's callbacks
      // (streamAction replaced them). Surfacing onClose here would fire
      // the new gen's "连接中断" message even though no real disconnect
      // happened -- the new gen's own WS hasn't even opened. Skip the
      // callback in that case.
      if (ws._intentionalReplace) return;
      if (_wsCallbacks && _wsCallbacks.onClose) _wsCallbacks.onClose(e);
    };
  }

  function wsCancel() {
    // Tell server to stop the current task; WS stays open for next action.
    _wsSendRaw({ action: 'stop' });
  }

  async function streamAction(storeId, vendorId, actionFrame, cb) {
    // cb = {onToken, onDone, onError, onSession?, onPoReplace?, onProgress?, onClose?}
    _wsCallbacks = cb;
    // Reuse existing WS if same saga.
    if (_ws && _ws.readyState === WebSocket.OPEN
        && _wsStoreId === storeId && _wsVendorId === vendorId) {
      _wsSendRaw(actionFrame);
      return;
    }
    _wsOpen(storeId, vendorId, () => {
      _wsSendRaw(actionFrame);
    });
  }

  window.addEventListener('beforeunload', () => {
    _wsStopHeartbeat();
    if (_ws && _ws.readyState === WebSocket.OPEN) {
      try { _ws.close(1000, 'page unload'); } catch (_) {}
    }
  });

  const timerEl = document.getElementById('timer');
  let _timerHandle = null;
  const fmtElapsed = (s) => {
    const m = Math.floor(s / 60), sec = s % 60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
  };
  const startTimer = () => {
    if (_timerHandle) clearInterval(_timerHandle);
    const t0 = Date.now();
    timerEl.textContent = fmtElapsed(0);
    timerEl.style.color = '#888';
    _timerHandle = setInterval(() => {
      timerEl.textContent = fmtElapsed(Math.floor((Date.now() - t0) / 1000));
    }, 1000);
  };
  const stopTimer = (ok) => {
    if (_timerHandle) { clearInterval(_timerHandle); _timerHandle = null; }
    if (timerEl.textContent) {
      timerEl.textContent = (ok ? '✓ ' : '✗ ') + timerEl.textContent.replace(/^/, '耗时 ');
      timerEl.style.color = ok ? '#2e8540' : '#c62828';
    }
    if (ok) {
      // Freeze the cache-age clock to mark "work done". The clock may have
      // been wiped by setCacheDone / setCacheBusy / updateCacheAge during
      // generation, so recreate via ensureCacheClock first.
      ensureCacheClock();
      const clock = cacheAgeEl.querySelector('.clock-spin');
      if (clock) clock.classList.add('paused');
    }
    // Freeze any lingering transient spinner so the spinner stops rotating.
    // sys messages live in logBody as .log-line (not .msg.sys).
    logBody.querySelectorAll('.log-line.transient').forEach(el => {
      el.innerHTML = el.textContent;
      el.classList.remove('transient');
    });
  };

  async function generatePO() {
    const storeId = storeSel.value;
    const vendorId = vendorSel.value;
    if (!storeId || !vendorId) return;
    setBusy(true);
    cancelBtn.style.display = '';
    sessionId = null;
    _wsResumeSid = null;
    poBuffer = '';
    setEmailEnabled(false);

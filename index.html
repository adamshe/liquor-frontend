  function openAddRowInline() {
    const existing = document.querySelector('.add-row-inline');
    if (existing) { existing.remove(); return; }
    const div = document.createElement('div');
    div.className = 'add-row-inline';
    div.innerHTML = `<input type="text" placeholder="${currentLang === 'en' ? 'Type product name (>= 2 chars)...' : '输入产品名 (>= 2 字符)...'}" id="poAddInput">
      <div class="add-row-actions">
        <button type="button" class="btn btn-primary" id="poAddCommitBtn" disabled>
          ${currentLang === 'en' ? 'Add' : '添加'} <span id="poAddCount">0</span>
        </button>
        <button type="button" class="btn btn-ghost" id="poAddCloseBtn">
          ${currentLang === 'en' ? 'Close' : '关闭'}
        </button>
      </div>
      <div id="poAddAc" class="autocomplete"></div>`;
    document.getElementById('poAddBtn').after(div);
    const inp = document.getElementById('poAddInput');
    const acBox = document.getElementById('poAddAc');
    const commitBtn = document.getElementById('poAddCommitBtn');
    const countEl = document.getElementById('poAddCount');
    const closeBtn = document.getElementById('poAddCloseBtn');
    inp.focus();

    // Selected set of product names (from _products). Preserved across
    // re-filters so user can query, check, query again, check more, commit.
    const selected = new Map();  // name -> product object
    const refreshCommit = () => {
      countEl.textContent = String(selected.size);
      commitBtn.disabled = selected.size === 0;
    };

    function renderMatches() {
      const q = inp.value.trim().toLowerCase();
      if (q.length < 2) { acBox.classList.remove('active'); return; }
      const matches = (_products || []).filter(p => p.name.toLowerCase().includes(q)).slice(0, 20);
      if (matches.length === 0) { acBox.classList.remove('active'); return; }
      acBox.innerHTML = matches.map((p, i) => {
        const checked = selected.has(p.name) ? 'checked' : '';
        const cost  = (p.cost         != null) ? `$${Number(p.cost).toFixed(2)}` : '';
        const price = (p.price        != null) ? `$${Number(p.price).toFixed(2)}` : '';
        const stk   = (p.qty_on_hand  != null) ? `${Number(p.qty_on_hand)}` : '';
        return `<label class="autocomplete-item ac-picker" data-idx="${i}">
          <input type="checkbox" class="ac-check" ${checked}>
          <span class="ac-name">${escapeHtml(p.name)}</span>
          <span class="ac-stock" title="in stock (btl)">${stk}</span>
          <span class="ac-cost"  title="cost / btl">${cost}</span>
          <span class="ac-price" title="price / btl">${price}</span>
        </label>`;
      }).join('');
      acBox.classList.add('active');
      acBox._matches = matches;
    }
    inp.addEventListener('input', renderMatches);

    acBox.addEventListener('change', (e) => {
      const cb = e.target.closest('.ac-check');
      if (!cb || !acBox._matches) return;
      const item = cb.closest('.autocomplete-item');
      const p = acBox._matches[+item.dataset.idx];
      if (cb.checked) selected.set(p.name, p);
      else selected.delete(p.name);
      refreshCommit();
    });

    commitBtn.addEventListener('click', () => {
      if (selected.size === 0) return;
      const standard = _editingPO.parsed.sections.find(s => /standard|正常|reorder/i.test(s.title))
                    || _editingPO.parsed.sections[0];
      // Batch add all selected products. Compute amount = cases * qty_per_case * cost
      // (cost is per-bottle) so the row shows a populated $ figure immediately.
      for (const p of selected.values()) {
        const cases = 1;
        let amountStr = '';
        if (p.cost != null && p.qty_per_case != null) {
          const amt = cases * Number(p.qty_per_case) * Number(p.cost);
          amountStr = '$' + amt.toFixed(2);
        }
        standard.rows.push({
          product: p.name, cases, amount: amountStr,
          notes: currentLang === 'en' ? 'manual add' : '手动添加',
        });
      }
      renderPOEditor(_editingPO.parsed);
    });
    closeBtn.addEventListener('click', () => {
      div.remove();
    });
  }

  const CLOCK_SVG = `<span class="clock-spin" aria-hidden="true"><span class="hand hand-min"></span><span class="hand hand-sec"></span></span>`;

  let cacheTextEl = null;
  function ensureCacheClock() {
    if (cacheTextEl && cacheAgeEl.contains(cacheTextEl)) return;
    cacheAgeEl.innerHTML = `<span class="cache-text"></span>${CLOCK_SVG}`;
    cacheTextEl = cacheAgeEl.querySelector('.cache-text');
  }
  function resetCacheClock() {
    cacheTextEl = null;
    ensureCacheClock();
    updateCacheAge();
  }
  function setCacheBusy(text) {
    ensureCacheClock();
    cacheTextEl.textContent = text;
    cacheAgeEl.style.color = 'var(--muted)';
  }
  function setCacheDone(text) {
    cacheAgeEl.innerHTML = `<span>${text}</span><span class="cache-check">✓</span>`;
    cacheTextEl = null;
    cacheAgeEl.style.color = 'var(--muted)';
  }

  async function updateCacheAge() {
    const sid = storeSel.value;
    if (!sid) { cacheAgeEl.textContent = ''; return; }
    try {
      const resp = await fetch(API_BASE + '/api/admin/cache/stats');
      if (!resp.ok) return;
      const data = await resp.json();
      const info = data.stores?.[sid];
      if (!info) {
        cacheAgeEl.textContent = currentLang === 'en' ? 'no data' : '数据未加载';
        return;
      }
      const age = info.age_seconds;
      const mins = Math.floor(age / 60), secs = Math.floor(age % 60);
      const ageText = age < 60 ? `${secs}s` : `${mins}m${secs}s`;
      ensureCacheClock();
      cacheTextEl.textContent = currentLang === 'en'
        ? `cached ${ageText} ago`
        : `缓存 ${ageText} 前`;
      cacheAgeEl.style.color = info.warn ? 'var(--danger)' : 'var(--muted)';
    } catch {}
  }
  // Re-render cache text on language switch so en/zh labels stay in sync.
  window.addEventListener('lang-changed', () => updateCacheAge());

  // Smart refresh threshold — 6 hours.  Within window → fusion patch (on_hand
  // + recent sales).  Beyond → full reload.  Shift/Alt click forces full.
  const SMART_REFRESH_WINDOW_SEC = 6 * 3600;

  async function doRefresh(sid, mode) {
    const url = mode === 'smart'
      ? `/api/admin/cache/smart-refresh/${encodeURIComponent(sid)}`
      : `/api/admin/cache/refresh/${encodeURIComponent(sid)}`;
    const resp = await fetch(url, { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
    return data;
  }

  refreshCacheBtn.addEventListener('click', async (event) => {
    const sid = storeSel.value;
    if (!sid) { addMsg('⚠ 请先选门店', 'sys'); return; }

    // Decide mode
    const forceFull = event.shiftKey || event.altKey;
    let mode = 'full';
    if (!forceFull) {
      try {
        const stats = await fetch(API_BASE + '/api/admin/cache/stats').then(r => r.json());
        const info = stats.stores?.[sid];
        if (info && info.age_seconds < SMART_REFRESH_WINDOW_SEC) {
          mode = 'smart';
        }
      } catch { /* fall through to full */ }
    }

    refreshCacheBtn.disabled = true;
    refreshCacheBtn.innerHTML = `<span class="btn-icon">🔄</span> ${mode === 'smart' ? '快刷中…' : '全刷中…'}`;
    setCacheBusy(mode === 'smart' ? '快刷中' : '全刷中');
    // ANY refresh (smart or full) drops the per-store product-name caches
    // in localStorage so autocomplete reflects the latest inStock values.
    _clearAllProductNameCaches();
    try {
      let data;
      try {
        data = await doRefresh(sid, mode);
      } catch (e) {
        // Smart failed? Auto-fallback to full.
        if (mode === 'smart') {
          addMsg('⚠ 快刷失败,降级全刷…', 'sys');
          setCacheBusy('全刷中');
          data = await doRefresh(sid, 'full');
        } else {
          throw e;
        }
      }
      const ms = Math.round(data.load_duration_ms);
      const label = data.mode === 'smart' ? '⚡ 快刷' : '🔄 全刷';
      addMsg(`${label} 完成 (${data.snapshot_rows} SKU, ${ms}ms)`, 'sys');
      setCacheDone(`${label} 完成`);
      setTimeout(updateCacheAge, 1500);
      // Immediately re-fetch the autocomplete catalog so the popup shows
      // the just-refreshed inStock values without waiting for a store switch.
      loadAllProductNames(sid);
    } catch (e) {
      addMsg('✗ 刷新失败: ' + e.message, 'sys');
      updateCacheAge();
    } finally {
      refreshCacheBtn.disabled = false;
      refreshCacheBtn.innerHTML = '<span class="btn-icon">🔄</span> 刷新';
    }
  });
  refreshCacheBtn.title = '刷新数据(6h 内智能快刷 / Shift+点击强制全刷)';

  // Removed 10s auto-poll — cache age now updates only on store change,
  // after manual refresh, or after a generation completes.

  // localStorage cache for product names (per-store, TTL 24h). POS SQL
  // Express is too slow to hit on every store switch and most catalogs
  // change very little day-to-day. Force-refresh via Shift+click on the
  // refresh button (clears all cached entries; see _clearAllProductNameCaches).
  const PRODUCT_CACHE_KEY_PREFIX = 'eip_product_names_v1_';
  const PRODUCT_CACHE_TTL_S = 24 * 3600;
  function _productCacheKey(storeId) { return PRODUCT_CACHE_KEY_PREFIX + storeId; }

  async function loadAllProductNames(storeId) {
    if (!storeId) return;
    const key = _productCacheKey(storeId);
    // Try localStorage first
    try {
      const raw = localStorage.getItem(key);
      if (raw) {
        const cached = JSON.parse(raw);
        const ageS = (Date.now() - (cached.ts || 0)) / 1000;
        // Schema check: newer response shape carries cost / price / qty_per_case
        // / reorder_level. Reject older cached items that predate these fields
        // so users don't get a stuck zero-cost autocomplete after a deploy.
        const first = Array.isArray(cached.items) ? cached.items[0] : null;
        const schemaOk = first && (
          'cost' in first && 'price' in first &&
          'qty_per_case' in first && 'reorder_level' in first
        );
        if (schemaOk && ageS < PRODUCT_CACHE_TTL_S) {
          _products = _filterVisibleProducts(cached.items);
          console.log('[autocomplete] localStorage cache hit: %d items, age=%ds',
            _products.length, Math.round(ageS));
          return;
        }
        if (!schemaOk) {
          console.log('[autocomplete] localStorage cache has old schema, refetching');
        }
      }
    } catch (_e) { /* corrupt or quota -- fall through to fetch */ }
    // Cache miss / stale -> block input during slow POS SQL fetch
    const prevPlaceholder = msgInput.placeholder;
    msgInput.disabled = true;
    msgInput.placeholder = currentLang === 'en'
      ? 'Loading products, please wait...'
      : '正在加载产品,请稍候...';
    try {
      const resp = await fetch(`${API_BASE}/api/stores/${encodeURIComponent(storeId)}/product-names`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const items = await resp.json();
      _products = _filterVisibleProducts(items);
      console.log('[autocomplete] fetched + cached:', _products.length);
      _safeSetItem(key, JSON.stringify({ts: Date.now(), items}), 'product-cache');
    } catch (e) {
      console.warn('[autocomplete] failed to load store catalog:', e);
    } finally {
      msgInput.disabled = false;
      msgInput.placeholder = prevPlaceholder;
    }
  }
  function _clearAllProductNameCaches() {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(PRODUCT_CACHE_KEY_PREFIX)) keys.push(k);
      }
      keys.forEach(k => localStorage.removeItem(k));
    } catch (_e) {}
  }

  storeSel.addEventListener('change', () => {
    sessionId = null;
    sendBtn.disabled = true;
    if (storeSel.value) {
      loadVendors(storeSel.value);
      loadAllProductNames(storeSel.value);   // populate autocomplete now
      updateCacheAge();
    } else {
      vendorSel.innerHTML = '<option>先选门店</option>';
      vendorSel.disabled = true;
      cacheAgeEl.textContent = '';
    }
    // Panel is store-scoped: show only current store's vendors.
    renderPOPanel();
    // Some events are store-scoped (applicable_stores); reload banner.
    loadUpcomingHolidays();
  });

  vendorSel.addEventListener('change', () => {
    sessionId = null;
    if (!vendorSel.value || !storeSel.value) return;
    // Batch running: vendor pick joins the queue (deduped) instead of
    // racing against the worker's in-flight gen. Worker drains the
    // queue before the digest send -- the new pick gets included.
    if (_batchInProgress_ && _batchInProgress_() && storeSel.value === _batch.storeId) {
      const text = vendorSel.selectedOptions[0]?.text || vendorSel.value;
      _enqueueAdhoc(vendorSel.value, text, 'order');
      return;
    }
    generatePO();
  });

  sendBtn.addEventListener('click', sendEdit);
  cancelBtn.addEventListener('click', () => { cancelSSE(); });
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); sendEdit(); }
  });

  // ── API connection probe (heartbeat-style) ───────────────────────
  // Periodically fetch /health. Success -> online -> enable store/vendor
  // dropdowns. Network error / timeout -> offline -> disable them so
  // the user can't attempt actions that require the server. 401 is NOT
  // offline (server reachable, auth expired) -- auth gate handles that.
  const apiStatusDot = document.getElementById('apiStatus');
  // _apiOnline + _apiProbeTimer are hoisted above _applyUILocks for TDZ
  // safety (see comment there); only the probe intervals live here.
  const _PROBE_ON_INTERVAL  = 120 * 1000;  // 2 min when online (light)
  const _PROBE_OFF_INTERVAL = 30 * 1000;   // 30s when offline (eager reconnect)

  function _applyApiOnlineState(online) {
    if (_apiOnline === online) return;     // no-op on unchanged
    _apiOnline = online;
    if (apiStatusDot) {
      apiStatusDot.classList.remove('online', 'offline', 'checking');
      apiStatusDot.classList.add(online ? 'online' : 'offline');
      apiStatusDot.title = online
        ? 'Server online'
        : 'Server offline -- generate / refresh / email disabled; local view + edit still work';
    }
    // Delegate all button gating to the lock coordinator so offline /
    // generating / editing compose without stepping on each other.
    _applyUILocks();
  }

  async function _probeApi() {
    const url = API_BASE + '/health';
    console.log('[probe] start', { url, creds: _FETCH_CREDS });
    try {
      const ctl = new AbortController();
      const t = setTimeout(() => ctl.abort(), 2500);
      const r = await fetch(url, {
        method: 'GET',
        credentials: _FETCH_CREDS,
        signal: ctl.signal,
      });
      clearTimeout(t);
      const online = r.ok || r.status < 500;
      console.log('[probe] response', { status: r.status, ok: r.ok, online });
      // Any HTTP response (even 5xx) means server is reachable.
      _applyApiOnlineState(online);
    } catch (e) {
      console.warn('[probe] fetch error (offline verdict):', e && e.name, e && e.message);
      _applyApiOnlineState(false);
    } finally {
      // Reschedule based on new state.
      if (_apiProbeTimer) clearTimeout(_apiProbeTimer);
      _apiProbeTimer = setTimeout(_probeApi,
        _apiOnline ? _PROBE_ON_INTERVAL : _PROBE_OFF_INTERVAL);
    }
  }
  // Browser hints: react instantly to OS-level network changes.
  window.addEventListener('online',  _probeApi);
  window.addEventListener('offline', () => _applyApiOnlineState(false));

  // ── Auth gate: check session, show login overlay on 401, start app on 200.
  // If server reports auth_enabled=false, skip entirely (local / SaaS-off
  // deployments stay open).
  const _loginOverlay = document.getElementById('loginOverlay');
  const _loginForm    = document.getElementById('loginForm');
  const _loginUser    = document.getElementById('loginUser');
  const _loginPass    = document.getElementById('loginPass');
  const _loginError   = document.getElementById('loginError');
  const _appEl        = document.getElementById('app');

  function _showLogin(msg) {
    _loginOverlay.style.display = 'flex';
    _appEl.style.display = 'none';
    if (msg) { _loginError.textContent = msg; _loginError.style.display = ''; }
    else { _loginError.style.display = 'none'; }
    setTimeout(() => _loginUser.focus(), 50);
  }
  function _hideLogin() {
    _loginOverlay.style.display = 'none';
    _appEl.style.display = '';
  }
  async function _startApp() {
    _hideLogin();
    loadStores();
    // Probe already kicked off at module init below; do not re-start here.
    // If we landed here via an email tap-link (?regen=<store>:<vendor>),
    // wait for stores + vendors to populate and auto-fire generatePO.
    _maybeApplyPendingRegen();
  }
  async function _checkAuthAndStart() {
    try {
      const r = await fetch(API_BASE + '/api/auth/me', { credentials: _FETCH_CREDS });
      if (r.ok) {
        const d = await r.json();
        if (!d.auth_enabled || d.user) { _startApp(); return; }
      }
    } catch (e) { /* network hiccup -- show login */ }
    _showLogin();
  }
  const _loginRemember = document.getElementById('loginRemember');
  _loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    _loginError.style.display = 'none';
    const btn = _loginForm.querySelector('button[type="submit"]');
    btn.disabled = true;
    try {
      const r = await fetch(API_BASE + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: _FETCH_CREDS,
        body: JSON.stringify({
          username: _loginUser.value.trim(),
          password: _loginPass.value,
          remember: !!_loginRemember.checked,
        }),
      });
      if (r.ok) {
        _loginPass.value = '';
        // Save token from response body so refreshes survive even when the
        // browser dropped the Set-Cookie (iOS Safari ITP case). The fetch
        // wrapper then injects Authorization: Bearer on every API call.
        // When remember is unchecked the server returns max_age=0 and we
        // store the token as session-scope (no expiry) -- still survives
        // within the tab.
        try {
          const d = await r.clone().json().catch(() => ({}));
          if (d && d.token) _setStoredToken(d.token, d.max_age || 0);
        } catch (_e) { /* cookie path will still work where supported */ }
        _startApp();
        return;
      }
      const err = await r.json().catch(() => ({}));
      _loginError.textContent = err.detail || ('Login failed (' + r.status + ')');
      _loginError.style.display = '';
    } catch (err) {
      _loginError.textContent = 'Network error: ' + err.message;
      _loginError.style.display = '';
    } finally {
      btn.disabled = false;
    }
  });
  // Kick the server-reachability probe immediately -- independent of auth
  // state. /health is public (in _AUTH_EXEMPT_PREFIXES on the server), so
  // the indicator should go green on a healthy server even while the user
  // is still on the login overlay. Before this change, probe only started
  // inside _startApp -> dot stayed grey (.checking) on the login page.
  _probeApi();
  _checkAuthAndStart();

  // One-tap bug report. Users (rightly) won't copy-paste console output;
  // this captures the last 80 console lines + current store/vendor state
  // and POSTs to /api/bug-report which logs to logs/bug_reports.jsonl.
  // Auth-exempt server-side so the button keeps working even when the
  // session cookie just got dropped by iOS Safari.
  const _consoleBuffer = [];
  (function wrapConsole() {
    ['log', 'warn', 'error', 'info'].forEach(level => {
      const orig = console[level].bind(console);
      console[level] = function (...args) {
        try {
          const line = args.map(a => {
            if (a instanceof Error) return a.message + '\n' + (a.stack || '');
            if (typeof a === 'object') { try { return JSON.stringify(a); } catch { return String(a); } }
            return String(a);
          }).join(' ');
          _consoleBuffer.push('[' + level + '] ' + line.slice(0, 1000));
          if (_consoleBuffer.length > 80) _consoleBuffer.shift();
        } catch (_e) { /* never let capture break the app */ }
        orig(...args);
      };
    });
    window.addEventListener('error', (e) => {
      _consoleBuffer.push('[uncaught] ' + (e.error ? (e.error.message + '\n' + (e.error.stack || '')) : e.message));
      if (_consoleBuffer.length > 80) _consoleBuffer.shift();
    });
    window.addEventListener('unhandledrejection', (e) => {
      _consoleBuffer.push('[unhandled-rejection] ' + String(e.reason));
      if (_consoleBuffer.length > 80) _consoleBuffer.shift();
    });
  })();

  function _reportContext() {
    return {
      store_id: (typeof storeSel !== 'undefined' && storeSel) ? storeSel.value : null,
      store_name: (typeof storeSel !== 'undefined' && storeSel && storeSel.selectedOptions[0]) ? storeSel.selectedOptions[0].text : null,
      vendor_id: (typeof vendorSel !== 'undefined' && vendorSel) ? vendorSel.value : null,
      vendor_name: (typeof vendorSel !== 'undefined' && vendorSel && vendorSel.selectedOptions[0]) ? vendorSel.selectedOptions[0].text : null,
      api_base: API_BASE,
      online: _apiOnline,
      generating: typeof generating !== 'undefined' ? generating : null,
      editing: typeof _editingPO !== 'undefined' && !!_editingPO,
      token_present: !!_getStoredToken(),
    };
  }
  async function _submitBugReport(msg) {
    const body = {
      message: msg || '',
      context: _reportContext(),
      console_log: _consoleBuffer.slice(),
      url: location.href,
      user_agent: navigator.userAgent || '',
    };
    const r = await fetch(API_BASE + '/api/bug-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  // Simple prompt-based UX -- no modal CSS required, works on iPhone Safari.
  // Button is a fixed-position pill at the bottom-right corner.
  const _reportBtn = document.createElement('button');
  _reportBtn.type = 'button';
  _reportBtn.textContent = currentLang === 'en' ? 'Report' : '反馈';
  _reportBtn.title = currentLang === 'en'
    ? 'Send a one-tap bug report (current state + last console messages)'
    : '一键上报 bug (当前状态 + 最近控制台日志)';
  _reportBtn.style.cssText = [
    'position:fixed', 'bottom:12px', 'right:12px', 'z-index:99999',
    'padding:8px 14px', 'border-radius:20px',
    'background:rgba(200,74,74,0.92)', 'color:#fff',
    'border:1px solid rgba(255,255,255,0.2)', 'font:600 12px/1 var(--font-ui)',
    'cursor:pointer', 'box-shadow:0 2px 8px rgba(0,0,0,0.25)',
  ].join(';');
  _reportBtn.addEventListener('click', async () => {
    const msg = prompt(currentLang === 'en'
      ? 'Describe what went wrong (optional):'
      : '描述一下遇到的问题(可选):');
    if (msg === null) return;   // user canceled
    _reportBtn.disabled = true;
    _reportBtn.textContent = currentLang === 'en' ? 'Sending...' : '上传中...';
    try {
      const r = await _submitBugReport(msg);
      alert(currentLang === 'en'
        ? 'Report received. Thank you.\nid=' + (r.ts || '?')
        : '已收到, 谢谢!\nid=' + (r.ts || '?'));
    } catch (e) {
      alert((currentLang === 'en' ? 'Failed to send: ' : '发送失败: ') + (e.message || e));
    } finally {
      _reportBtn.disabled = false;
      _reportBtn.textContent = currentLang === 'en' ? 'Report' : '反馈';
    }
  });
  document.body.appendChild(_reportBtn);
})();
</script>
</body>
</html>

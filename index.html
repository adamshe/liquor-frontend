    emailBtn.innerHTML = '<span class="btn-icon">\u2709</span> 发送邮件';
    const _genVendorLabel = vendorSel.selectedOptions[0]
      ? vendorSel.selectedOptions[0].text : (vendorSel.value || '');
    setStreamArea('正在生成建议…', true, _genVendorLabel);
    addMsg(`开始为「${storeSel.selectedOptions[0].text}」生成 ${_genVendorLabel} 的采购建议…`, 'sys');
    startTimer();

    // If user was viewing history, snap back to live for the new generation
    if (_viewingHistoryId) backToLive();

    await streamAction(
      storeId, vendorId,
      { action: 'generate' },
      {
        onToken: (tok) => {
          poBuffer += tok;
          if (!_viewingHistoryId) setStreamArea(poBuffer, true, _genVendorLabel);
        },
        onDone: () => {
          cancelBtn.style.display = 'none';
          // Done -- hide the stream area; renderPOPanel (called via
          // upsertPanelVendor below) repaints poBody with the new
          // vendor card alongside any others.
          setStreamArea('', false);
          generating = false;
          sendBtn.disabled = !sessionId;
          msgInput.disabled = false;
          stopTimer(true);
          if (poBuffer && poBuffer.length > 50) {
            const totals = parseTotals(poBuffer);
            // New PO goes directly to the multi-vendor panel (not the
            // drawer). User can move it back to the drawer via each
            // vendor sub-panel's close (x) button.
            const sid = storeId, vid = vendorId;
            const existing = _poPanel.vendors.find(v =>
              v.storeId === sid && v.vendorId === vid);
            const entry = {
              id: existing ? existing.id
                           : 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
              storeId: sid,
              storeName: storeSel.selectedOptions[0]?.text || sid,
              vendorId: vid,
              vendorName: vendorSel.selectedOptions[0]?.text || vid,
              ts: Date.now(),
              markdown: poBuffer,
              cases: totals.cases,
              amount: totals.amount,
            };
            upsertPanelVendor(entry);
            // Persist to backend preorders.json so the digest's sliding-
            // window filter sees this fresh row. Fire-and-forget (the
            // visible PO panel does not depend on it landing).
            try { window._persistPreorder && window._persistPreorder(entry); } catch (_e) { /* ignore */ }
            // Auto-fire email (non-blocking; errors land in addMsg).
            // Two messages per fire: vendor cases + internal transfer
            // bottles, each with a regen tap-link. SKIP during batch
            // runs -- batch button sends one grouped digest at the end
            // and does not want per-vendor mail spam.
            if (!_batchInProgress) {
              emailSendForVendor(entry, {
                storeId: sid,
                storeName: storeSel.selectedOptions[0]?.text || sid,
                vendorId: vid,
                vendorName: vendorSel.selectedOptions[0]?.text || vid,
              }).then(r => {
                if (r && r.total > 0) {
                  addMsg(`邮件 ${r.sent}/${r.total} 封已发`, 'sys');
                }
              });
            }
            setEmailEnabled(true);
            emailBtn.innerHTML = '<span class="btn-icon">\u2709</span> 发送邮件';
          }
          setBusy(false);
        },
        onError: (err) => {
          // Real server-side error frame -- generation actually failed.
          cancelBtn.style.display = 'none';
          addMsg('生成出错: ' + err, 'sys');
          setStreamArea('', false);
          setBusy(false);
          stopTimer(false);
        },
        onClose: (e) => {
          // Unexpected close mid-stream: WS dropped while generating
          // (cloudflared idle timeout, mobile network blip, tunnel
          // reconnect). The server typically keeps streaming -- the log
          // is still scrolling -- so do NOT paint a misleading 失败 here.
          // Hide the stream area; existing vendor cards in poBody are
          // already visible (sibling element, untouched), so the user
          // doesn't lose context. Re-selecting the same vendor in 30s
          // resumes via _wsResumeSid.
          if (generating) {
            cancelBtn.style.display = 'none';
            addMsg(
              '连接中断 (code=' + e.code + ')。'
              + '服务器可能仍在生成 -- 30 秒后重新选择此供应商会尝试续传;'
              + '若仍无结果请点 刷新 重试。',
              'sys',
            );
            setStreamArea('', false);
            setBusy(false);
            stopTimer(false);
          }
        },
      }
    );
  }

  function cancelSSE() {
    // Backwards-compat name retained for existing callers; now sends ws stop.
    wsCancel();
  }

  async function sendEdit() {
    const msg = msgInput.value.trim();
    if (!msg || generating) return;

    // Smart dispatch:
    // 1. If user selected a product from autocomplete and input matches → GO path
    // 2. Else if sessionId exists → edit path
    // 3. Else warn
    if (_goPending && msg === _goPending.name) {
      const product = _goPending;
      _goPending = null;
      await triggerGoFromProduct(product);
      return;
    }
    if (!sessionId) {
      // Ad-hoc product lookup mode — no PO generated yet, user wants to
      // check inventory for a product by name.
      const sid = storeSel.value;
      if (!sid) { addMsg('⚠ 请先选门店', 'sys'); return; }
      addMsg(msg, 'user');
      msgInput.value = '';
      updateModeHint();
      try {
        const r = await fetch(`${API_BASE}/api/stores/${encodeURIComponent(sid)}/product-lookup?name=${encodeURIComponent(msg)}`);
        const data = await r.json();
        if (!data.found) {
          addMsg(`✗ 没找到「${msg}」`, 'sys');
        } else {
          const more = data.more_matches > 0 ? ` (+${data.more_matches} 个匹配)` : '';
          addMsg(
            `📦 ${data.name}${more}\n` +
            `库存 ${data.qty_on_hand} · 补货线 ${data.reorder_level} · 7天售 ${data.sales_7d} · 30天 ${data.sales_30d} · 180天 ${data.sales_180d}\n` +
            `供应商: ${data.vendor_name || '-'} · 单价 $${(data.cost || 0).toFixed(2)}`,
            'ai'
          );
        }
      } catch (e) {
        addMsg('查询失败: ' + e.message, 'sys');
      }
      return;
    }

    addMsg(msg, 'user');
    msgInput.value = '';
    updateModeHint();
    setBusy(true);
    poBuffer = '';
    const _editVendorLabel = vendorSel.selectedOptions[0]
      ? vendorSel.selectedOptions[0].text : (_wsVendorId || vendorSel.value || '');
    setStreamArea('更新中...', true, _editVendorLabel + ' (edit)');
    startTimer();

    await streamAction(
      _wsStoreId || storeSel.value,
      _wsVendorId || vendorSel.value,
      { action: 'edit', message: msg },
      {
        onToken: (tok) => { poBuffer += tok; setStreamArea(poBuffer, true, _editVendorLabel + ' (edit)'); },
        onDone: () => {
          setStreamArea('', false);
          addMsg('(已更新上方采购建议)', 'ai');
          setBusy(false);
          stopTimer(true);
        },
        onError: (err) => {
          addMsg('错误: ' + err, 'sys');
          setStreamArea('', false);
          setBusy(false);
          stopTimer(false);
        },
        onClose: (e) => {
          if (generating) {
            addMsg('连接中断 (code=' + e.code + '),请重试', 'sys');
            setStreamArea('', false);
            setBusy(false);
            stopTimer(false);
          }
        },
      }
    );
  }

  // ─── Order history drawer (LocalStorage persisted) ──────────────
  const drawerEl = document.getElementById('drawer');
  const drawerToggleEl = document.getElementById('drawerToggle');
  const drawerListEl = document.getElementById('drawerList');
  const drawerClearEl = document.getElementById('drawerClear');

  // localStorage write with observability. Native setItem fails SILENTLY
  // on quota exceeded / storage disabled / write truncation, which is how
  // "I clicked save and saw 'saved', then reload and edits are gone" bugs
  // happen. This wrapper: (a) try/catch the write, (b) read back + byte
  // compare to catch non-throwing truncation, (c) surface to the user via
  // addMsg so a silent fail becomes a visible one. Returns true on verified
  // write, false on any failure path.
  function _safeSetItem(key, value, label) {
    try {
      localStorage.setItem(key, value);
      const back = localStorage.getItem(key);
      if (back !== value) {
        const msg = (currentLang === 'en'
          ? `Storage [${label}] verify failed: ${back ? back.length : 0}/${value.length} bytes`
          : `存储 [${label}] 校验失败: 回读 ${back ? back.length : 0} / 写入 ${value.length} 字节`);
        console.error('[_safeSetItem]', label, { writeLen: value.length, readLen: back ? back.length : 0 });
        try { addMsg(msg, 'sys'); } catch (_e) {}
        return false;
      }
      return true;
    } catch (e) {
      const reason = (e && e.name === 'QuotaExceededError') ? 'quota' : (e && e.message) || String(e);
      const msg = (currentLang === 'en'
        ? `Storage [${label}] write failed: ${reason}`
        : `存储 [${label}] 写失败: ${reason}`);
      console.error('[_safeSetItem]', label, e);
      try { addMsg(msg, 'sys'); } catch (_e) {}
      return false;
    }
  }

  const HISTORY_KEY = 'eip_order_history_v1';
  const HISTORY_MAX = 50;      // cap so LocalStorage stays small
  let _orderHistory = [];       // [{id, storeId, storeName, vendorId, vendorName, ts, markdown, cases, amount}]
  let _viewingHistoryId = null; // legacy: kept for compat with editor code paths

  // Phase-1 multi-vendor PO panel. Vendors live here OR in _orderHistory,
  // never both (exclusive). Drawer is the "archive"; panel is the active
  // review surface.
  const PANEL_KEY = 'eip_po_panel_v1';
  let _poPanel = { vendors: [] };  // same shape as history entries
  // Hoisted here (earlier than its original location) so renderPOPanel
  // at startup can read it without TDZ ReferenceError.
  let _editingPO = null;  // { parsed, targetId, vendorEntry? }
  // emailBtn + setEmailEnabled hoisted for the same reason -- renderPOPanel
  // enables/disables the email action based on panel content at startup.
  const emailBtn = document.getElementById('emailBtn');
  // Track "content-ready" in a data attribute so _applyUILocks can combine
  // it with offline/gen/edit gates. Direct .disabled assignment used to
  // fight with the lock coordinator; now the lock is single source of truth.
  const setEmailEnabled = (on) => {
    if (!emailBtn) return;
    emailBtn.dataset.emailReady = on ? '1' : '0';
    _applyUILocks();
  };

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      _orderHistory = raw ? JSON.parse(raw) : [];
    } catch { _orderHistory = []; }
    renderHistory();
  }

  function loadPanel() {
    try {
      const raw = localStorage.getItem(PANEL_KEY);
      const p = raw ? JSON.parse(raw) : null;
      _poPanel = (p && Array.isArray(p.vendors)) ? p : { vendors: [] };
      console.log('[loadPanel] %d vendors restored from localStorage',
        _poPanel.vendors.length);
    } catch (e) {
      console.warn('loadPanel failed:', e);
      _poPanel = { vendors: [] };
    }
  }
  function savePanel() {
    const s = JSON.stringify(_poPanel);
    const ok = _safeSetItem(PANEL_KEY, s, 'panel');
    if (ok) {
      console.debug('[savePanel] %d vendors, %d bytes',
        _poPanel.vendors.length, s.length);
    }
    return ok;
  }

  function upsertPanelVendor(entry) {
    const idx = _poPanel.vendors.findIndex(v =>
      v.storeId === entry.storeId && v.vendorId === entry.vendorId);
    if (idx >= 0) _poPanel.vendors[idx] = { ..._poPanel.vendors[idx], ...entry };
    else _poPanel.vendors.unshift(entry);
    savePanel();
    renderPOPanel();
  }
  function movePreorderToPanel(id) {
    const entry = _orderHistory.find(e => e.id === id);
    if (!entry) return;
    // Normalize totals off the markdown rows -- stored values may be stale
    // zeros from server-side parse_totals' brittle regex.
    const tt = parseTotals(entry.markdown || '');
    entry.cases = tt.cases;
    entry.amount = tt.amount;
    _orderHistory = _orderHistory.filter(e => e.id !== id);
    saveHistory(); renderHistory();
    // Auto-switch store selector so the moved vendor lands in the right
    // store's panel (panel is store-scoped). Firing 'change' runs the
    // normal handler: loadVendors, loadAllProductNames, renderPOPanel.
    if (entry.storeId && storeSel.value !== entry.storeId) {
      // only switch if the option actually exists in the dropdown
      const exists = Array.from(storeSel.options).some(o => o.value === entry.storeId);
      if (exists) {
        storeSel.value = entry.storeId;
        storeSel.dispatchEvent(new Event('change'));
      }
    }
    upsertPanelVendor(entry);
  }
  function returnVendorToDrawer(id) {
    const v = _poPanel.vendors.find(x => x.id === id);
    if (!v) return;
    _poPanel.vendors = _poPanel.vendors.filter(x => x.id !== id);
    savePanel();
    _orderHistory.unshift(v);
    saveHistory(); renderHistory();
    renderPOPanel();
  }

  function saveHistory() {
    return _safeSetItem(HISTORY_KEY, JSON.stringify(_orderHistory), 'history');
  }

  function parseAmountNumber(s) {
    if (!s) return 0;
    const n = parseFloat(String(s).replace(/[^\d.-]/g, ''));
    return isFinite(n) ? n : 0;
  }

  function parseTotals(md) {
    // Compute totals from actual rows, not by matching a "**Total: X**"
    // label in the markdown -- the LLM sometimes writes that label wrong
    // (drifts, double-counts, etc). Rows are the source of truth.
    //
    // Exclude "retire / discontinued" sections: those rows are informational
    // (on-hand stock, aging counts) not items we're ordering. Summing them
    // would inflate the vendor total (e.g. retire row qty 436 -> bogus 458).
    const parsed = parsePOMarkdown(md);
    let cases = 0, amount = 0;
    for (const s of parsed.sections) {
      if (/建议退役|retire|discontinu/i.test(s.title)) continue;
      for (const r of s.rows) {
        cases += r.cases || 0;
        amount += parseAmountNumber(r.amount);
      }
    }
    return { cases, amount };
  }

  function pushHistory(entry) {
    // One entry per (store, vendor) -- always replace any prior entry
    // (preorder or user-generated, any age). Drawer shows at most one
    // row per vendor pair; new generation supersedes the old.
    _orderHistory = _orderHistory.filter(e =>
      !(e.storeId === entry.storeId && e.vendorId === entry.vendorId)
    );
    _orderHistory.unshift(entry);
    if (_orderHistory.length > HISTORY_MAX) _orderHistory.length = HISTORY_MAX;
    saveHistory();
    renderHistory();
  }

  function renderHistory() {
    if (!_orderHistory.length) {
      drawerListEl.innerHTML = `<div class="drawer-empty">${t('drawer.empty')}</div>`;
      return;
    }
    drawerListEl.innerHTML = _orderHistory.map(e => {
      const isActive = e.id === _viewingHistoryId;
      const timeAgo = formatAgo(Date.now() - e.ts);
      const storeAlias = (e.storeName || '').split(/\s+/)[0] || '';
      const title = storeAlias
        ? `${escapeHtml(storeAlias)} · ${escapeHtml(e.vendorName || e.vendorId)}`
        : escapeHtml(e.vendorName || e.vendorId);
      return `<div class="drawer-item${isActive ? ' active' : ''}" data-id="${e.id}">
        <div class="drawer-item-vendor">${title}</div>
        <div class="drawer-item-stats">
          <span>${e.cases} ${t('unit.cases')}</span>
          <span class="amt">$${(e.amount || 0).toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
        </div>
        <div class="drawer-item-time">${escapeHtml(e.storeName || '')} · ${timeAgo}</div>
        <button class="drawer-item-move" data-id="${e.id}" title="${t('tooltip.to_panel')}" aria-label="${t('tooltip.to_panel')}">${ICON_ARROW_RIGHT}</button>
        <button class="drawer-item-copy" data-id="${e.id}" title="${t('tooltip.copy')}" aria-label="${t('tooltip.copy')}">${ICON_COPY}</button>
        <button class="drawer-item-del" data-id="${e.id}" title="${t('tooltip.delete')}" aria-label="${t('tooltip.delete')}">${ICON_TRASH}</button>
      </div>`;
    }).join('');
  }

  function formatAgo(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s 前`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}min 前`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h 前`;
    const d = Math.floor(h / 24);
    return `${d}d 前`;
  }

  function viewHistoryItem(id) {
    const entry = _orderHistory.find(e => e.id === id);
    if (!entry) return;
    _viewingHistoryId = id;
    const banner = `<div class="history-banner">
      <span>📜 正在查看历史订单(${escapeHtml(entry.vendorName || entry.vendorId)},${formatAgo(Date.now() - entry.ts)})</span>
      <button id="backToLive">返回当前</button>
    </div>`;
    poBody.innerHTML = banner + (window.marked ? window.marked.parse(entry.markdown) : entry.markdown);
    document.getElementById('backToLive')?.addEventListener('click', backToLive);
    wrapSectionsIntoAccordion(entry.markdown || '');
    attachSectionCopyButtons(entry.markdown || '');
    renderHistory();
    // Enable email when the viewed entry has actual PO content.
    setEmailEnabled(!!(entry.markdown && entry.markdown.length > 50));
  }

  function backToLive() {
    _viewingHistoryId = null;
    renderPOPanel();
  }

  function renderPOPanel() {
    // Editor mode owns poBody entirely; skip.
    if (typeof _editingPO !== 'undefined' && _editingPO) return;
    // Snapshot accordion open/closed state before we nuke the DOM.
    const openStates = {};
    poBody.querySelectorAll('details[data-state-key]').forEach(d => {
      openStates[d.dataset.stateKey] = d.open;
    });
    // Filter panel to vendors of the currently selected store. Panel
    // keeps all stores' data persistently (cross-store data not lost),
    // but only the active store's vendors are shown.
    const currentStoreId = storeSel.value || '';
    const displayVendors = currentStoreId
      ? (_poPanel.vendors || []).filter(v => v.storeId === currentStoreId)
      : [];
    if (displayVendors.length === 0) {
      poBody.className = '';
      poBody.innerHTML = `<div class="placeholder">${t('placeholder.po_init')}</div>`;
      setEmailEnabled(false);
      renderRetirePanel();
      return;
    }
    poBody.className = '';
    // Grand total across all displayed vendors of the current store.
    let grandCases = 0, grandAmount = 0;
    for (const v of displayVendors) {
      const tt = parseTotals(v.markdown || '');
      grandCases += tt.cases || 0;
      grandAmount += tt.amount || 0;
    }
    const grandAmtTxt = grandAmount.toLocaleString(undefined, {maximumFractionDigits: 0});
    const summaryHTML = `<div class="panel-summary">
      <span class="ps-label">${currentLang === 'en' ? 'Order total' : '订单总计'}:</span>
      <b>${grandCases}</b> ${t('unit.cases')}
      <span class="ps-sep">&middot;</span>
      <b>$${grandAmtTxt}</b>
      <span class="ps-sep">&middot;</span>
      ${displayVendors.length} ${currentLang === 'en' ? 'vendors' : '家供应商'}
    </div>`;
    poBody.innerHTML = summaryHTML + displayVendors.map(v => {
      const nm = escapeHtml(v.vendorName || v.vendorId || '');
      const id = escapeHtml(v.id || '');
      // Recompute stats from markdown rows every render -- trust the
      // parser, not any stored cases/amount (which may be stale zeros
      // from the server-side regex).
      const fresh = parseTotals(v.markdown || '');
      const cases = fresh.cases;
      const amt = fresh.amount.toLocaleString(undefined, {maximumFractionDigits: 0});
      const mdHtml = window.marked
        ? window.marked.parse(v.markdown || '')
        : escapeHtml(v.markdown || '');
      return `<details class="vendor-panel" data-vendor-id="${id}" data-state-key="vendor:${id}" open>
        <summary class="vendor-panel-head" onclick="if(event.target.closest('.vendor-actions')){event.preventDefault();}">
          <span class="vendor-head-left">
            <span class="vendor-name">${nm}</span>
            <span class="vendor-actions">
              <button class="vendor-copy" data-id="${id}" title="${t('tooltip.copy')}" aria-label="${t('tooltip.copy')}">${ICON_COPY}</button>
              <button class="vendor-stock-copy" data-id="${id}" title="${t('tooltip.copy_stock')}" aria-label="${t('tooltip.copy_stock')}">${ICON_LOW_STOCK}</button>
              <button class="vendor-email" data-id="${id}" title="${t('tooltip.send_email')}" aria-label="${t('tooltip.send_email')}">${ICON_SEND}</button>
              <button class="vendor-edit" data-id="${id}" title="${t('tooltip.edit')}" aria-label="${t('tooltip.edit')}">${t_edit()}</button>
              <button class="vendor-retire" data-id="${id}" title="${t('tooltip.retire_selected')}" aria-label="${t('tooltip.retire_selected')}" disabled>${ICON_ARCHIVE}</button>
              <button class="vendor-close" data-id="${id}" title="${t('tooltip.back_to_drawer')}" aria-label="${t('tooltip.back_to_drawer')}">${ICON_ARROW_LEFT}</button>
            </span>
          </span>
          <span class="vendor-total-cases">${cases} ${t('unit.cases')}</span>
          <span class="vendor-total-amount">$${amt}</span>
        </summary>
        <div class="vendor-panel-body" id="vpb-${id}">${mdHtml}</div>
      </details>`;
    }).join('');
    // For each displayed vendor body, apply nested accordion + copy buttons.
    displayVendors.forEach(v => {
      const body = document.getElementById('vpb-' + v.id);
      if (!body) return;
      // Pass vendorName as skipTitle so the markdown's own "**Southern**"
      // banner (which duplicates our outer sub-panel summary) is removed
      // instead of re-wrapped into a second accordion layer.
      wrapSectionsIntoAccordion(v.markdown || '', body,
        v.vendorName || v.vendorId, 'v:' + v.id);
      attachSectionCopyButtons(v.markdown || '', body);
      translateAllBanners(body);
      flagRetireeRows(body);
      // New data-driven 6-col table path. On any parse/render error,
      // fall back to the legacy DOM-post-process so the page stays
      // usable -- never leave the user with a blank panel.
      let usedNewTable = false;
      try {
        usedNewTable = installPOMainTable(body);
      } catch (err) {
        console.warn('[installPOMainTable] failed, falling back:', err);
        usedNewTable = false;
      }
      if (!usedNewTable) {
        extractInstockColumn(body);
        flagRestockOverStockRows(body);
      }
      addCellTitlesForTruncation(body);
    });
    // Restore user-toggled open/closed state from the snapshot.
    poBody.querySelectorAll('details[data-state-key]').forEach(d => {
      const k = d.dataset.stateKey;
      if (k in openStates) d.open = openStates[k];
    });
    setEmailEnabled(displayVendors.some(v => v.markdown && v.markdown.length > 50));
    renderRetirePanel();
  }

  // Placeholder for an "Edit" glyph -- use a plain pencil-like char for now.
  // When i18n lands this becomes t('btn.edit_icon') and can be swapped per-locale.
  function t_edit() { return '\u270E'; }

  // Event wiring
  drawerToggleEl.addEventListener('click', () => {
    drawerEl.classList.toggle('open');
  });
  function buildCopyText(entry) {
    // Salesman-friendly short form: one product per line, "name x N cases".
    // Skip rows whose cases is 0 (user deleted / no order).
    const parsed = parsePOMarkdown(entry.markdown || '');
    const lines = [`${entry.vendorName || entry.vendorId || 'Order'}:`];
    for (const s of parsed.sections) {
      for (const r of s.rows) {
        const n = r.cases || 0;
        if (n > 0) lines.push(`${r.product} x ${n}`);
      }
    }
    return lines.join('\n');
  }

  // Per-size low-stock thresholds (in BOTTLES on hand). Below these
  // counts we consider the row a candidate for an inter-store transfer.
  // Spec from operator: minis (<=50ml) much higher threshold (sell in
  // packs), midsize (200/375ml) moderate, standard / large (>=750ml)
  // tight. Sizes between buckets pick the conservative neighbor.
  function _lowStockThreshold(sizeMl) {
    if (sizeMl >= 750) return 6;             // 750ml, 1L, 1.5L, 1.75L, 5L
    if (sizeMl >= 200 && sizeMl <= 375) return 10;
    if (sizeMl > 0 && sizeMl <= 50) return 30;
    // 100ml, 187ml, 500ml, 6PK -- not specified; default to 6 (matches
    // standard-bottle stance, conservative).
    return 6;
  }

  function buildStockText(entry) {
    // Low-stock transfer-in candidate list. ONLY rows that:
    //   1. The system actually wants to reorder (cases > 0 -- proxy for
    //      "this product has sales / is being managed"), AND
    //   2. Current on-hand is below the size-keyed threshold.
    // Output: tab-separated <name>\t<qty_on_hand> per line, no header.
    // Pastes into Excel as two columns; reviewer scans for transfers
    // from a sister store. Skips rows where stock is unknown (can't
    // judge "low" without a number) and discontinued sections.
    const parsed = parsePOMarkdown(entry.markdown || '');
    const stockMap = _productStockMap();   // name(lower) -> qty_on_hand (bottles)
    const STOCK_RX = /(?:库存|在库|现库|stock|instock)\s*[:：]?\s*(-?\d+)/i;
    const out = [];
    for (const s of parsed.sections) {
      // Discontinued / retire sections aren't actively ordered -> skip.
      if (/建议退役|retire|discontinu/i.test(s.title)) continue;
      for (const r of s.rows) {
        if (!r.product) continue;
        // Sales gate: cases > 0 in this PO means LLM allocated reorder
        // for it = product is selling and managed.
        if (!(Number(r.cases) > 0)) continue;
        // Stock lookup: catalog first, then notes regex.
        let stock = stockMap.get(r.product.toLowerCase());
        if (stock == null) {
          const m = (r.notes || '').match(STOCK_RX);
          if (!m) continue;          // no stock number anywhere -- can't judge
          stock = parseInt(m[1], 10);
        }
        const stockNum = Number(stock);
        if (!Number.isFinite(stockNum)) continue;
        const sizeMl = _sizeMl(r.product);
        const threshold = _lowStockThreshold(sizeMl);
        if (stockNum >= threshold) continue;   // not low enough to flag
        out.push(`${r.product}\t${stockNum}`);
      }
    }
    return out.join('\n');
  }

  // ── Email outbound: auto-fire in generatePO onDone, also manual via
  //    the vendor-email button. Two messages per fire:
  //      1. order channel    -- salesman cases format (vendor_<vendor>
  //                             or vendor_default fallback)
  //      2. transfer channel -- low-stock bottles (internal_transfer)
  //    Each message has a tap-link back to the app with ?regen=... so
  //    the recipient can re-trigger gen with one tap. ────────────────
  function _formatDateTimeForEmail() {
    const now = new Date();
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday',
                  'Thursday', 'Friday', 'Saturday'];
    const pad = n => String(n).padStart(2, '0');
    return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`
         + ` ${days[now.getDay()]}`
         + ` ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }

  function _vendorChannelKey(vendorName) {
    // Per-vendor channels are config keys like vendor_<lowercased,
    // hyphenated>. Fallback to vendor_default when the operator hasn't
    // wired a salesman-specific channel yet.
    const slug = String(vendorName || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
    return slug ? 'vendor_' + slug : 'vendor_default';
  }

  function _formatSubjectDateTime() {
    // 12-hour clock with AM/PM, matches the operator-requested email
    // subject pattern (Stacy uses Gmail label filters and wants the
    // exact shape "ELIOT ORDER: SOUTHERN 2026-05-02 10:30 PM").
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    let h = d.getHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd} ${h}:${min} ${ampm}`;
  }

  function _buildEmailSubject(ctx, kind) {
    // Format: "<STORE> <KIND>: <YYYY-MM-DD h:MM AM/PM> <VENDOR>"
    // Unique '<STORE> <KIND>:' prefix stays in front for Gmail filters;
    // datetime sits next (most-recent-first scanning), then VENDOR.
    // STORE / VENDOR are the FIRST WORD of their respective names,
    // upper-cased -- short, unambiguous, no dashes / colons.
    const firstWord = (s) => String(s || '').trim().split(/\s+/)[0].toUpperCase();
    const store = firstWord(ctx.storeName || ctx.storeId);
    const vendor = firstWord(ctx.vendorName || ctx.vendorId);
    const kindUpper = kind === 'transfer' ? 'TRANSFER' : 'ORDER';
    return `${store} ${kindUpper}: ${_formatSubjectDateTime()} ${vendor}`;
  }

  function _regenLink(storeId, vendorId, kind) {
    // Tap-link the email recipient opens to re-trigger gen. ui-lo is
    // the public host -- when the page opens from this URL it parses
    // ?regen=, picks store + vendor, fires gen.
    const base = 'https://ui-lo.empireintegration.com/';
    const q = `?regen=${encodeURIComponent(storeId + ':' + vendorId)}`
            + (kind ? `&kind=${encodeURIComponent(kind)}` : '');
    return base + q;
  }

  // Single send: serialize one channel + body to /api/admin/email-send.
  // Errors swallow into addMsg (sys) so an auto-fire failure doesn't
  // throw out of generatePO's onDone -- gen success is independent of
  // whether the email landed.
  async function _emailSendOne(channel, content, kind, ctx) {
    if (!content || !content.trim()) return null;
    const ts = _formatDateTimeForEmail();
    const header =
      `[${ts}]\n`
      + `${ctx.storeName || ctx.storeId} / ${ctx.vendorName || ctx.vendorId} (${kind})\n\n`;
    const body = header + content;
    try {
      const r = await fetch(API_BASE + '/api/admin/email-send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          channel, body, kind,
          // Subject used verbatim by backend (no prefix concat). Format
          // chosen for Gmail label filters:
          //   'ELIOT ORDER: SOUTHERN 2026-05-02 10:30 PM'
          subject: _buildEmailSubject(ctx, kind),
          regen_url: _regenLink(ctx.storeId, ctx.vendorId, kind),
        }),
      });
      if (!r.ok) {
        const t = await r.text();
        addMsg(`邮件发送失败 (${channel}): ${r.status} ${t.slice(0, 100)}`, 'sys');
        return null;
      }
      return await r.json();
    } catch (e) {
      addMsg(`邮件发送出错 (${channel}): ${e.message || e}`, 'sys');
      return null;
    }
  }

  // Auto / manual fire: send BOTH channels (vendor + internal_transfer)
  // for the given vendor entry. ctx must carry storeId / storeName /
  // vendorId / vendorName. Reused by generatePO onDone (auto) and the
  // vendor-email button click (manual).
  async function emailSendForVendor(vendorEntry, ctx) {
    const cases = buildCopyText(vendorEntry);
    const stock = buildStockText(vendorEntry);
    const tasks = [];
    if (cases) {
      tasks.push(_emailSendOne(_vendorChannelKey(ctx.vendorName), cases, 'order', ctx));
    }
    if (stock) {
      tasks.push(_emailSendOne('internal_transfer', stock, 'transfer', ctx));
    }
    const results = await Promise.all(tasks);
    const okCount = results.filter(r => r && r.status === 'sent').length;
    return { sent: okCount, total: tasks.length };
  }

  // URL-driven auto-regen: when the page opens with ?regen=<store>:<vendor>,
  // wait for stores + vendors to load, then auto-select and fire generatePO.
  // Closes the loop with the email tap-link: tap notification -> page
  // opens -> auto-regen -> new email lands.
  let _pendingRegen = (() => {
    try {
      const p = new URLSearchParams(location.search);
      const v = p.get('regen');
      if (!v) return null;
      const [storeId, vendorId] = v.split(':');
      if (!storeId || !vendorId) return null;
      return { storeId, vendorId };
    } catch (_e) { return null; }
  })();

  function _maybeApplyPendingRegen() {
    if (!_pendingRegen) return;
    const intent = _pendingRegen;
    // Wait for storeSel options to include the requested store. loadStores
    // is async; poll until the option lands or 10s timeout.
    if (!Array.from(storeSel.options).some(o => o.value === intent.storeId)) {
      setTimeout(_maybeApplyPendingRegen, 200);
      return;
    }
    if (storeSel.value !== intent.storeId) {
      storeSel.value = intent.storeId;
      storeSel.dispatchEvent(new Event('change'));   // triggers loadVendors
    }
    // Now wait for vendorSel options.
    const startWait = Date.now();
    const tickVendor = () => {
      if (Array.from(vendorSel.options).some(o => o.value === intent.vendorId)) {
        vendorSel.value = intent.vendorId;
        // dispatch change -> existing handler fires generatePO()
        vendorSel.dispatchEvent(new Event('change'));
        // Clear intent + scrub URL so refresh doesn't re-trigger.
        _pendingRegen = null;
        try { history.replaceState({}, '', location.pathname + location.hash); }
        catch (_e) { /* old browsers */ }
      } else if (Date.now() - startWait > 10000) {
        addMsg(`auto-regen 失败: 找不到 vendor ${intent.vendorId}`, 'sys');
        _pendingRegen = null;
      } else {
        setTimeout(tickVendor, 200);
      }
    };
    tickVendor();
  }

  drawerListEl.addEventListener('click', async (e) => {
    const copyBtn = e.target.closest('.drawer-item-copy');
    if (copyBtn) {
      e.stopPropagation();
      const id = copyBtn.dataset.id;
      const entry = _orderHistory.find(h => h.id === id);
      if (!entry) return;
      const text = buildCopyText(entry);
      try {
        await copyToClipboard(text);
        copyBtn.innerHTML = ICON_CHECK;
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.innerHTML = ICON_COPY;
          copyBtn.classList.remove('copied');
        }, 1500);
      } catch (err) {
        addMsg('复制失败: ' + (err?.message || err), 'sys');
      }
      return;
    }
    const delBtn = e.target.closest('.drawer-item-del');
    if (delBtn) {
      e.stopPropagation();
      const id = delBtn.dataset.id;
      _orderHistory = _orderHistory.filter(h => h.id !== id);
      if (_viewingHistoryId === id) backToLive();
      saveHistory();
      renderHistory();
      return;
    }
    const moveBtn = e.target.closest('.drawer-item-move');
    if (moveBtn) {
      e.stopPropagation();
      movePreorderToPanel(moveBtn.dataset.id);
      if (window.matchMedia('(max-width: 600px)').matches) {
        drawerEl.classList.remove('open');
      }
      return;
    }
    const item = e.target.closest('.drawer-item');
    if (item) {
      movePreorderToPanel(item.dataset.id);
      if (window.matchMedia('(max-width: 600px)').matches) {
        drawerEl.classList.remove('open');
      }
    }
  });
  drawerClearEl.addEventListener('click', async () => {
    if (!_orderHistory.length) return;
    if (!confirm(`清空 ${_orderHistory.length} 条历史订单?`)) return;
    _orderHistory = [];
    if (_viewingHistoryId) backToLive();
    saveHistory();
    renderHistory();
    // Root-cause fix: also delete the server-side preorder snapshot so
    // it can't reappear on reload. Next scheduled pre-generation will
    // repopulate naturally when conditions warrant.
    try {
      const r = await fetch(API_BASE + '/api/admin/preorders', { method: 'DELETE' });
      if (!r.ok) addMsg(`清空 preorders 失败: HTTP ${r.status}`, 'sys');
    } catch (e) {
      addMsg('清空 preorders 网络错误: ' + e.message, 'sys');
    }
  });

  loadHistory();
  loadPanel();
  // Invariant: a storeId|vendorId pair lives in either the panel OR the
  // history drawer, never both. Older bug runs may have written duplicates
  // to localStorage; prune them now so the bad state self-heals on refresh.
  (() => {
    const panelKeys = new Set((_poPanel.vendors || [])
      .map(v => `${v.storeId}|${v.vendorId}`));
    const before = _orderHistory.length;
    _orderHistory = _orderHistory.filter(e =>
      !panelKeys.has(`${e.storeId}|${e.vendorId}`));
    if (before !== _orderHistory.length) {
      console.log('[startup-dedup] pruned %d history dup(s) against panel',
        before - _orderHistory.length);
      saveHistory();
      renderHistory();
    }
  })();
  renderPOPanel();
  loadPreorders();
  loadUpcomingHolidays();
  // First i18n sweep after all static DOM is present.
  applyI18n();

  let _upcomingHolidays = [];
  async function loadUpcomingHolidays() {
    try {
      const sid = storeSel.value || '';
      // 7 business days reminder (skips weekends, lines up with vendor lead time).
      const q = sid
        ? `?business_days=7&store_id=${encodeURIComponent(sid)}`
        : `?business_days=7`;
      const r = await fetch(API_BASE + '/api/holidays/upcoming' + q);
      if (!r.ok) return;
      const d = await r.json();
      _upcomingHolidays = d.items || [];
      renderHolidayBanner();
    } catch (e) {
      console.warn('loadUpcomingHolidays failed:', e);
    }
  }
  function renderHolidayBanner() {
    const el = document.getElementById('holidayBanner');
    if (!el) return;
    if (!_upcomingHolidays.length) { el.style.display = 'none'; return; }
    const top = _upcomingHolidays[0];
    const cls = top.is_today ? 'today' : (top.days_away <= 3 ? 'urgent' : '');
    // Range events: "in progress" when today is inside the range,
    // otherwise "starts in N days". Single-day entries unchanged.
    let whenLabel;
    if (top.is_range && top.is_today) {
      whenLabel = currentLang === 'en' ? 'in progress' : '进行中';
    } else if (top.is_today) {
      whenLabel = t('holiday.today');
    } else {
      whenLabel = t('holiday.days_away').replace('{N}', top.days_away);
    }
    const demand = top.demand_multiplier
      ? ' · ' + t('holiday.demand').replace('{X}', top.demand_multiplier)
      : '';
    el.className = 'holiday-banner' + (cls ? ' ' + cls : '');
    el.textContent = `${top.name} (${whenLabel})${demand}`;
    // Tooltip enumerates every upcoming entry with notes for context.
    el.title = _upcomingHolidays.map(h => {
      const range = h.is_range ? `${h.resolved_date} .. ${h.end_date_resolved || '?'}` : h.resolved_date;
      const w = h.is_today
        ? (h.is_range ? 'in progress' : 'today')
        : `+${h.days_away}d`;
      return `${h.name} (${w}, ${range})${h.notes ? ' -- ' + h.notes : ''}`;
    }).join('\n');
    el.style.display = '';
  }

  async function loadPreorders() {
    try {
      const resp = await fetch(API_BASE + '/api/admin/preorders');
      if (!resp.ok) return;
      const data = await resp.json();
      const items = data.items || [];
      if (!items.length) return;
      // Dedup against BOTH the archive (_orderHistory) and the active panel
      // (_poPanel.vendors). Invariant: a single storeId|vendorId lives in
      // exactly one place. Without the panel half, panel vendors get
      // re-inserted from the server as "new" preorders on refresh.
      const seen = new Set([
        ..._orderHistory.map(e => `${e.storeId}|${e.vendorId}`),
        ...((_poPanel && _poPanel.vendors) || []).map(v => `${v.storeId}|${v.vendorId}`)
      ]);
      for (const it of items) {
        const key = `${it.store_id}|${it.vendor_id}`;
        if (seen.has(key)) continue;
        // Convention: any number from DB/API can be null. Coerce to
        // sensible defaults at the boundary so downstream code (sort,
        // display, total math) can assume numeric.
        _orderHistory.push({
          id: 'pre_' + it.store_id + '_' + it.vendor_id,
          storeId: it.store_id, storeName: it.store_name,
          vendorId: it.vendor_id, vendorName: it.vendor_name,
          ts: it.ts || Date.now(),
          markdown: it.markdown || '',
          cases: it.cases || 0,
          amount: it.amount || 0,
          preGenerated: true,
        });
      }
      _orderHistory.sort((a, b) => {
        const sa = (a.storeName || '').localeCompare(b.storeName || '');
        if (sa !== 0) return sa;
        return (a.vendorName || '').localeCompare(b.vendorName || '');
      });
      saveHistory();
      renderHistory();
    } catch (e) {
      console.warn('preorders load failed', e);
    }
  }

  // ── Per-store batch: walk batch_vendors[] one-by-one, programmatically
  //    setting the dropdowns + firing generatePO each iteration. This
  //    makes the live PO panel stream identically to the user manually
  //    selecting each vendor; the difference is just that the click
  //    happens automatically. After every vendor finishes, hit
  //    /admin/po-digest/<store_id> to email the grouped ORDER + TRANSFER
  //    digest.
  // ── Order-gen queue mechanism ────────────────────────────────────
  // State machine for the per-store batch run:
  //   idle    -- no batch active; vendor dropdown change does normal gen
  //   running -- queue worker active; dropdown change ENQUEUES vendor
  //              instead of firing generatePO directly
  //   sending -- queue empty, reconciling preorders.json + sending the 2
  //              digest emails. Enqueue still allowed -- we transition
  //              back to running and re-drain before sending again.
  //   done    -- emails sent, batch finalized; back to idle on click
  const _batch = {
    state: 'idle',
    storeId: null,
    queue: [],          // FIFO of {vendor_id, vendor_name, kind}
    seen: new Set(),    // dedupe by vendor_id within this batch
    startTs: 0,         // ms epoch -- sliding-window lower bound
    processed: 0,
    failed: 0,
    label: '',
    btn: null,
    origText: '',
  };
  // Helper: query / mutate
  function _batchInProgress_() { return _batch.state === 'running' || _batch.state === 'sending'; }
  // Backward compat: existing onDone email-suppression checks _batchInProgress
  let _batchInProgress = false;
  function _setBatchState(next) {
    _batch.state = next;
    _batchInProgress = _batchInProgress_();
  }

  function _renderQueueLabel() {
    if (!_batch.btn) return;
    const total = _batch.processed + _batch.queue.length;
    _batch.btn.innerHTML = `批量 ${_batch.label} ${_batch.processed}/${total}`;
  }

  function _enqueueAdhoc(vid, name, kind) {
    if (!vid) return false;
    if (_batch.seen.has(vid)) return false;          // dedupe
    if (_batch.state !== 'running' && _batch.state !== 'sending') return false;
    _batch.seen.add(vid);
    _batch.queue.push({
      vendor_id: vid, vendor_name: name || vid, kind: kind || 'order',
    });
    addMsg(`ad-hoc 入 queue: ${name} (剩 ${_batch.queue.length})`, 'sys');
    _renderQueueLabel();
    return true;
  }
  // Expose so the dropdown change handler can call it
  window._enqueueAdhoc = _enqueueAdhoc;

  function _waitForGenComplete(hardTimeoutMs) {
    return new Promise((resolve, reject) => {
      const t0 = Date.now();
      const tick = setInterval(() => {
        if (!generating) { clearInterval(tick); resolve(); return; }
        if (Date.now() - t0 > hardTimeoutMs) {
          clearInterval(tick); reject(new Error('gen hard timeout'));
        }
      }, 250);
    });
  }

  // After every successful gen the batch worker calls this so the
  // backend has fresh preorders.json data for the digest's sliding-
  // window filter. Returns the upserted ts.
  async function _persistPreorder(entry) {
    try {
      const r = await fetch(API_BASE + '/api/admin/preorders/upsert', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          store_id: entry.storeId, store_name: entry.storeName,
          vendor_id: entry.vendorId, vendor_name: entry.vendorName,
          markdown: entry.markdown,
          cases: entry.cases || 0, amount: entry.amount || 0,
        }),
      });
      if (!r.ok) {
        const t = await r.text();
        addMsg(`[!] preorders.upsert 失败 ${r.status}: ${t.slice(0,80)}`, 'sys');
      }
      return r.ok;
    } catch (e) {
      addMsg(`[!] preorders.upsert 网络错误: ${e.message}`, 'sys');
      return false;
    }
  }
  // Expose so generatePO's onDone can call it
  window._persistPreorder = _persistPreorder;

  // Drain the queue: pull head, run gen, repeat until empty. Each
  // iteration may grow the queue (ad-hoc) and the loop notices.
  async function _drainBatchQueue() {
    const HARD_TIMEOUT_MS = 15 * 60 * 1000;
    while (_batch.queue.length > 0) {
      const v = _batch.queue.shift();
      _renderQueueLabel();
      addMsg(`[${_batch.processed + 1}] ${_batch.label} -> ${v.vendor_name}`, 'sys');
      if (!Array.from(vendorSel.options).some(o => o.value === v.vendor_id)) {
        addMsg(`  vendor ${v.vendor_name} (${v.vendor_id}) 不在下拉, 跳过`, 'sys');
        _batch.failed += 1;
        _batch.processed += 1;
        continue;
      }
      vendorSel.value = v.vendor_id;
      try {
        generatePO();
        await _waitForGenComplete(HARD_TIMEOUT_MS);
        // generatePO's onDone has already called _persistPreorder for us.
      } catch (e) {
        addMsg(`  ${v.vendor_name} 生成异常: ${e.message}`, 'sys');
        _batch.failed += 1;
      }
      _batch.processed += 1;
      _renderQueueLabel();
    }
  }

  function _wireBatchBtn(btnId, storeId, label) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (_batchInProgress_()) {
        addMsg(`${label} batch 已在进行中`, 'sys');

        return;

      let resolved = [];

        const r = await fetch(API_BASE + `/api/admin/po-batch/${storeId}/vendors`);
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        resolved = (data.vendors || []).filter(v => v.vendor_id);
      } catch (e) {
        addMsg(`[X] ${label} batch_vendors 解析失败: ${e.message}`, 'sys');
        return;
      }
      if (!resolved.length) {
        addMsg(`[X] ${label}: batch_vendors 全部 NO MATCH (检查 stores.json)`, 'sys');
        return;
      }
      const orderCount = resolved.filter(v => v.kind !== 'transfer').length;
      const transferCount = resolved.filter(v => v.kind === 'transfer').length;
      const ok = confirm(
        `确认: 逐个生成 ${label} 的 ${resolved.length} 个供应商 ` +
        `(TRANSFER ${transferCount} 先, ORDER ${orderCount} 后)?\n` +
        resolved.map((v, i) => {
          const tag = v.kind === 'transfer' ? '[T]' : '[O]';
          return `  ${i + 1}. ${tag} ${v.vendor_name}`;
        }).join('\n') +
        `\n\n生成期间可继续从 vendor 下拉里选其他供应商, 会加入 queue 一起处理.\n` +
        `queue 排空后才发分组邮件 (TRANSFER 先, ORDER 后).`
      );
      if (!ok) return;

      // Initialize the batch state machine
      _batch.storeId = storeId;
      _batch.label = label;
      _batch.btn = btn;
      _batch.origText = btn.innerHTML;
      _batch.queue = resolved.slice();
      _batch.seen = new Set(resolved.map(v => v.vendor_id));
      _batch.startTs = Date.now();
      _batch.processed = 0;
      _batch.failed = 0;
      _setBatchState('running');
      btn.disabled = true;

      // Switch store first so vendorSel options are populated
      if (storeSel.value !== storeId) {
        storeSel.value = storeId;
        await loadVendors(storeId);
      }

      try {
        // Drain initial queue + any ad-hoc additions made during the run
        await _drainBatchQueue();

        // Reconcile phase: queue is empty. Move to sending and re-check
        // (an ad-hoc enqueue between drain-end and state-switch would
        // otherwise be missed). If something landed, re-drain.
        _setBatchState('sending');
        if (_batch.queue.length > 0) {
          _setBatchState('running');
          await _drainBatchQueue();
          _setBatchState('sending');
        }

        btn.innerHTML = `${label} ${_batch.processed - _batch.failed}/${_batch.processed} 完成, 发邮件...`;
        const r = await fetch(
          API_BASE + `/api/admin/po-digest/${storeId}?since_ms=${_batch.startTs}`,
          { method: 'POST' }
        );
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        const sentCount = (data.emails || []).reduce(
          (a, e) => a + (e.sent_to ? e.sent_to.length : 0), 0
        );
        const kindsSent = (data.emails || []).map(e => e.kind).join(', ') || '(无)';
        addMsg(
          `${label} batch 完成: gen ${_batch.processed - _batch.failed}/${_batch.processed}, ` +
          `${sentCount} 封邮件已发 (${kindsSent})`,
          'sys'
        );
      } catch (e) {
        addMsg(`[X] ${label} batch 失败: ${e.message}`, 'sys');
      } finally {
        _setBatchState('done');
        // back to idle so next batch can start
        _setBatchState('idle');
        _batch.btn = null;
        btn.disabled = false;
        btn.innerHTML = _batch.origText;
        try { refreshBatchStatus(); } catch (_e) { /* ignore */ }
      }
    });
  }

  // ── PO editor wiring (editable rows + add + save to bucket) ──────
  const editPoBtn = document.getElementById('editPoBtn');
  const savePoBtn = document.getElementById('savePoBtn');
  // _editingPO is declared earlier (near _poPanel) so renderPOPanel can
  // read it without triggering the TDZ error at startup.

  function parsePOMarkdown(md) {
    // Tolerant parser for LLM-generated markdown PO.
    // - Accepts `#`, `##`, or `###` as section headers (LLMs drift).
    //   But we require at least one space after the hashes so the
    //   document title (`# Empire Wines & Spirits`) is only treated as
    //   a section if nothing better appears; first-level title is
    //   allowed since sections still distinguish by presence of rows.
    // - Allows leading whitespace before `|` on table rows.
    // - Detects header vs data by "is cell 2 numeric" instead of
    //   hardcoding English "Product" -- this auto-skips 产品/Cases/箱数.
    // - Detects separator rows with optional alignment colons `:---:`.
    const sections = [];
    let current = null;
    const ensureSection = () => {
      if (!current) {
        current = { title: 'Order', rows: [] };
        sections.push(current);
      }
      return current;
    };
    for (const line of (md || '').split(/\r?\n/)) {
      // Section headers -- three shapes observed in LLM output:
      //   (a) ## / ### hashes (template shape)
      //   (b) `**Vendor** · ...` bold banner (actual LLM shape)
      //   We ignore lines that are pipe-table rows even if bold-looking.
      const h1 = line.match(/^#{1,3}\s+(.+?)\s*$/);
      const h2 = !/\|/.test(line) ? line.match(/^\*\*(.+?)\*\*/) : null;
      if (h1 || h2) {
        const title = (h1 ? h1[1] : h2[1]).trim();
        if (/negative stock|⚠️|total/i.test(title)) { current = null; continue; }
        current = { title, rows: [] };
        sections.push(current);
        continue;
      }
      const m = line.match(/^\s*\|(.+)\|\s*$/);
      if (!m) continue;
      const cells = m[1].split('|').map(c => c.trim());
      if (cells.length < 2) continue;
      if (/^:?-+:?$/.test(cells[0])) continue;   // separator
      const firstCell = cells[0];
      const secondCell = cells[1] || '';
      // Skip header rows (multi-lang)
      if (/^(product|产品|item|名称|商品)$/i.test(firstCell)) continue;
      if (/^(cases?|箱数|qty|quantity|数量|amount|金额|notes?|备注)$/i.test(secondCell)) continue;
      if (!firstCell) continue;
      const n = parseInt(secondCell, 10);
      const cases = isNaN(n) ? 0 : n;
      // Auto-lazy create section if first table row appears before any
      // explicit banner (defensive for malformed LLM output).
      ensureSection();
      // 4-col shape: Product | Cases | Amount | Notes
      // 3-col shape: Product | Cases | Notes
      const hasAmount = cells.length >= 4;
      current.rows.push({
        product: firstCell,
        cases,
        amount: hasAmount ? (cells[2] || '') : '',
        notes:  hasAmount ? (cells[3] || '') : (cells[2] || ''),
      });
    }
    try { console.log('[PO parser] md len=%d, sections=%o, first 200 chars=%o',
                       (md || '').length,
                       sections.map(s => ({ title: s.title, rows: s.rows.length })),
                       (md || '').slice(0, 200));
    } catch (_) {}
    return { sections };
  }

  function serializePO(parsed) {
    const kept = parsed.sections.filter(s => s.rows.length > 0);
    let md = '', grand = 0;
    for (const s of kept) {
      // Emit bold banner + 4-col table to match live LLM format.
      md += `**${s.title}**\n\n| Product | Cases | Amount | Notes |\n|---------|-------|--------|-------|\n`;
      for (const r of s.rows) {
        md += `| ${r.product} | ${r.cases || 0} | ${r.amount || ''} | ${r.notes || ''} |\n`;
        grand += r.cases || 0;
      }
      md += '\n';
    }
    md += `**Total: ${grand} cases**\n`;
    return md;
  }

  function computeTotalCases(parsed) {
    let total = 0;
    const breakdown = [];
    for (const s of parsed.sections) {
      const sum = s.rows.reduce((t, r) => t + (r.cases || 0), 0);
      total += sum;
      breakdown.push({
        title: s.title, rows: s.rows.length, sum,
        items: s.rows.map(r => `${r.product}:${r.cases}`),
      });
    }
    try { console.log('[PO total] %d = %o', total, breakdown); } catch (_) {}
    return total;
  }

  function renderPOEditor(parsed) {
    const sectionsHTML = parsed.sections.map((s, si) => {
      // "建议退役" / retire / discontinued sections default collapsed --
      // user-facing insight, not part of the active order.
      const isRetire = /建议退役|retire|discontinu/i.test(s.title);
      const openAttr = isRetire ? '' : ' open';
      // Editor mirrors view-mode 5-col: PRODUCT | STOCK | CASE | AMOUNT | NOTES.
      // Stock source: POS cache (_products) keyed by product name; fallback
      // to parsing "库存 N" out of notes. Only CASE is editable.
      const _stockByName = new Map();
      for (const p of (_products || [])) {
        if (p && p.name && p.qty_on_hand != null) {
          _stockByName.set(p.name.toLowerCase(), Number(p.qty_on_hand));
        }
      }
      const rowsHTML = s.rows.map((r, ri) => {
        const pname = (r.product || '').toLowerCase();
        let stock = _stockByName.get(pname);
        if (stock == null) {
          const textNotes = (r.notes || '').replace(/<[^>]*>/g, '');
          const m = textNotes.match(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*(-?\d+)/i);
          stock = m ? m[1] : '';
        }
        const notesOut = (r.notes || '')
          .replace(/\s*[·・]\s*(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+/gi, '')
          .replace(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+\s*[·・]\s*/gi, '')
          .replace(/(?:库存|在库|现库|stock|instock)\s*[:：]?\s*-?\d+/gi, '')
          .replace(/^\s*[·・]\s*|\s*[·・]\s*$/g, '')
          .trim();
        return `
        <tr data-si="${si}" data-ri="${ri}">
          <td class="col-product"><button class="del-btn" title="删除" aria-label="删除">${ICON_TRASH}</button><span class="prod-name">${escapeHtml(r.product)}</span></td>
          <td class="col-stock">${escapeHtml(String(stock))}</td>
          <td class="col-qty"><input type="text" inputmode="numeric" pattern="[0-9]*" class="qty-input" value="${r.cases || 0}"></td>
          <td class="col-amt">${escapeHtml(r.amount || '')}</td>
          <td class="col-notes">${notesOut}</td>
        </tr>`;
      }).join('');
      const sCases = s.rows.reduce((t, r) => t + (r.cases || 0), 0);
      const sAmt = s.rows.reduce((t, r) => t + parseAmountNumber(r.amount), 0);
      const amtTxt = sAmt.toLocaleString(undefined, {maximumFractionDigits: 0});
      return `<details class="po-section"${openAttr}>
        <summary class="po-section-title">${escapeHtml(translateSectionTitle(s.title))}
          <span class="po-section-count">${s.rows.length} &middot; ${sCases} ${t('unit.cases')} &middot; $${amtTxt}</span>
          <button class="po-section-copy" data-si="${si}" title="${t('tooltip.copy')}" aria-label="${t('tooltip.copy')}">${ICON_COPY}</button>
        </summary>
        <table>
          <thead><tr><th>${t('col.product')}</th><th>${t('col.stock')}</th><th>${t('col.cases')}</th><th>${t('col.amount')}</th><th>${t('col.notes')}</th></tr></thead>
          <tbody data-si="${si}">${rowsHTML || `<tr><td colspan="5" style="color:var(--muted);font-style:italic;padding:6px 8px;">${t('section.empty')}</td></tr>`}</tbody>
        </table>
      </details>`;
    }).join('');
    poBody.innerHTML = `<div class="po-editor">
      <div class="po-editor-toolbar">
        <button class="po-add-btn" id="poAddBtn">${t('btn.add_product')}</button>
        <span class="po-editor-spacer"></span>
        <button class="btn btn-ghost" id="poEditorCancelBtn">${t('btn.cancel')}</button>
        <button class="btn btn-primary" id="poEditorSaveBtn">${t('btn.save')}</button>
      </div>
      <div id="poSections">${sectionsHTML}</div>
    </div>`;
    // In-editor Save + Cancel. Save reuses the existing savePoBtn handler
    // (programmatic click) so there is a single source of truth for the
    // save logic. Cancel discards in-memory edits and re-renders view.
    document.getElementById('poEditorSaveBtn')?.addEventListener('click', () => {
      savePoBtn.click();
    });
    document.getElementById('poEditorCancelBtn')?.addEventListener('click', () => {
      _editingPO = null;
      renderPOPanel();
      setEmailEnabled(_poPanel.vendors.some(v => v.markdown && v.markdown.length > 50));
    });
    // iPhone / iPad: backspace is the only delete key. Force cursor to the
    // end of the number on focus AND on click so one backspace tap removes
    // the trailing digit. Using type=text + inputmode=numeric allows
    // setSelectionRange (type=number forbids it on iOS Safari).
    poBody.querySelectorAll('input.qty-input').forEach(inp => {
      const toEnd = (e) => {
        const v = e.target.value || '';
        try { e.target.setSelectionRange(v.length, v.length); } catch (_) {}
      };
      inp.addEventListener('focus', toEnd);
      inp.addEventListener('click', toEnd);
    });
  }

  function enterPOEditor() {
    let md = '', targetId = 'live';
    if (_viewingHistoryId) {
      const e = _orderHistory.find(x => x.id === _viewingHistoryId);
      if (!e) return;
      md = e.markdown;
      targetId = _viewingHistoryId;
    } else if (poBuffer) {
      md = poBuffer;
    }
    console.log('[edit] entering editor, targetId=%s md source len=%d',
                targetId, (md || '').length);
    const parsed = parsePOMarkdown(md);
    // Only seed a default section when the PO is completely empty (D-rule:
    // allow empty-start editing). If any real section was parsed, use as-is.
    if (parsed.sections.length === 0) {
      parsed.sections.push({ title: 'Standard reorder', rows: [] });
    }
    _editingPO = { parsed, targetId };
    renderPOEditor(parsed);
    // Legacy top-level edit/save buttons stay hidden; save flow lives inside
    // the editor's own toolbar now (per-vendor entry point, in-editor exit).
    setEmailEnabled(false);
  }

  function exitPOEditor(md) {
    _editingPO = null;
    renderPOPanel();
    _applyUILocks();
  }

  savePoBtn.addEventListener('click', () => {
    if (!_editingPO) return;
    const md = serializePO(_editingPO.parsed);
    const totals = parseTotals(md);
    // Phase-1: editor targets a vendor entry in _poPanel.vendors.
    // targetId is the vendor entry id. Update in place, stay in panel.
    const idx = _poPanel.vendors.findIndex(v => v.id === _editingPO.targetId);
    let persistOk = true;
    if (idx >= 0) {
      _poPanel.vendors[idx] = {
        ..._poPanel.vendors[idx],
        markdown: md,
        cases: totals.cases,
        amount: totals.amount,
        ts: Date.now(),
      };
      persistOk = savePanel();
    } else {
      // Fallback: editor was opened outside a panel entry -- upsert by
      // current store/vendor select.
      const sid = storeSel.value, vid = vendorSel.value;
      upsertPanelVendor({
        id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        storeId: sid,
        storeName: storeSel.selectedOptions[0]?.text || sid,
        vendorId: vid,
        vendorName: vendorSel.selectedOptions[0]?.text || vid,
        ts: Date.now(), markdown: md,
        cases: totals.cases, amount: totals.amount,
      });
      // Post-verify the fallback write too -- read back from localStorage
      // and confirm the just-saved markdown is there under the current
      // (store, vendor). Missing -> something ate the write silently.
      try {
        const raw = localStorage.getItem(PANEL_KEY);
        const panel = raw ? JSON.parse(raw) : {};
        const saved = (panel.vendors || []).find(v =>
          v.storeId === sid && v.vendorId === vid);
        if (!saved || saved.markdown !== md) persistOk = false;
      } catch (_e) { persistOk = false; }
    }
    // Only claim "saved" when the bytes actually made it to disk. When
    // _safeSetItem fails it already surfaces its own error; we just tell
    // the user the in-memory edit is volatile.
    if (persistOk) {
      addMsg(t('msg.saved'), 'sys');
    } else {
      addMsg(currentLang === 'en'
        ? 'Saved in memory only -- reload will lose edits'
        : '仅内存保存,刷新会丢失 (localStorage 写失败)', 'sys');
    }
    exitPOEditor(md);
  });

  // Delegated events inside the editor table
  poBody.addEventListener('input', (e) => {
    if (!_editingPO) return;
    if (!e.target.classList.contains('qty-input')) return;
    const tr = e.target.closest('tr');

    const si = +tr.dataset.si, ri = +tr.dataset.ri;

  poBody.addEventListener('click', async (e) => {
    // Multi-vendor panel -- vendor-level controls.
    // Retire: add every checked row's product to the blacklist.
    const vendorRetire = e.target.closest('.vendor-retire');
    if (vendorRetire) {
      e.preventDefault(); e.stopPropagation();
      if (vendorRetire.disabled) return;
      const vendor = vendorRetire.closest('.vendor-panel');
      if (!vendor) return;
      const checks = vendor.querySelectorAll('.po-main-wrap .po-select:checked');
      const names = Array.from(checks).map(c => c.dataset.product).filter(Boolean);
      if (!names.length) return;
      retireProducts(names);
      return;
    }
    // Select-all header checkbox: toggle every .po-select in the same wrap.
    const selAll = e.target.closest('.po-select-all');
    if (selAll) {
      const wrap = selAll.closest('.po-main-wrap');
      if (!wrap) return;
      const want = selAll.checked;
      wrap.querySelectorAll('.po-select').forEach(cb => {
        cb.checked = want;
        const tr = cb.closest('tr');
        if (tr) tr.classList.toggle('row-selected', want);
      });
      _syncVendorRetireEnabled(wrap);

      if (parsed.sections.length === 0) parsed.sections.push({ title: 'Standard reorder', rows: [] });
      _editingPO = { parsed, targetId: v.id, vendorEntry: v };
      renderPOEditor(parsed);
      setEmailEnabled(false);

    // Read-only view mode: section copy attached to markdown banners.
    const viewCopy = e.target.closest('.po-view-copy');
    if (viewCopy) {
